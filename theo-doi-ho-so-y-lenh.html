  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

tabular-nums;align-self:center;}\n\n/* ── topbar live clock bar ── */\n.clock-bar{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:var(--radius);padding:7px 12px;background:var(--card);}\n.clock-bar svg{color:var(--ink-faint);flex:0 0 auto;}\n.clock-bar .ct{font-size:12.5px;color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;}\n.clock-bar .ct b{color:var(--ink);font-weight:800;}\n\n/* ── progress bar ngưỡng + danh sách hồ sơ (Tab 2) ── */\n.pbar-goal{margin-left:auto;font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;}\n.pbar-wrap{position:relative;margin-top:6px;padding-bottom:24px;}\n.pbar-ticks{position:absolute;left:0;right:0;top:0;height:18px;pointer-events:none;}\n.pbar-tick{position:absolute;top:-3px;height:24px;width:1px;background:rgba(42,47,66,.16);}\n.pbar-tick .tlbl{position:absolute;top:25px;left:0;transform:translateX(-50%);font-size:9.5px;font-weight:600;color:var(--ink-faint);font-variant-numeric:tabular-nums;}\n.pbar-target{position:absolute;top:0;height:18px;z-index:3;}\n.pbar-target::before{content:'';position:absolute;left:-1px;top:-13px;height:44px;border-left:2px dashed #1f2937;opacity:.55;}\n.pbar-target .flag{position:absolute;top:-28px;left:-1px;transform:translateX(-50%);font-size:9.5px;font-weight:800;color:var(--ink-soft);white-space:nowrap;background:var(--card);padding:1px 5px;border:1px solid var(--line);border-radius:3px;}\n.hs-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:11px;}\n.hcard{border:1px solid var(--line);border-left:3px solid var(--ink-faint);border-radius:5px;background:var(--card);padding:10px 13px;display:flex;flex-direction:column;gap:5px;cursor:pointer;transition:box-shadow .15s;}\n.hcard:hover{box-shadow:0 1px 6px rgba(0,0,0,.08);}\n.hcard.done{border-left-color:#5AC189;}\n.hcard.ok{border-left-color:#024593;}\n.hcard.warn{border-left-color:#E6B400;}\n.hcard.err{border-left-color:#E04355;}\n :8px;font-size:12.5px;font-weight:600;color:var(--ink-soft);}\n.sbar-legend .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto;}\n.sbar-rows{display:flex;flex-direction:column;gap:20px;}\n.sbar-row{display:flex;flex-direction:column;gap:8px;}\n.sbar-top{display:flex;align-items:baseline;gap:10px;}\n.sbar-label{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}\n.sbar-frac{margin-left:auto;font-size:12.5px;color:var(--ink-faint);font-weight:600;}\n.sbar-bar{display:flex;height:30px;border-radius:8px;overflow:hidden;background:var(--track,#edeef2);}\n.sbar-bar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;min-width:0;overflow:hidden;transition:width .4s;}\n.sbar-bar .seg.done{background:#3FA46A;}\n.sbar-bar .seg.pend{background:#E0892B;}\n\n/* ── side drawer (chi tiết hồ sơ) ── */\n.drawer-scrim{position:fixed;inset:0;background:rgba(20,24,38,.34);opacity:0;visibility:hidden;transition:opacity .2s;z-index:40;}\n.drawer-scrim.open{opacity:1;visibility:visible;}\n.drawer{position:fixed;top:0;right:0;height:100vh;width:430px;max-width:92vw;background:var(--card);border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(0,0,0,.13);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:41;display:flex;flex-direction:column;}\n.drawer.open{transform:translateX(0);}\n.drawer-hd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-soft);flex:0 0 auto;}\n.drawer-hd .drawer-ttl{font-size:14px;font-weight:700;flex:1;letter-spacing:-.01em;}\n.drawer-close{width:28px;height:28px;border-radius:5px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}\n.drawer-close:hover{background:var(--bg);}\n.drawer-bd{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}\n.hcard-chev{cursor:pointer;}\n\n/* ── HỌC SỬ (Tab 2) ── */\n.hist-bar{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;}\n.hist-period{font-size:13px;font-weight:700;color:var(--ink);padding-bottom:7px;}\n.hist-period .hp-pre{font-weight:600;color:var(--ink-faint);margin-right:5px;}\n.hist-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}\n.hist-grid.hist-grid-3{grid-template-columns:repeat(3,1fr);}\n.hist-card .card-hd{border-bottom:1px solid var(--line-soft);}\n.hist-chart{height:208px;position:relative;padding:14px 14px 2px;}\n.hist-stats{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:1px;background:var(--line-soft);border-top:1px solid var(--line-soft);}\n.hist-stat{background:var(--card);padding:11px 15px;display:flex;flex-direction:column;gap:4px;}\n.hist-stat:first-child{border-radius:0 0 0 var(--radius);}\n.hist-stat:last-child{border-radius:0 0 var(--radius) 0;}\n.hist-stat .sl{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-faint);}\n.hist-stat .sv{font-size:var(--fs-metric);font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--ink);line-height:1;}\n.hist-stat .sv.up{color:var(--c-up);}\n.hist-stat .sv.down{color:var(--c-down);}\n.kpi-cell.good .kpi-num{color:#3FA46A;}\n.hist-chart canvas{cursor:pointer;}\n/* drill-down (dùng chung drawer) */\n.drill-sum{display:flex;flex-direction:column;gap:4px;padding-bottom:12px;border-bottom:1px solid var(--line-soft);}\n.drill-big{font-size:34px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;}\n.drill-cap{font-size:12.5px;color:var(--ink-soft);font-weight:600;}\n.drill-tools{display:flex;align-items:center;gap:10px;}\n.drill-tools .fsel{min-width:172px;}\n.drill-count{font-size:11.5px;color:var(--ink-faint);font-weight:600;margin-left:auto;}\n.drill-pager{display:flex;align-items:center;gap:12px;justify-content:center;padding-top:4px;}\n.drill-pager .btn[disabled]{opacity:.45;cursor:default;}\n.drill-pager .pg{font-size:12px;color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums;}\n/* CLS pipeline (Tab 1) */\n.cps-head{display:flex;align-items:baseline;gap:9px;margin-bottom:15px;}\n.cps-total{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;color:var(--sup-indigo);}\n.cps-total-lbl{font-size:12px;color:var(--ink-soft);font-weight:600;}\n.cls-pipe{display:flex;align-items:stretch;gap:10px;}\n.cps{flex:1;display:flex;flex-direction:column;gap:6px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:box-shadow .15s,border-color .15s;background:var(--card);min-width:0;}\n.cps:hover{box-shadow:0 2px 10px rgba(0,0,0,.09);}\n.cps-top{display:flex;align-items:center;gap:7px;}\n.cps-dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto;}\n.cps-name{font-size:12.5px;font-weight:700;color:var(--ink);flex:1;min-width:0;}\n.cps-step{font-size:10px;font-weight:700;color:var(--ink-faint);}\n.cps-num{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;color:var(--ink);}\n.cps-sub{font-size:11px;color:var(--ink-faint);}\n.cps-bar{height:8px;border-radius:5px;background:var(--track,#edeef2);overflow:hidden;margin-top:4px;}\n.cps-bar > i{display:block;height:100%;border-radius:5px;transition:width .5s;}\n.cps-pct{font-size:11px;color:var(--ink-soft);font-weight:600;}\n.cps-arrow{display:flex;align-items:center;color:var(--line);flex:0 0 auto;}\n.cps-hint{margin-top:13px;font-size:11px;color:var(--ink-faint);}\n.cols-eq{align-items:stretch;}\n.cols-eq > .card{display:flex;flex-direction:column;}\n.cols-eq > .card > .card-bd{flex:1;display:flex;flex-direction:column;justify-content:center;}\n.cols-eq .chart-box{flex:1;min-height:200px;}\n@media (max-width:980px){\n  .hist-grid{grid-template-columns:1fr;}\n  .hist-grid.hist-grid-3{grid-template-columns:1fr;}\n  .cols{grid-template-columns:1fr;}\n}\n\n/* ── 3 DATA TABLES below KPI ── */\n.dtbl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}\n.dtbl-grid.dtbl-grid-2{grid-template-columns:repeat(2,1fr);}\n.dtbl-grid.dtbl-grid-1{grid-template-columns:1fr;}\n@media (max-width:860px){.dtbl-grid,.dtbl-grid.dtbl-grid-2{grid-template-columns:1fr;}}\n.dtbl-grid>.card{min-width:0;}\n.kpi-tri>.card{min-width:0;}\n.dtbl-grid .tbl-wrap{overflow-x:auto;}\n.dtbl-grid table{table-layout:fixed;width:100%;}\n.dtbl-grid td,.dtbl-grid th{overflow:hidden;text-overflow:ellipsis;}\n.dtbl-grid .dtbl-name{max-width:none;display:block;}\n/* left column stacks Hồ sơ table + CLS chart; order tables fill full height */\n.dtbl-fill{align-items:stretch;}\n.dtbl-col-stack{display:flex;flex-direction:column;gap:16px;min-width:0;}\n.dtbl-col-stack>.card{min-width:0;}\n.dtbl-col-stack>.card.chart-fill{flex:1;display:flex;flex-direction:column;}\n.dtbl-col-stack>.card.chart-fill>.card-bd{flex:1;display:flex;flex-direction:column;}\n.dtbl-col-stack>.card.chart-fill .chart-box{flex:1;min-height:330px;height:auto;}\n/* H\\u1ed3 s\\u01a1 table nh\\u1ecf l\\u1ea1i \\u0111\\u1ec3 nh\\u01b0\\u1eddng ch\\u1ed7 cho bi\\u1ec3u \\u0111\\u1ed3 stack ph\\u00eda d\\u01b0\\u1edbi */\n.dtbl-col-stack>.card:not(.chart-fill) .scroll-tbl{height:196px;}\n.dtbl-fill>.card.tbl-fill{display:flex;flex-direction:column;}\n.dtbl-fill>.card.tbl-fill>.tbl-wrap{flex:1;min-height:300px;max-height:560px;overflow-y:auto;}\n.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;line-height:1.5;}\n.badge.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd);}\n.badge.err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd);}\n.badge.blue{background:#dff0f8;color:#1685a3;border:1px solid #b0ddf0;}\n.badge.ok{background:var(--ok-bg);color:#2f7a4f;border:1px solid var(--ok-bd);}\n.hd-counts{display:flex;gap:5px;margin-left:auto;}\n.dtbl-name{font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;max-width:140px;}\n.dtbl-date{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}\n.dtbl-person{font-size:12px;color:var(--ink-soft);}\n.wait-timer{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}\n.wait-timer.ok{color:#2f7a4f;}.wait-timer.warn{color:var(--warn);}.wait-timer.err{color:var(--err);}\n.wait-timer.gray{color:var(--ink-faint);}\n.tbl-more{padding:8px 11px 7px;border-top:1px solid var(--line-soft);text-align:center;}\n.tbl-more a{font-size:12px;color:var(--sup-blue);cursor:pointer;font-weight:500;text-decoration:none;}\n.tbl-more a:hover{text-decoration:underline;}\n.scroll-tbl{height:300px;overflow-y:auto;}\n.scroll-tbl thead th{position:sticky;top:0;z-index:3;}\n.pt-link{color:var(--ink);font-weight:700;}\n.room-strong{color:var(--ink);font-weight:700;}\n.doc-err{color:var(--err);font-weight:700;}\n.doc-warn{color:var(--warn);font-weight:700;}\n/* Hồ sơ chờ ký — bôi cả hàng theo trạng thái */\ntr.hs-row-err td{background:var(--err-bg);color:#9c2231;}\ntr.hs-row-err:hover td{background:#fbdbe0;}\ntr.hs-row-err .pt-link,tr.hs-row-err .dtbl-date,tr.hs-row-err .dtbl-person{color:#9c2231;}\ntr.hs-row-warn td{background:var(--warn-bg);color:#8a6a00;}\ntr.hs-row-warn:hover td{background:#fdefbf;}\ntr.hs-row-warn .pt-link,tr.hs-row-warn .dtbl-date,tr.hs-row-warn .dtbl-person{color:#8a6a00;}\n/* Highlight ngày thực hiện gần nhất — theo màu \"Sắp tới\" của từng loại */\n#card-drug-exec tr.sched-soon td{background:#e0f5f1;}\n#card-drug-exec tr.sched-soon:hover td{background:#cdeee7;}\n#card-drug-exec tr.sched-soon .th-soon{color:#0D9488;font-weight:800;}\n#card-cls-exec tr.sched-soon td{background:#eaf1fd;}\n#card-cls-exec tr.sched-soon:hover td{background:#dde8fb;}\n#card-cls-exec tr.sched-soon .th-soon{color:#2563EB;font-weight:800;}\n.th-soon{color:var(--warn);font-weight:800;}\n\n/* Đầu cột bảng đậm & tô màu theo KPI scorecard tương ứng */\n#card-hs-sign thead th{color:#024593;font-weight:800;}\n#card-drug-exec thead th{color:#0D9488;font-weight:800;}\n#card-cls-exec thead th{color:#2563EB;font-weight:800;}\n\n.gpb-tag{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;background:#f3edfb;color:#6b3ea0;border:1px solid #ddc9f0;vertical-align:middle;}\n\n/* ── KPI scorecard (Tab 1): số tô màu ngưỡng · nhãn trung tính · icon theo trạng thái ── */\n.kpi-tri .kpi-cell .kpi-num,.kpi-tri .kpi-cell .kpi-lbl{color:var(--ink);}\n.kpi-tri .kpi-cell .kpi-lbl .sw{display:none;}\n.kpi-tri .kpi-cell .kpi-lbl .ic{display:inline-flex;}\n.kpi-tri .kpi-cell.today .kpi-lbl .ic{color:#3FA46A;}\n.kpi-tri .kpi-cell.sap .kpi-lbl .ic{color:var(--warn);}\n.kpi-tri .kpi-cell.err .kpi-lbl .ic{color:var(--err);}\n.kpi-tri .kpi-cell.err .kpi-num{color:var(--err);}\n.kpi-tri .kpi-cell.sap .kpi-num{color:var(--warn);}\n\n/* mini progress bar + footnote trong ô Hồ sơ */\n.kpi-mini{height:5px;border-radius:3px;background:var(--track,#edeef2);overflow:hidden;margin-top:7px;}\n.kpi-mini > i{display:block;height:100%;border-radius:3px;width:0;transition:width .5s;}\n.kpi-cell.today .kpi-mini > i{background:#3FA46A;}\n.kpi-cell.sap .kpi-mini > i{background:var(--warn);}\n.kpi-cell.err .kpi-mini > i{background:var(--err);}\n.kpi-foot2{font-size:10px;color:var(--ink-faint);margin-top:6px;}\n\n/* ── tiêu điểm khi click thanh tiêu đề card KPI (bôi mờ phần còn lại) ── */\n.kpi-tri .card{transition:opacity .25s,filter .25s,box-shadow .2s;}\n.kpi-tri .card-hd{cursor:pointer;}\n.kpi-tri .card-hd:hover{background:var(--bg);}\n.dimmed{opacity:.24;filter:blur(1.2px);transition:opacity .25s,filter .25s;}\n.card.dimmed{pointer-events:none;}\n.kpi-tri .card.dimmed{pointer-events:auto;}\n.kpi-tri .card.dimmed .card-hd{pointer-events:auto;}\nbody.kpi-focus .card.lit{box-shadow:0 0 0 2px var(--sup-blue),0 8px 22px rgba(32,167,201,.14);}\n.card.lit{transition:box-shadow .2s;}\n.kpi-focus-clear{display:none;}\nbody.kpi-focus .kpi-focus-clear{display:inline-flex;align-items:center;gap:7px;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;background:var(--sup-blue);color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:22px;cursor:pointer;box-shadow:0 6px 20px rgba(32,167,201,.32);border:none;font-family:inherit;}\nbody.kpi-focus .kpi-focus-clear:hover{background:#013a7e;}\n\n/* ── thanh cuộn bảng: mảnh hơn ── */\n.scroll-tbl{scrollbar-width:thin;scrollbar-color:rgba(42,47,66,.28) transparent;}\n.scroll-tbl::-webkit-scrollbar{width:6px;height:6px;}\n.scroll-tbl::-webkit-scrollbar-thumb{background:rgba(42,47,66,.24);border-radius:4px;}\n.scroll-tbl::-webkit-scrollbar-thumb:hover{background:rgba(42,47,66,.4);}\n.scroll-tbl::-webkit-scrollbar-track{background:transparent;}\n\n/* ── danh sách thời gian chờ trả kết quả theo chỉ định CLS (xếp hạng) ── */\n.cls-wait-list{display:flex;flex-direction:column;}\n.cwrow{display:flex;align-items:center;gap:12px;padding:8px 2px;}\n.cwrow+.cwrow{border-top:1px solid var(--line-soft);}\n.cw-rank{width:22px;height:22px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink-soft);flex:0 0 auto;font-variant-numeric:tabular-nums;}\n.cwrow.top .cw-rank{background:var(--err-bg);color:var(--err);}\n.cw-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px;}\n.cw-top{display:flex;align-items:baseline;gap:10px;}\n.cw-name{font-size:12.5px;font-weight:600;color:var(--ink);flex:1;min-width:0;}\n.cw-time{font-size:16px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--ink-soft);line-height:1;}\n.cwrow.top .cw-time{color:var(--err);}\n.cw-track{height:8px;border-radius:5px;background:var(--track,#edeef2);overflow:hidden;}\n.cw-fill{display:block;height:100%;border-radius:5px;background:#aeb3c2;transition:width .45s;}\n.cwrow.top .cw-fill{background:var(--err);}\n\n/* ── liên kết mã phiếu + chi tiết phiếu thuốc (drawer) ── */\n.slip-link{color:var(--sup-blue);font-weight:700;cursor:pointer;text-decoration:none;font-variant-numeric:tabular-nums;}\n.slip-link:hover{text-decoration:underline;}\n.slip-list{display:flex;flex-direction:column;gap:11px;}\n.slip-item{border:1px solid var(--line);border-radius:6px;background:var(--card);overflow:hidden;}\n.slip-item-hd{display:flex;align-items:baseline;gap:8px;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--line-soft);}\n.slip-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;letter-spacing:-.01em;}\n.slip-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;padding:11px 12px;font-size:12.5px;color:var(--ink);font-weight:600;}\n.slip-grid .hd-lbl{display:block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n  <!-- ═════════ MAIN ═════════ -->\n  <div class=\"main\">\n    <div class=\"topbar\">\n      <div class=\"topbar-row\">\n        <img class=\"topbar-logo\" src=\"d5f440d4-9663-4460-88d0-841e5fe2266e\" alt=\"Bệnh viện Ung Bướu Hà Nội\">\n        <div class=\"topbar-divider\"><\u002Fdiv>\n        <span class=\"topbar-title\">Theo dõi Hồ sơ, tờ điều trị và Y lệnh Nội trú<\u002Fspan>\n        <div class=\"topbar-right\">\n          <div class=\"clock-bar\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polyline points=\"12 7 12 12 15.5 14\"><\u002Fpolyline><\u002Fsvg>\n            <span class=\"ct\" id=\"clock-now\">—<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ═════════ FILTER BAR (above tabs) ═════════ -->\n      <div class=\"fbar-h\">\n        <div class=\"fhg\">\n          <span class=\"fhg-lbl\">Khoa<\u002Fspan>\n          <select class=\"fsel\" id=\"f-khoa\">\n            <option value=\"all\">Tất cả các khoa<\u002Foption>\n            <option value=\"timmach\" selected=\"\">Khoa Nội tổng hợp<\u002Foption>\n            <option value=\"ngoai\">Khoa Nội Phổi - Vú<\u002Foption>\n            <option value=\"san\">Khoa Vật lý - Xạ trị<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"fhg\">\n          <span class=\"fhg-lbl\">Tên cán bộ<\u002Fspan>\n          <div class=\"ms\" id=\"f-staff-ms\">\n            <button type=\"button\" class=\"ms-trigger fsel\" id=\"f-staff-trigger\" aria-haspopup=\"true\" aria-expanded=\"false\">\n              <span class=\"ms-trigger-txt\" id=\"f-staff-txt\">Tất cả cán bộ<\u002Fspan>\n            <\u002Fbutton>\n            <div class=\"ms-pop\" id=\"f-staff-pop\" hidden=\"\">\n              <div class=\"ms-pop-hd\">\n                <input type=\"text\" class=\"ms-search\" id=\"f-staff-search\" placeholder=\"Tìm tên hoặc mã cán bộ…\" autocomplete=\"off\">\n              <\u002Fdiv>\n              <div class=\"ms-list\" id=\"f-staff-list\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <input type=\"hidden\" id=\"f-staff\" value=\"\">\n        <\u002Fdiv>\n        <div class=\"fhg\">\n          <span class=\"fhg-lbl\">Thời gian thực hiện<\u002Fspan>\n          <select class=\"fsel\" id=\"f-exec-when\">\n            <option value=\"today\" selected=\"\">Hôm nay<\u002Foption>\n            <option value=\"sched\">Sắp tới<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"fhg\">\n          <span class=\"fhg-lbl\">Dịch vụ CLS<\u002Fspan>\n          <div class=\"ms\" id=\"f-cls\">\n            <button type=\"button\" class=\"ms-trigger fsel\" id=\"f-cls-trigger\" aria-haspopup=\"true\" aria-expanded=\"false\">\n              <span class=\"ms-trigger-txt\" id=\"f-cls-txt\">Tất cả dịch vụ<\u002Fspan>\n            <\u002Fbutton>\n            <div class=\"ms-pop\" id=\"f-cls-pop\" hidden=\"\">\n              <div class=\"ms-pop-hd\">\n                <input type=\"text\" class=\"ms-search\" id=\"f-cls-search\" placeholder=\"Tìm nhóm / dịch vụ…\" autocomplete=\"off\">\n              <\u002Fdiv>\n              <div class=\"ms-pop-tools\">\n                <button type=\"button\" class=\"ms-mini\" data-act=\"all\">Chọn tất cả<\u002Fbutton>\n                <button type=\"button\" class=\"ms-mini\" data-act=\"none\">Bỏ chọn<\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"ms-list\" id=\"f-cls-list\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fhg\">\n          <span class=\"fhg-lbl\">Trạng thái thực hiện<\u002Fspan>\n          <select class=\"fsel\" id=\"f-cls-status\">\n            <option value=\"all\" selected=\"\">Tất cả trạng thái<\u002Foption>\n            <option value=\"pending\">Chờ thực hiện (CLS)<\u002Foption>\n            <option value=\"inprog\">Chờ kết quả (CLS)<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <button class=\"btn\" id=\"f-clear\">Xóa lọc<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"tabs\">\n        <div class=\"tab active\" data-tab=\"t1\"><span class=\"live\"><span class=\"dot\"><\u002Fspan><\u002Fspan>Hiện tại<\u002Fdiv>\n        <div class=\"tab\" data-tab=\"t2\">Tổng quan<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"board\">\n\n      <!-- ════════ TAB 1 — TỔNG QUAN ════════ -->\n      <section class=\"pane active\" id=\"t1\" data-screen-label=\"Tab 1 · Tổng quan\">\n\n        <!-- KPI SCORECARD — thời gian thực (tách Hồ sơ ↔ Y lệnh) -->\n        <div class=\"kpi-tri\">\n          <!-- Hồ sơ / Tờ điều trị -->\n          <div class=\"card\" id=\"kpi-card-hs\">\n            <div class=\"card-hd\"><span class=\"hd-ic\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 3v5h5\"><\u002Fpath><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"><\u002Fline><line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Hồ sơ, tờ điều trị<\u002Fspan><span class=\"live\" title=\"Cập nhật trực tiếp\"><span class=\"dot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"kpi-grid kpi-grid-3\">\n              <div class=\"kpi-cell today\" data-focus=\"hs\"><div class=\"kpi-lbl\"><span class=\"ic\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8.4 12.2l2.4 2.4 4.8-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>Trong hạn ký<\u002Fdiv><div class=\"kpi-num\" id=\"k-hs-today\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell sap\" data-focus=\"hs\"><div class=\"kpi-lbl\"><span class=\"ic\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polyline points=\"12 7 12 12 15.5 14\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Sắp quá hạn ký<\u002Fdiv><div class=\"kpi-num\" id=\"k-hs-w12\">—<\u002Fdiv><div class=\"kpi-foot2\">còn &lt; 12 giờ để ký<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell err\" data-focus=\"hs\"><div class=\"kpi-lbl\"><span class=\"ic\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13.5\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan>Quá hạn ký<\u002Fdiv><div class=\"kpi-num\" id=\"k-hs-o24\">—<\u002Fdiv><div class=\"kpi-foot2\">đã quá 24h · xử lý ngay<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Y lệnh thuốc -->\n          <div class=\"card\" id=\"kpi-card-drug\">\n            <div class=\"card-hd\"><span class=\"hd-ic\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7z\"><\u002Fpath><line x1=\"8.5\" y1=\"8.5\" x2=\"15.5\" y2=\"15.5\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Y lệnh thuốc<\u002Fspan><span class=\"live\" title=\"Cập nhật trực tiếp\"><span class=\"dot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"kpi-grid kpi-grid-3\">\n              <div class=\"kpi-cell today\" data-focus=\"drug\"><div class=\"kpi-lbl\">Cần thực hiện<\u002Fdiv><div class=\"kpi-num\" id=\"k-tp-today\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell chua\" data-focus=\"drug\"><div class=\"kpi-lbl\">Cần thực hiện hôm nay<\u002Fdiv><div class=\"kpi-num\" id=\"k-tp-pend\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell good\" data-focus=\"drug\"><div class=\"kpi-lbl\">Cần thực hiện sắp tới<\u002Fdiv><div class=\"kpi-num\" id=\"k-tp-done\">—<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Y lệnh cận lâm sàng -->\n          <div class=\"card\" id=\"kpi-card-cls\">\n            <div class=\"card-hd\"><span class=\"hd-ic\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 3h6\"><\u002Fpath><path d=\"M10 3v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-8.5V3\"><\u002Fpath><line x1=\"7.5\" y1=\"14\" x2=\"16.5\" y2=\"14\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Y lệnh cận lâm sàng<\u002Fspan><span class=\"live\" title=\"Cập nhật trực tiếp\"><span class=\"dot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"kpi-grid kpi-grid-3\">\n              <div class=\"kpi-cell today\" data-focus=\"cls\"><div class=\"kpi-lbl\">Cần thực hiện<\u002Fdiv><div class=\"kpi-num\" id=\"k-cp-today\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell chua\" data-focus=\"cls\"><div class=\"kpi-lbl\">Cần thực hiện hôm nay<\u002Fdiv><div class=\"kpi-num\" id=\"k-cp-pend\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"kpi-cell good\" data-focus=\"cls\"><div class=\"kpi-lbl\">Cần thực hiện sắp tới<\u002Fdiv><div class=\"kpi-num\" id=\"k-cp-done\">—<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" class=\"kpi-focus-clear\" id=\"kpi-focus-clear\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><\u002Fsvg>Bỏ tiêu điểm<\u002Fbutton>\n\n        <!-- ─── 3 TABLES: Hồ sơ / Y lệnh thuốc / Cận lâm sàng ─── -->\n        <div class=\"dtbl-grid dtbl-fill\">\n\n          <div class=\"dtbl-col-stack\">\n          <!-- BẢNG 1: Hồ sơ, tờ điều trị cần ký -->\n          <div class=\"card\" id=\"card-hs-sign\">\n            <div class=\"card-hd\">\n              <span class=\"ct\">Hồ sơ, tờ điều trị chờ ký<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"tbl-wrap scroll-tbl\">\n              <table>\n                <colgroup><col style=\"width:24%\"><col style=\"width:24%\"><col style=\"width:30%\"><col style=\"width:22%\"><\u002Fcolgroup>\n                <thead><tr>\n                  <th>Ngày tạo<\u002Fth>\n                  <th>Mã hồ sơ<\u002Fth>\n                  <th>Người bệnh<\u002Fth>\n                  <th>Người tạo<\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody id=\"tb-hs-sign\"><\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- BAR ngang: chỉ định CLS nhiều nhất (dưới bảng Hồ sơ) -->\n          <div class=\"card chart-fill\" id=\"card-cls-chart\">\n            <div class=\"card-hd\"><span class=\"ct\">Theo dõi tổng quan Quy trình CLS<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv>\n            <div class=\"card-bd\"><div class=\"chart-box\"><canvas id=\"c-cls-bar\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n            <div class=\"tfoot-note\"><span id=\"foot-cls-bar\">—<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- BẢNG 2: Y lệnh thuốc cần thực hiện -->\n          <div class=\"card tbl-fill\" id=\"card-drug-exec\">\n            <div class=\"card-hd\">\n              <span class=\"ct\">Y lệnh thuốc cần thực hiện<\u002Fspan>\n              <span class=\"ct-ctx\" id=\"drug-exec-cnt\" style=\"margin-left:auto\"><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"tbl-wrap scroll-tbl\">\n              <table>\n                <colgroup><col style=\"width:18%\"><col style=\"width:15%\"><col style=\"width:27%\"><col style=\"width:24%\"><col style=\"width:16%\"><\u002Fcolgroup>\n                <thead><tr>\n                  <th>Ngày TH<\u002Fth>\n                  <th>Mã phiếu<\u002Fth>\n                  <th>Khoa chỉ định<\u002Fth>\n                  <th>Người bệnh<\u002Fth>\n                  <th>Phòng<\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody id=\"tb-drug-exec\"><\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- BẢNG 3: Y lệnh cận lâm sàng cần thực hiện -->\n          <div class=\"card tbl-fill\" id=\"card-cls-exec\">\n            <div class=\"card-hd\">\n              <span class=\"ct\">Y lệnh CLS cần thực hiện<\u002Fspan>\n              <span class=\"ct-ctx\" id=\"cls-exec-cnt\" style=\"margin-left:auto\"><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"tbl-wrap scroll-tbl\">\n              <table>\n                <colgroup><col style=\"width:15%\"><col style=\"width:13%\"><col style=\"width:24%\"><col style=\"width:20%\"><col style=\"width:13%\"><col style=\"width:15%\"><\u002Fcolgroup>\n                <thead><tr>\n                  <th>Ngày TH<\u002Fth>\n                  <th>Mã phiếu<\u002Fth>\n                  <th>Khoa chỉ định<\u002Fth>\n                  <th>Người bệnh<\u002Fth>\n                  <th>Phòng<\u002Fth>\n                  <th class=\"c\" id=\"cls-exec-wait-th\">Thời gian chờ<\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody id=\"tb-cls-exec\"><\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n        <!-- /3 TABLES -->\n\n      <\u002Fsection>\n\n      <!-- ════════ TAB 2 — LỊCH SỬ ════════ -->\n      <section class=\"pane\" id=\"t2\" data-screen-label=\"Tab 2 · Lịch sử\">\n        <div class=\"hist-bar\">\n          <div class=\"fhg\">\n            <span class=\"fhg-lbl\">Khoảng thời gian<\u002Fspan>\n            <div class=\"seg\" id=\"hist-range\">\n              <button class=\"seg-btn\" data-r=\"day\">Ngày<\u002Fbutton>\n              <button class=\"seg-btn\" data-r=\"week\">Tuần<\u002Fbutton>\n              <button class=\"seg-btn active\" data-r=\"month\">Tháng<\u002Fbutton>\n              <button class=\"seg-btn\" data-r=\"quarter\">Quý<\u002Fbutton>\n              <button class=\"seg-btn\" data-r=\"year\">Năm<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"hist-period\" id=\"hist-period\"><\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- ───── NHÓM HỒ SƠ / TỜ ĐIỀU TRỊ ───── -->\n        <div class=\"col-hd\"><span>Hồ sơ / Tờ điều trị<\u002Fspan><span class=\"ln\"><\u002Fspan><\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"kpi-grid kpi-grid-3\" id=\"hist-kpi-hs\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hist-grid hist-grid-3\">\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Hồ sơ / Tờ điều trị phát sinh<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-hs\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-hs-stats\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Hồ sơ ký đúng hạn<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-hson\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-hson-stats\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Hồ sơ ký quá hạn<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-hsov\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-hsov-stats\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ───── NHÓM Y LỆNH ───── -->\n        <div class=\"col-hd\"><span>Y lệnh<\u002Fspan><span class=\"ln\"><\u002Fspan><\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"kpi-grid kpi-grid-4\" id=\"hist-kpi-yl\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hist-grid hist-grid-3\">\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Khối lượng Y lệnh mới (Thuốc + CLS)<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-yl\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-yl-stats\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Khối lượng Y lệnh Thuốc<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-ylon\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-ylon-stats\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card hist-card\"><div class=\"card-hd\"><span class=\"ct\">Thời gian chờ TB Cận Lâm Sàng<\u002Fspan><span class=\"kebab\">⋯<\u002Fspan><\u002Fdiv><div class=\"hist-chart\"><canvas id=\"h-clsov\"><\u002Fcanvas><\u002Fdiv><div class=\"hist-stats\" id=\"h-clsov-stats\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═════════ SIDE DRAWER — chi tiết hồ sơ / tờ điều trị ═════════ -->\n<div class=\"drawer-scrim\" id=\"hs-scrim\"><\u002Fdiv>\n<aside class=\"drawer\" id=\"hs-drawer\" aria-hidden=\"true\">\n  <div class=\"drawer-hd\">\n    <span class=\"drawer-ttl\" id=\"hs-drawer-ttl\">Chi tiết Hồ sơ / Tờ điều trị<\u002Fspan>\n    <button class=\"drawer-close\" id=\"hs-drawer-close\" aria-label=\"Đóng\">✕<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"drawer-bd\" id=\"hs-drawer-bd\"><\u002Fdiv>\n<\u002Faside>\n\n<script src=\"79915576-6f9f-4b47-8f8e-904e3e897bf9\"><\u002Fscript>\n<script src=\"19b9198b-a8f2-4da9-af39-2ae66c7fbed1\"><\u002Fscript>\n<script src=\"683b6237-6b50-4e0a-8748-1f0891f5a6cc\"><\u002Fscript>\n<script src=\"b2a1d76c-5c44-416f-bcd4-046ec65b1ae7\"><\u002Fscript>\n<script>\n/* ── Countdown timer cho bảng Cận lâm sàng ── */\n(function(){\n  var pageLoad = Date.now();\n  function updateTimers() {\n    document.querySelectorAll('.wait-timer[data-offset]').forEach(function(el) {\n      var baseMin = parseInt(el.dataset.offset, 10);\n      var addMin  = Math.floor((Date.now() - pageLoad) / 60000);\n      var total   = baseMin + addMin;\n      var redmin  = parseInt(el.dataset.redmin, 10) || 180;  // ngưỡng tô đỏ\n      if (total >= 1440) {                                   // ≥ 1 ngày (GPB / sinh thiết)\n        var d = Math.floor(total / 1440), hd = Math.floor((total % 1440) / 60);\n        el.textContent = d + 'ng ' + hd + 'g';\n      } else {\n        var h = Math.floor(total / 60), m = total % 60;\n        el.textContent = h > 0 ? h + 'g ' + m + 'ph' : m + 'ph';\n      }\n      el.className = 'wait-timer ' + (el.dataset.gray === '1' ? 'gray' : (total >= redmin ? 'err' : total >= redmin * 0.66 ? 'warn' : 'ok'));\n    });\n  }\n  updateTimers();\n  setInterval(updateTimers, 30000);\n  window.refreshWaitTimers = updateTimers;\n})();\n\n/* ── Lọc dịch vụ CLS (multi-select có nhóm) ── */\n(function(){\n  var GROUPS = [\n    { name:'Xét nghiệm', children:['Huyết học','Hóa sinh','Vi sinh','HIV','HCV','HBsAg','Protein dịch','Huyết đồ','Tủy đồ','Miễn dịch','Xét nghiệm khác','Xét nghiệm HPV'] },\n    { name:'Chẩn đoán hình ảnh', children:[] },\n    { name:'Y học hạt nhân', children:[] },\n    { name:'Thăm dò chức năng', children:[] },\n    { name:'Giải phẫu bệnh', children:[] },\n    { name:'Truyền máu', children:[] }\n  ];\n  var ms = document.getElementById('f-cls');\n  if(!ms) return;\n  var trigger = document.getElementById('f-cls-trigger');\n  var pop     = document.getElementById('f-cls-pop');\n  var listEl  = document.getElementById('f-cls-list');\n  var txtEl   = document.getElementById('f-cls-txt');\n  var searchEl= document.getElementById('f-cls-search');\n  var sel = {};          // {label:true}\n  var collapsed = {};    // {groupName:true}\n\n  var TICK = '<svg class=\"tick\" width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>'\n           + '<svg class=\"dash\" width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.2\" stroke-linecap=\"round\"><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"/><\u002Fsvg>';\n  var CHEV = '<svg width=\"9\" height=\"9\" viewBox=\"0 0 12 8\"><path d=\"M1 1.5 6 6.5 11 1.5\" stroke=\"currentColor\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>';\n\n  function allLeaves(){\n    var out=[];\n    GROUPS.forEach(function(g){ g.children.length ? g.children.forEach(function(c){out.push(c);}) : out.push(g.name); });\n    return out;\n  }\n  function leavesOf(g){ return g.children.length ? g.children.slice() : [g.name]; }\n\n  function render(){\n    var q = (searchEl.value||'').trim().toLowerCase();\n    listEl.innerHTML='';\n    var shown=0;\n    GROUPS.forEach(function(g){\n      var leaves = leavesOf(g);\n      var chkCount = leaves.filter(function(l){return sel[l];}).length;\n      var parentMatch = g.name.toLowerCase().indexOf(q)>=0;\n      var kids = g.children.filter(function(c){ return !q || parentMatch || c.toLowerCase().indexOf(q)>=0; });\n      if(q && !parentMatch && kids.length===0) return;\n      shown++;\n\n      var p = document.createElement('div');\n      p.className='ms-opt parent'+(chkCount===leaves.length?' checked':(chkCount>0?' indet':''))+(collapsed[g.name]?' collapsed':'');\n      var chev = g.children.length ? '<span class=\"ms-grp-toggle\" data-tog=\"'+g.name+'\">'+CHEV+'<\u002Fspan>' : '<span class=\"ms-grp-toggle\"><\u002Fspan>';\n      p.innerHTML='<span class=\"cbx\">'+TICK+'<\u002Fspan><span class=\"nm\">'+g.name+'<\u002Fspan>'+chev;\n      p.querySelector('.cbx').addEventListener('click', function(e){ e.stopPropagation(); toggleGroup(g, chkCount!==leaves.length); });\n      p.querySelector('.nm').addEventListener('click', function(e){ e.stopPropagation(); toggleGroup(g, chkCount!==leaves.length); });\n      var tog=p.querySelector('[data-tog]');\n      if(tog) tog.addEventListener('click', function(e){ e.stopPropagation(); collapsed[g.name]=!collapsed[g.name]; render(); });\n      listEl.appendChild(p);\n\n      if(g.children.length && !collapsed[g.name]){\n        kids.forEach(function(c){\n          var el=document.createElement('div');\n          el.className='ms-opt child'+(sel[c]?' checked':'');\n          el.innerHTML='<span class=\"cbx\">'+TICK+'<\u002Fspan><span class=\"nm\">'+c+'<\u002Fspan>';\n          el.addEventListener('click', function(e){ e.stopPropagation(); sel[c]=!sel[c]; if(!sel[c]) delete sel[c]; render(); syncSummary(); notifyChange(); });\n          listEl.appendChild(el);\n        });\n      }\n    });\n    if(!shown) listEl.innerHTML='<div class=\"ms-empty\">Không tìm thấy dịch vụ<\u002Fdiv>';\n  }\n  function toggleGroup(g, on){\n    leavesOf(g).forEach(function(l){ if(on) sel[l]=true; else delete sel[l]; });\n    render(); syncSummary(); notifyChange();\n  }\n  function activeGroups(){\n    var out=[];\n    GROUPS.forEach(function(g){ if(leavesOf(g).some(function(l){return sel[l];})) out.push(g.name); });\n    return out;\n  }\n  function notifyChange(){\n    if(window.setClsServiceFilter) window.setClsServiceFilter(activeGroups());\n  }\n  function syncSummary(){\n    var n=Object.keys(sel).length;\n    var total=allLeaves().length;\n    trigger.querySelector('.ms-count')&&trigger.querySelector('.ms-count').remove();\n    if(n===0){ txtEl.textContent='Tất cả dịch vụ'; return; }\n    if(n===total){ txtEl.textContent='Tất cả dịch vụ'; return; }\n    // ưu tiên hiển thị tên nhóm nếu chọn trọn nhóm\n    var labels=[];\n    GROUPS.forEach(function(g){ var lv=leavesOf(g); if(lv.every(function(l){return sel[l];})) labels.push(g.name); });\n    var covered={}; GROUPS.forEach(function(g){ var lv=leavesOf(g); if(lv.every(function(l){return sel[l];})) lv.forEach(function(l){covered[l]=1;}); });\n    Object.keys(sel).forEach(function(l){ if(!covered[l]) labels.push(l); });\n    txtEl.textContent = labels.join(', ');\n    var badge=document.createElement('span'); badge.className='ms-count'; badge.textContent=n;\n    trigger.appendChild(badge);\n  }\n  function open(){ ms.classList.add('open'); pop.hidden=false; trigger.setAttribute('aria-expanded','true'); render(); searchEl.focus(); }\n  function close(){ ms.classList.remove('open'); pop.hidden=true; trigger.setAttribute('aria-expanded','false'); searchEl.value=''; }\n\n  trigger.addEventListener('click', function(e){ e.stopPropagation(); ms.classList.contains('open')?close():open(); });\n  searchEl.addEventListener('input', render);\n  pop.querySelectorAll('.ms-mini').forEach(function(b){\n    b.addEventListener('click', function(){\n      if(b.dataset.act==='all'){ allLeaves().forEach(function(l){sel[l]=true;}); }\n      else { sel={}; }\n      render(); syncSummary(); notifyChange();\n    });\n  });\n  document.addEventListener('click', function(e){ if(ms.classList.contains('open') && !ms.contains(e.target)) close(); });\n  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && ms.classList.contains('open')) close(); });\n\n  var clearBtn=document.getElementById('f-clear');\n  if(clearBtn) clearBtn.addEventListener('click', function(){ sel={}; collapsed={}; syncSummary(); notifyChange(); });\n\n  syncSummary();\n})();\n\n/* ── Bộ lọc Tên cán bộ (chọn 1 · có tìm kiếm, giống bộ lọc CLS) ── */\n(function(){\n  var ms = document.getElementById('f-staff-ms');\n  if(!ms || typeof ALL_DOCS==='undefined') return;\n  var trigger = document.getElementById('f-staff-trigger');\n  var pop     = document.getElementById('f-staff-pop');\n  var listEl  = document.getElementById('f-staff-list');\n  var txtEl   = document.getElementById('f-staff-txt');\n  var searchEl= document.getElementById('f-staff-search');\n  var hidden  = document.getElementById('f-staff');\n\n  function label(d){ return (d.role==='dd'?'ĐD. ':'BS. ') + d.name; }\n  function setStaff(id){\n    hidden.value = id || '';\n    var d = id ? DOC_BY_ID[id] : null;\n    txtEl.textContent = d ? label(d) : 'Tất cả cán bộ';\n    if(typeof applyFilters==='function') applyFilters();\n  }\n  function render(){\n    var q = (searchEl.value||'').trim().toLowerCase();\n    listEl.innerHTML='';\n    var cur = hidden.value;\n    var clr = document.createElement('div');\n    clr.className='ms-opt solo clr'+(cur?'':' sel');\n    clr.innerHTML='<span class=\"nm\">Tất cả cán bộ<\u002Fspan>';\n    clr.addEventListener('click', function(){ setStaff(''); close(); });\n    listEl.appendChild(clr);\n    var shown=0;\n    ALL_DOCS.forEach(function(d){\n      var hay = (d.name+' '+d.id+' '+d.khoaName).toLowerCase();\n      if(q && hay.indexOf(q)<0) return;\n      shown++;\n      var el=document.createElement('div');\n      el.className='ms-opt solo'+(cur===d.id?' sel':'');\n      el.innerHTML='<span class=\"sid\">'+d.id+'<\u002Fspan><span class=\"nm\">'+label(d)+'<\u002Fspan><span class=\"kh\">'+d.khoaName.replace('Khoa ','')+'<\u002Fspan>';\n      el.addEventListener('click', function(){ setStaff(d.id); close(); });\n      listEl.appendChild(el);\n    });\n    if(!shown) { var e=document.createElement('div'); e.className='ms-empty'; e.textContent='Không tìm thấy cán bộ'; listEl.appendChild(e); }\n  }\n  function open(){ ms.classList.add('open'); pop.hidden=false; trigger.setAttribute('aria-expanded','true'); render(); searchEl.focus(); }\n  function close(){ ms.classList.remove('open'); pop.hidden=true; trigger.setAttribute('aria-expanded','false'); searchEl.value=''; }\n\n  trigger.addEventListener('click', function(e){ e.stopPropagation(); ms.classList.contains('open')?close():open(); });\n  searchEl.addEventListener('input', render);\n  document.addEventListener('click', function(e){ if(ms.classList.contains('open') && !ms.contains(e.target)) close(); });\n  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && ms.classList.contains('open')) close(); });\n\n  window.resetStaffPicker = function(){ hidden.value=''; txtEl.textContent='Tất cả cán bộ'; };\n})();\n<\u002Fscript>\n<script>\n/* FIT: scale khung 1920×1080 theo chiều rộng viewport, cuộn dọc nếu dư */\n(function(){\n  function fit(){\n    var base=(document.documentElement.clientWidth||window.innerWidth)*(window.devicePixelRatio||1)/(window.__zd0||(window.__zd0=window.devicePixelRatio||1));\n    var s=base/1920;\n    document.body.style.transform='scale('+s+')';\n    document.documentElement.style.height=(document.body.scrollHeight*s)+'px';\n  }\n  window.addEventListener('resize',fit);\n  window.addEventListener('load',fit);\n  fit();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
