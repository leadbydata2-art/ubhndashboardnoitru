:'nang',lbl:'Nặng theo dõi',sid:'nang-theo-doi',cls:'warn'},\n  {k:'capcuu',lbl:'Vào cấp cứu',sid:'vao-cap-cuu',cls:'warn'},\n  {k:'mocapcuu',lbl:'Mổ cấp cứu',sid:'mo-cap-cuu',cls:'crit'},\n  {k:'tuvong',lbl:'Tử vong',sid:'tuvong',cls:'crit'},\n  {k:'nangxinve',lbl:'Nặng xin về',sid:'nang-xin-ve',cls:'warn'},\n  {k:'chuyenvien',lbl:'Chuyển viện',sid:'chuyen-vien',cls:'warn'}\n];\nfunction khoaFlow(d){\n  const vao = d.vaoTotal;\n  const ra = d.ra.hetdot + d.ra.tamdung;\n  const cv = d.ra.chuyenvien, tv = d.ra.tuvong, xv = d.ra.xinve;\n  const hienCo = d.tn;\n  const cu = hienCo - vao + ra + cv + tv + xv;\n  return {cu, vao, ra, cv, tv, xv, hienCo};\n}\nfunction scaleParts(parts, r){ return parts.map(p=>[p[0], Math.round(p[1]*r), p[2]]); }\nfunction renderMini(elId, parts){\n  const el = document.getElementById(elId); if(!el) return;\n  const tot = parts.reduce((s,p)=>s+p[1],0) || 1;\n  const bar = parts.map(p=>`<span style=\"width:${(p[1]/tot*100).toFixed(1)}%;background:${p[2]}\"><\u002Fspan>`).join('');\n  const leg = parts.map(p=>`<span class=\"mi\"><i style=\"background:${p[2]}\"><\u002Fi>${p[0]} <b>${fmt(p[1])}<\u002Fb><\u002Fspan>`).join('');\n  el.innerHTML = `<div class=\"op-mini-bar\">${bar}<\u002Fdiv><div class=\"op-mini-leg\">${leg}<\u002Fdiv>`;\n}\nfunction setKcNum(id,v){ const e=document.getElementById(id); if(e) e.textContent=fmt(v); }\nfunction setKcDelta(id,d){ const e=document.getElementById(id); if(!e) return;\n  e.textContent=(d>0?'↑':d<0?'↓':'')+fmt(Math.abs(d));\n  e.className='kc-delta-val'+(d>0?' c-up':d<0?' c-down':''); }\nfunction setAlertStrip(a){\n  const el=document.getElementById('asChips'); if(!el) return; let total=0;\n  el.innerHTML = ALERT_DEFS.map(x=>{ const v=a[x.k]||0; total+=v;\n    return v>0\n      ? `<div class=\"as-chip ${x.cls}\" onclick=\"openCbhdSidebar('${x.sid}')\"><span class=\"as-chip-lbl\">${x.lbl}<\u002Fspan><span class=\"as-chip-num\">${v}<\u002Fspan><\u002Fdiv>`\n      : `<div class=\"as-chip zero\"><span class=\"as-chip-lbl\">${x.lbl}<\u002Fspan><span class=\"as-chip-num\">0<\u002Fspan><\u002Fdiv>`;\n  }).join('');\n  const t=document.getElementById('asTotal'); if(t) t.textContent=total;\n}\nfunction selectKhoa(key){ _selKhoa = (_selKhoa===key)?null:key; renderLuongTab(); syncNoitru(); }\nfunction clearKhoa(){ _selKhoa=null; const s=document.getElementById('fKhoa'); if(s) s.value='all'; renderLuongTab(); applyFilters(); }\nfunction _timeMult(){\n  return _dayFactor();\n}\nfunction syncNoitru(){\n  const mult = _timeMult();\n  // Bộ lọc Khoa trên header → hệ số thu nhỏ về khoa (census theo khoa, flow theo khoa × kỳ)\n  const topKhoa = (document.getElementById('fKhoa')||{}).value || 'all';\n  const krTop = (topKhoa!=='all' && BASE[topKhoa]) ? BASE[topKhoa].tn[0]/BASE.all.tn[0] : 1;\n  let f, hcParts, ptParts, txParts, mo, tx, ptD, txD, alerts, name=null;\n  const d = _selKhoa ? LUONG_KHOA_DATA.find(x=>x.key===_selKhoa) : null;\n  if(d){\n    f = khoaFlow(d);\n    const r = d.tn / 2177;\n    hcParts = [['BHYT',d.tnBhyt,'#024593'],['Không BHYT',d.tnNon,'#2e8b57']];\n    ptParts = scaleParts(PT_PARTS,r*mult); txParts = scaleParts(TX_PARTS,r*mult);\n    mo=Math.round(25*r*mult); tx=Math.round(206*r*mult); ptD=Math.round(3*r*mult); txD=Math.round(12*r*mult);\n    alerts={nang:Math.round(2*r),capcuu:Math.round(2*r),mocapcuu:Math.round(1*r),tuvong:0,nangxinve:Math.round(8*r),chuyenvien:Math.round(3*r)};\n    name=d.name;\n  } else {\n    _selKhoa=null;\n    const r = krTop;\n    // Census + luồng trong ngày co theo khoa (giữ cân đối cu + vào − ra = hiện có)\n    f={cu:Math.round(2199*r),vao:Math.round(406*r),ra:Math.round(417*r),cv:Math.round(3*r),tv:0,xv:Math.round(8*r),hienCo:Math.round(2177*r)};\n    hcParts=scaleParts(HC_PARTS,r);\n    // Phẫu thuật / Tia xạ là tổng theo kỳ → nhân thêm hệ số thời gian\n    ptParts=scaleParts(PT_PARTS,r*mult); txParts=scaleParts(TX_PARTS,r*mult);\n    mo=Math.round(25*r*mult); tx=Math.round(206*r*mult); ptD=Math.round(3*r*mult); txD=Math.round(12*r*mult);\n    alerts={nang:Math.round(2*r),capcuu:Math.round(2*r),mocapcuu:Math.round(1*r),tuvong:0,nangxinve:Math.round(8*r),chuyenvien:Math.round(3*r)};\n    name = (topKhoa!=='all' && BASE[topKhoa]) ? BASE[topKhoa].name : null;\n  }\n  _wfData={cu:f.cu,vao:f.vao,ra:f.ra,cv:f.cv,tv:f.tv,xv:f.xv};\n  setKcNum('kc-tnc',f.hienCo); setKcDelta('kc-tnc-delta', f.hienCo - f.cu); renderMini('kc-tnc-mini',hcParts);\n  setKcNum('kc-pt',mo); setKcDelta('kc-pt-delta',ptD); renderMini('kc-pt-mini',ptParts);\n  setKcNum('kc-tx',tx); setKcDelta('kc-tx-delta',txD); renderMini('kc-tx-mini',txParts);\n  setAlertStrip(alerts);\n  renderWaterfall();\n  const b=document.getElementById('xfBanner');\n  if(b){ if(name){ b.style.display='flex'; const n=document.getElementById('xfName'); if(n) n.textContent=name; } else b.style.display='none'; }\n}\n\nfunction lkSetTab(tab) {\n  _lkTab = tab;\n  document.querySelectorAll('.lkv-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));\n  const t = document.getElementById('lkvTitle');\n  if (t) t.textContent = LKV_TITLES[tab] || '';\n  renderLuongTab();\n}\n\nfunction renderLuongTab() {\n  const el = document.getElementById('lkRows');\n  const legEl = document.getElementById('lkvLegend');\n  const headEl = document.getElementById('lkvHead');\n  if (!el) return;\n  el.classList.toggle('has-sel', !!_selKhoa);\n\n  const leg = LKV_LEGS[_lkTab];\n  if (legEl) legEl.innerHTML = (_lkTab==='cs' || !leg) ? '' : `<div class=\"lkv-legend\">${leg.map(i=>`<span><i style=\"background:${i.c}\"><\u002Fi>${i.l}<\u002Fspan>`).join('')}<\u002Fdiv>`;\n\n  if (headEl) {\n    if (_lkTab === 'cs') {\n      headEl.innerHTML = `<div class=\"lkv-thead t-cs\"><span>Khoa<\u002Fspan><span style=\"text-align:right\">Giường kê<\u002Fspan><span style=\"text-align:right\">Thực nằm<\u002Fspan><span style=\"padding-left:4px\">Công suất<\u002Fspan><span style=\"text-align:right\">%<\u002Fspan><span><\u002Fspan><\u002Fdiv>`;\n    } else if (_lkTab === 'tn') {\n      headEl.innerHTML = `<div class=\"lkv-thead t-tn\"><span>Khoa<\u002Fspan><span><\u002Fspan><span style=\"text-align:right\">Tổng<\u002Fspan><\u002Fdiv>`;\n    } else {\n      const col = _lkTab==='vao' ? 'Nguồn vào' : 'Ra viện';\n      headEl.innerHTML = `<div class=\"lkv-thead t-${_lkTab}\"><span>Khoa<\u002Fspan><span>${col}<\u002Fspan><span style=\"text-align:right\">Tổng<\u002Fspan><span><\u002Fspan><\u002Fdiv>`;\n    }\n  }\n\n  function makeSeg(v, total, color, label) {\n    if (v <= 0 || total <= 0) return '';\n    const pct = v / total * 100;\n    const pctRnd = Math.round(pct);\n    const tooltip = `${label}: ${v} (${pctRnd}%)`;\n    let inner = '';\n    if (pct >= 5) {\n      inner = `${v}`;\n    }\n    return `<div class=\"lkv-seg\" style=\"width:${pct.toFixed(2)}%;background:${color}\" title=\"${tooltip}\"><span class=\"lkv-seg-txt\">${inner}<\u002Fspan><\u002Fdiv>`;\n  }\n\n  const data = _lkTab==='cs' ? BED_CS_DATA.slice() : LUONG_KHOA_DATA.slice(0, 10);\n  if (_lkTab==='cs') data.sort((a,b)=>(b.tn/b.ke)-(a.tn/a.ke));\n  else if (_lkTab==='vao') data.sort((a,b)=>b.vaoTotal-a.vaoTotal);\n  else if (_lkTab==='ra') data.sort((a,b)=>b.raTotal-a.raTotal);\n  else data.sort((a,b)=>b.tn-a.tn);\n  const csMaxPct = _lkTab==='cs' ? Math.max(...data.map(d=>d.tn/d.ke*100), 100) : 100;\n\n  // Variable-length: compute max total for tn/vao/ra tabs\n  const maxTn  = Math.max(...data.map(d => d.tn));\n  const maxVao = Math.max(...data.map(d => d.vaoTotal));\n  const maxRa  = Math.max(...data.map(d => d.raTotal));\n\n  el.innerHTML = data.map(d => {\n    if (_lkTab === 'vao') {\n      const vals = [d.vao.hddt, d.vao.khoa, d.vao.tddt, d.vao.kkb];\n      const labels = ['HĐĐT', 'Từ khoa khác', 'TĐĐT', 'Từ KKB'];\n      const total = d.vaoTotal || 1;\n      const scaleW = (total / maxVao * 100).toFixed(2);\n      const segs = vals.map((v,i) => makeSeg(v, total, LK_VAO_COLORS_NEW[i], labels[i])).join('');\n      return `<div class=\"lkv-row t-vao${d.key===_selKhoa?' lkv-sel':''}\" style=\"cursor:pointer\" onclick=\"selectKhoa('${d.key}')\"><div class=\"lkv-khoa\" title=\"${d.name}\">${d.name}<\u002Fdiv><div class=\"lkv-bar\"><div style=\"flex:0 0 ${scaleW}%;max-width:${scaleW}%;height:100%;display:flex;overflow:hidden;border-radius:5px\">${segs}<\u002Fdiv><\u002Fdiv><div class=\"lkv-total\">${d.vaoTotal}<\u002Fdiv><\u002Fdiv>`;\n    } else if (_lkTab === 'ra') {\n      const vals = [d.ra.hetdot, d.ra.chuyenkhoa, d.ra.tamdung, d.ra.xinve, d.ra.chuyenvien, d.ra.tuvong];\n      const labels = ['Hết đợt', 'Chuyển khoa', 'Tạm dừng', 'Xin về', 'Chuyển viện', 'Tử vong'];\n      const total = d.raTotal || 1;\n      const scaleW = (total / maxRa * 100).toFixed(2);\n      const segs = vals.map((v,i) => makeSeg(v, total, LK_RA_COLORS_NEW[i], labels[i])).join('');\n      return `<div class=\"lkv-row t-ra${d.key===_selKhoa?' lkv-sel':''}\" style=\"cursor:pointer\" onclick=\"selectKhoa('${d.key}')\"><div class=\"lkv-khoa\" title=\"${d.name}\">${d.name}<\u002Fdiv><div class=\"lkv-bar\"><div style=\"flex:0 0 ${scaleW}%;max-width:${scaleW}%;height:100%;display:flex;overflow:hidden;border-radius:5px\">${segs}<\u002Fdiv><\u002Fdiv><div class=\"lkv-total\">${d.raTotal}<\u002Fdiv><\u002Fdiv>`;\n    } else if (_lkTab === 'tn') {\n      const vals = [d.tnBhyt, d.tnNon];\n      const labels = ['BHYT', 'Không BHYT'];\n      const total = d.tn || 1;\n      const scaleW = (total / maxTn * 100).toFixed(2);\n      const segs = vals.map((v,i) => makeSeg(v, total, LK_TN_COLORS[i], labels[i])).join('');\n      return `<div class=\"lkv-row t-tn${d.key===_selKhoa?' lkv-sel':''}\" style=\"cursor:pointer\" onclick=\"selectKhoa('${d.key}')\"><div class=\"lkv-khoa\" title=\"${d.name}\">${d.name}<\u002Fdiv><div class=\"lkv-bar\"><div style=\"flex:0 0 ${scaleW}%;max-width:${scaleW}%;height:100%;display:flex;overflow:hidden;border-radius:5px\">${segs}<\u002Fdiv><\u002Fdiv><div class=\"lkv-total\">${d.tn}<\u002Fdiv><\u002Fdiv>`;\n    } else {\n      const rawPct = d.tn/d.ke*100;\n      const pct = Math.round(rawPct);\n      const cc  = rawPct > 100 ? '#ea232b' : '#024593';\n      const barW  = (rawPct / csMaxPct * 100).toFixed(2);\n      const markW = (100 / csMaxPct * 100).toFixed(2);\n      return `<div class=\"lkv-row t-cs${d.lk&&d.lk===_selKhoa?' lkv-sel':''}\" style=\"cursor:${d.lk?'pointer':'default'}\"${d.lk?` onclick=\"selectKhoa('${d.lk}')\"`:''}><div class=\"lkv-khoa\" title=\"${d.name}\">${d.name}<\u002Fdiv><div class=\"lkv-num\">${d.ke}<\u002Fdiv><div class=\"lkv-num\">${d.tn}<\u002Fdiv><div class=\"lkv-bar\" style=\"position:relative\"><div style=\"width:${barW}%;height:100%;background:${cc};border-radius:5px\"><\u002Fdiv><span style=\"position:absolute;top:0;bottom:0;left:${markW}%;width:1px;background:#94a3b8;opacity:.6\" title=\"Mốc 100%\"><\u002Fspan><\u002Fdiv><div class=\"lkv-cs-pct\" style=\"color:${cc}\">${pct}%<\u002Fdiv><\u002Fdiv>`;\n    }\n  }).join('');\n}\n\n// Init\nrenderClsDetail('xn');\nrenderKhamPanel();\nrenderLuongTab();\nbuildDateOptions();\napplyFilters();\n/* Bọc nội dung vào #stage, scale theo chiều rộng viewport, giữ tỷ lệ, cho cuộn dọc */\n(function(){\n  var stage=document.createElement('div');\n  stage.id='stage';\n  while(document.body.firstChild){ stage.appendChild(document.body.firstChild); }\n  document.body.appendChild(stage);\n  function fit(){\n    /* Mốc = bề rộng khung chuẩn hóa theo devicePixelRatio: bất biến khi đổi mức\n       zoom trình duyệt (để zoom thực sự phóng to/thu nhỏ), chỉ đổi khi khung\n       resize thật (để 100% luôn vừa vặn, không tràn lề). */\n    var base=(document.documentElement.clientWidth||window.innerWidth)*(window.devicePixelRatio||1)/(window.__zd0||(window.__zd0=window.devicePixelRatio||1));\n    var s=base/1920;\n    /* Dùng zoom thay cho transform:scale để position:sticky của header\n       hoạt động đúng (transform trên phần tử cha sẽ phá vỡ sticky). */\n    stage.style.zoom=s;\n    document.body.style.height='';\n  }\n  window.addEventListener('resize',fit);\n  window.addEventListener('load',fit);\n  fit();\n})();\n<\u002Fscript>\n\n  <script src=\"6a6086d3-a880-4434-826f-0ed7ddd82950\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
