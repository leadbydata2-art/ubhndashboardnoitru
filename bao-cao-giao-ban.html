  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er','Segoe UI',system-ui,-apple-system,sans-serif;\n\n  /* ═══ FONT WEIGHTS ═══ */\n  --fw-regular: 400;\n  --fw-medium: 500;\n  --fw-semibold: 600;\n  --fw-bold: 700;\n  --fw-extrabold: 800;\n  /* alias cũ */\n  --fw-reg: 400; --fw-med: 500; --fw-semi: 600; --fw-title: 700;\n  --fw-dashboard-title: 700; --fw-card-title: 700; --fw-kpi-name: 600;\n  --fw-kpi-value: 700; --fw-flow-num: 700; --fw-delta: 700;\n\n  /* ═══ TEXT COLORS (theo vai trò) ═══ */\n  --c-title:  #1f2937;   /* tiêu đề trang / panel / số lớn */\n  --c-label:  #5a6b82;   /* nhãn field / scorecard / KPI */\n  --c-legend: #33415a;   /* nhãn dòng / legend / body */\n  --c-muted:  #9aa7b8;   /* đơn vị / ghi chú / header bảng / trục / phụ đề */\n  --c-up:     #1d9d57;   /* delta tăng */\n  --c-down:   #d24545;   /* delta giảm */\n  --c-primary:#024593;   /* nhấn primary */\n  /* alias cũ */\n  --c-num:    #1f2937;   --c-number: #1f2937;\n  --c-body:   #33415a;\n  --c-faint:  #9aa7b8;\n  --c-delta-up:   #1d9d57;\n  --c-delta-down: #d24545;\n\n  /* ═══ FONT SIZES (type-scale) ═══ */\n  --fs-page-title:   34px;   /* tiêu đề trang có thanh logo */\n  --fs-page-title-sm:20px;   /* tiêu đề trang bản thường */\n  --fs-card-title:   17.5px; /* tiêu đề thẻ / chart */\n  --fs-card-sub:     14.5px; /* phụ đề thẻ */\n  --fs-kpi-label:    15px;   /* tiêu đề KPI */\n  --fs-kpi-value:    34px;   /* số KPI lớn */\n  --fs-kpi-unit:     16px;   /* đơn vị KPI */\n  --fs-metric-sec:   20px;   /* số chỉ số phụ */\n  --fs-delta:        13.5px; /* delta tăng/giảm */\n  --fs-legend:       13.5px; /* legend */\n  --fs-field-label:  15px;   /* nhãn field / scorecard */\n  --fs-axis:         12px;   /* trục / đơn vị / header bảng */\n  --fs-table:        12.5px; /* bảng / danh sách */\n  --fs-chip:         11px;   /* chip / dot legend */\n\n  /* alias cũ → ánh xạ về scale trên */\n  --fs-page-title-logo:  34px;\n  --fs-dash-title:       20px;\n  --fs-dashboard-title:  20px;\n  --fs-kpi-title:        15px;\n  --fs-kpi-name:         15px;\n  --fs-flow-num:         20px;\n  --fs-body:             14.5px;\n  --fs-chip-num:         20px;\n  --fs-chip-lbl:         13px;\n  --fs-caption:          12px;\n  --fs-icd:              12.5px;\n  --fs-svg:              12px;\n  --fs-svg-axis:         12px;\n}\n\n/* Nền tảng chung: font family + số liệu tabular */\nbody{ font-family: var(--font-sans); }\n\n[class*=\"num\"],\n.kpi-value,.kpi-num,.metric-val,.metric-num,.stat-num,\n.kc-value,.kc-pv,.kpi-dnum,.flow-big,.a-num,.act-n,.act-fv,\n.delta,.sc-num,.card-num,\n.mtx td,.btbl td,.btbl th,\n[data-numeric]{\n  font-variant-numeric: tabular-nums;\n}\n\n/* ═══ HELPER CLASSES (dán thẳng lên phần tử) ═══ */\n.t-page-title { font-size:var(--fs-page-title);  font-weight:var(--fw-bold);     color:var(--c-title); letter-spacing:-.01em; }\n.t-dash-title,\n.t-dashboard-title { font-size:var(--fs-page-title-sm); font-weight:var(--fw-bold); color:var(--c-title); letter-spacing:-.01em; }\n.t-card-title { font-size:var(--fs-card-title);  font-weight:var(--fw-bold);     color:var(--c-title); }\n.t-card-sub   { font-size:var(--fs-card-sub);    font-weight:var(--fw-regular);  color:var(--c-muted); }\n.t-kpi-value  { font-size:var(--fs-kpi-value);   font-weight:var(--fw-bold);     color:var(--c-title);\n                line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.01em; }\n.t-kpi-unit   { font-size:var(--fs-kpi-unit);    font-weight:var(--fw-semibold); color:var(--c-muted); }\n.t-kpi-title,\n.t-kpi-name   { font-size:var(--fs-kpi-label);   font-weight:var(--fw-semibold); color:var(--c-label); }\n.t-metric-sec,\n.t-flow-num   { font-size:var(--fs-metric-sec);  font-weight:var(--fw-bold);     color:var(--c-title);\n                font-variant-numeric:tabular-nums; }\n.t-delta      { font-size:var(--fs-delta);       font-weight:var(--fw-bold); display:inline-flex; align-items:center; gap:2px; }\n.t-delta.up,   .t-up   { color:var(--c-up);   }\n.t-delta.down, .t-down { color:var(--c-down); }\n.t-legend     { font-size:var(--fs-legend);      font-weight:var(--fw-semibold); color:var(--c-legend); }\n.t-field-label{ font-size:var(--fs-field-label); font-weight:var(--fw-semibold); color:var(--c-label); text-transform:none; }\n.t-axis,\n.t-caption    { font-size:var(--fs-axis);        color:var(--c-muted); }\n.t-body       { font-size:var(--fs-card-sub);    font-weight:var(--fw-semibold); color:var(--c-legend); }\n.t-table      { font-size:var(--fs-table);       color:var(--c-legend); font-variant-numeric:tabular-nums; }\n.t-icd        { font-size:var(--fs-icd);         color:var(--c-title); font-variant-numeric:tabular-nums; }\n.t-chip       { font-size:var(--fs-chip);        font-weight:var(--fw-semibold); color:var(--c-muted); }\n.t-num        { font-variant-numeric:tabular-nums; }\n\n/* Cỡ chữ mặc định trong biểu đồ SVG */\nsvg text       { font-size:var(--fs-svg); }\nsvg .axis text { font-size:var(--fs-svg-axis); }\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\n/* Khung cứng rộng 1920 (16:9); scale theo chiều rộng viewport, giữ tỷ lệ, cuộn dọc phần dư */\nhtml{width:100%;background:#e5e8ee;overflow-x:hidden;overflow-y:auto}\nbody{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#eef1f6;color:var(--c-title);font-size:13px;margin:0;-webkit-font-smoothing:antialiased}\n#stage{width:1920px;background:#eef1f6}\nbody::-webkit-scrollbar{width:9px;height:9px}\nbody::-webkit-scrollbar-thumb{background:#cdd6e3;border-radius:6px}\nbody::-webkit-scrollbar-track{background:transparent}\n\n/* HEADER */\n.hdr{background:#eaf1fe;border-bottom:1px solid #cdddf7;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:28px;position:sticky;top:0;z-index:100}\n.hdr-l{display:flex;align-items:center;gap:18px}\n.hdr-logo{height:66px;width:auto;display:block;flex-shrink:0}\n.hdr-brand-divider{width:1px;align-self:stretch;background:#cdddf7;margin:4px 0;flex:none}\n.hdr-sub{font-si enter;gap:14px}\n.kpi-hl{display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}\n.kpi-hdiv{display:none}\n.kpi-hr{display:none}\n.donut-svg{width:108px;height:108px;flex-shrink:0;overflow:visible}\n.donut-leg{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;border-top:1px solid #f3f4f6;padding-top:8px;margin-top:10px}\n.dl-item{display:flex;align-items:center;gap:4px;min-width:0}\n.dl-item i{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}\n.dl-item span{font-size:9.5px;color:var(--c-label);flex:0 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}\n.dl-item b{font-size:9.5px;font-weight:700;color:var(--c-legend);font-variant-numeric:tabular-nums;flex-shrink:0;padding-left:5px}\n.kc-trend{display:flex;align-items:center;gap:4px;font-size:var(--fs-chip);margin-top:5px}\n.kc-delta-val{font-weight:600}\n.kc-delta-lbl{color:var(--c-muted)}\n\n/* DUAL KPI */\n.kpi-dual-vals{display:flex;gap:0;margin-top:4px;align-items:stretch}\n.kpi-dval{display:flex;flex-direction:column;gap:1px;flex:1;padding-right:10px}\n.kpi-dval+.kpi-dval{padding-right:0;padding-left:10px;border-left:1px solid #e5e7eb}\n.kpi-dnum{font-size:var(--fs-metric-sec);font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}\n.kpi-dlbl{font-size:10px;color:var(--c-label);margin-top:1px}\n.kpi-dtrd{font-size:var(--fs-chip);font-weight:600;margin-top:2px}\n\n/* PANELS */\n.panel{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px}\n.ptitle{font-size:var(--fs-card-title);font-weight:var(--fw-bold);color:var(--c-title);margin-bottom:10px}\n.sc-title{font-size:20.5px;font-weight:700;color:var(--c-title);min-width:0}\n\n/* MID ROW */\n.mid-row{display:grid;grid-template-columns:2.1fr 1fr 1.5fr;gap:8px}\n\n/* PATIENT FLOW */\n.flow-grid{display:grid;grid-template-columns:1fr 20px 1fr 20px 1fr 20px 1fr;align-items:start;gap:0}\n.flow-arr{display:flex;justify-content:center;padding-top:2px;color:var(--c-mu !-- CỘT PHẢI: Tabbed — Luồng nội trú / Ra viện / Công suất -->\n  <div class=\"panel\" id=\"lkvPanel\">\n\n    <div class=\"lkv-tab-bar\">\n      <span class=\"sc-title\" id=\"lkvTitle\">Nguồn vào viện theo khoa<\u002Fspan>\n      <div class=\"lkv-tabs\">\n        <button class=\"lkv-tab active\" data-tab=\"tn\" onclick=\"lkSetTab('tn')\">Người bệnh thực nằm<\u002Fbutton>\n        <button class=\"lkv-tab\" data-tab=\"vao\" onclick=\"lkSetTab('vao')\">Nguồn vào viện<\u002Fbutton>\n        <button class=\"lkv-tab\" data-tab=\"ra\" onclick=\"lkSetTab('ra')\">Trạng thái ra viện<\u002Fbutton>\n        <button class=\"lkv-tab\" data-tab=\"cs\" onclick=\"lkSetTab('cs')\">Công suất giường<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"lkvLegend\"><\u002Fdiv>\n    <div id=\"lkvHead\"><\u002Fdiv>\n    <div id=\"lkRows\"><\u002Fdiv>\n\n\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ROW 4: CẬN LÂM SÀNG -->\n<style>\n.clsx-subtabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid #e5e7eb;margin-bottom:14px}\n.clsx-subtab{padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--c-label);background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;margin-bottom:-1px;white-space:nowrap;transition:color .15s}\n.clsx-subtab:hover:not(.active){color:var(--c-legend)}\n.clsx-subtab.active{color:#024593;border-bottom-color:#024593}\n.clsx-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}\n.clsx-card{background:#fff;border:1px solid #cddcf5;border-radius:10px;padding:16px 18px 15px;display:flex;flex-direction:column;min-width:0;box-shadow:0 1px 3px rgba(2,69,147,.07)}\n.clsx-card-lbl{font-size:10px;font-weight:600;color:var(--c-label);margin-bottom:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.clsx-card-val{font-size:var(--fs-metric-sec);font-weight:700;color:var(--c-title);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em;display:flex;align-items:base  'c-up' : 'c-down';\n  const arr = d > 0 ? '↑' : '↓';\n  return `<span class=\"${cls}\">${arr} ${d>0?'+':''}${fmt(Math.abs(d))}${unit||''}<\u002Fspan>`;\n}\nfunction trendKpiHtml(d, unit) {\n  if (d === 0) return '<span style=\"color:var(--c-muted)\">—<\u002Fspan>';\n  const cls = d > 0 ? 'c-up' : 'c-down';\n  const arr = d > 0 ? '↑' : '↓';\n  return `<span class=\"${cls}\">${arr} ${d>0?'+':''}${fmt(Math.abs(d))}${unit||''}<\u002Fspan>`;\n}\n\n/* ====================================================  MAIN UPDATE  */\nfunction applyFilters() {\n  const khoa   = document.getElementById('fKhoa').value;\n\n  const base = BASE[khoa] || BASE.all;\n\n  // Báo cáo theo ngày: chọn 1 trong 30 ngày gần nhất; mỗi ngày có hệ số biến động riêng\n  const period='day';\n  const _df=_dayFactor();\n  const mult=_df;\n  const flowSrc=scaleFlowFactor(FLOW.day, _df);\n\n  const cmpLbl = CMP[period];\n  const fd = FDELTA[period];\n\n  // Flow → derive Vào viện / Ra viện / cuối ngày / thực nằm (consistent with chart)\n  const flow = (khoa === 'all') ? flowSrc : scaleFlow(flowSrc, BASE.all, base);\n  const vvSum = flow.vv.reduce((s,[,v]) => s+v, 0);\n  const rvSum = flow.rv.reduce((s,[,v]) => s+v, 0);\n  const cuoi  = flow.ton + vvSum - rvSum;\n  const thuc  = cuoi - 15;\n  const net   = vvSum - rvSum;\n\n  const cs = base.cs[0], cs_p = base.cs[1];\n  const dCs = delta(cs, cs_p);\n  const mo = Math.round(base.mo[0]*mult), mo_p = Math.round(base.mo[1]*mult);\n  const xt = Math.round(base.xt[0]*mult), xt_p = Math.round(base.xt[1]*mult);\n  const dMo = delta(mo, mo_p), dXt = delta(xt, xt_p);\n  // Số chỉ định cận lâm sàng (toàn viện) — co giãn theo kỳ và theo khoa\n  const khoaRatio = base.tn[0] / BASE.all.tn[0];\n  const cls    = Math.round(10678 * mult * khoaRatio);\n  const clsNoi = Math.round(4674  * mult * khoaRatio);\n\n  // Alerts\n  const alerts = buildAlerts(flow);\n  lastAlerts = alerts;\n  const nang = alerts.find(a => a.key==='nang').count;\n  const capcuu = alerts.find(a => a.key==='capcuu').count;\n  // --- SCORECARD ROW ---\n  // 1. Lượt khám\n  const khamBase = Math.round(684 * mult * khoaRatio);\n  const khamBhyt = Math.round(khamBase * 0.762);\n  const khamNobt = khamBase - khamBhyt;\n  setText('kc-kham',      fmt(khamBase));\n  setText('kc-kham-bhyt', fmt(khamBhyt));\n  setText('kc-kham-nobt', fmt(khamNobt));\n\n  // 2. Vào viện breakdown\n  const vvKkb  = (flow.vv.find(([l]) => l==='Từ KKB')          || ['',0])[1];\n  const vvTddt = (flow.vv.find(([l]) => l==='Từ TĐDT')         || ['',0])[1];\n  const vvHddt = (flow.vv.find(([l]) => l==='Từ HĐDT')         || ['',0])[1];\n  const vvCkVv = (flow.vv.find(([l]) => l==='Chuyển khoa đến') || ['',0])[1];\n  setText('kc-vv',      fmt(vvSum));\n  setText('kc-vv-kkb',  fmt(vvKkb));\n  setText('kc-vv-tddt', fmt(vvTddt));\n  setText('kc-vv-hddt', fmt(vvHddt));\n  setText('kc-vv-ck',   fmt(vvCkVv));\n  { const dVv = vvSum - Math.round(base.vv[1]*mult);\n    const vvDE = document.getElementById('kc-vv-delta');\n    const vvDL = document.getElementById('kc-vv-delta-lbl');\n    if (vvDE) { vvDE.textContent=(dVv>0?'↑ +':dVv<0?'↓ ':'')+fmt(Math.abs(dVv)); vvDE.className='kc-delta-val'+(dVv>0?' c-up':dVv<0?' c-down':''); }\n    if (vvDL) vvDL.textContent = period==='day'?'vs hôm trước':'so kỳ trước';\n  }\n\n  // 3. Ra viện breakdown\n  const rvHetdot  = (flow.rv.find(([l]) => l==='Hết đợt')      || ['',0])[1];\n  const rvTamdung = (flow.rv.find(([l]) => l==='Tạm dừng')     || ['',0])[1];\n  const rvCkRv    = (flow.rv.find(([l]) => l==='Chuyển khoa')  || ['',0])[1];\n  const rvRavien  = (flow.rv.find(([l]) => l==='Ra viện')      || ['',0])[1];\n  const rvTuvong  = (flow.rv.find(([l]) => l==='Tử vong')      || ['',0])[1];\n  const rvXinve   = (flow.rv.find(([l]) => l==='Xin về')       || ['',0])[1];\n  const rvKhac    = rvRavien + rvTuvong + rvXinve;\n  setText('kc-rv',         fmt(rvSum));\n  setText('kc-rv-hetdot',  fmt(rvHetdot));\n  setText('kc-rv-tamdung', fmt(rvTamdung));\n  setText('kc-rv-ck',      fmt(rvCkRv));\n  setText('kc-rv-chuyenvien', fmt(rvRavien));\n  setText('kc-rv-tuvong',  fmt(rvTuvong));\n  setText('kc-rv-xinve',   fmt(rvXinve));\n  setText('kc-rv-khac',    fmt(rvKhac));\n  { const dRv = rvSum - Math.round(base.rv[1]*mult);\n    const rvDE = document.getElementById('kc-rv-delta');\n    const rvDL = document.getElementById('kc-rv-delta-lbl');\n    if (rvDE) { rvDE.textContent=(dRv>0?'↑ +':dRv<0?'↓ ':'')+fmt(Math.abs(dRv)); rvDE.className='kc-delta-val'+(dRv>0?' c-up':dRv<0?' c-down':''); }\n    if (rvDL) rvDL.textContent = period==='day'?'vs hôm trước':'so kỳ trước';\n  }\n\n  // 4. Thực nằm\n  setText('kc-tn', fmt(thuc));\n  const periodStartLbl = {day:'Đầu ngày',week:'Đầu tuần',month:'Đầu tháng',quarter:'Đầu quý',year:'Đầu năm'}[period] || 'Đầu kỳ';\n  setText('kc-tn-start-lbl', periodStartLbl);\n  setText('kc-tn-start',     fmt(flow.ton));\n  setText('kc-tn-delta-lbl', period === 'day' ? 'vs hôm trước' : 'So kỳ trước');\n  const tnDeltaEl = document.getElementById('kc-tn-delta');\n  if (tnDeltaEl) { tnDeltaEl.textContent=(fd.cuoi>0?'↑ +':fd.cuoi<0?'↓ ':'')+fmt(Math.abs(fd.cuoi)); tnDeltaEl.className='kc-delta-val'+(fd.cuoi>0?' c-up':fd.cuoi<0?' c-down':''); }\n\n  // 5. Công suất\n  const vuotNguong = BED_DATA.filter(r => Math.round(BASE[r.key].tn[0] / r.ke * 100) >= 95).length;\n  const csBarCls   = cs >= 95 ? 'danger' : cs >= 90 ? 'warn' : cs < 85 ? 'ok' : '';\n  setText('kc-cs',       cs + '%');\n  setText('kc-cs-hq-lbl', period === 'day' ? 'Hôm qua' : CMP[period]);\n  setText('kc-cs-hq',    cs_p + '%');\n  setText('kc-cs-vuot',  vuotNguong + ' khoa');\n  const csBarEl = document.getElementById('kc-cs-bar');\n  if (csBarEl) { csBarEl.style.width = cs + '%'; csBarEl.className = 'kc-bar-fill' + (csBarCls ? ' ' + csBarCls : ''); }\n\n  // 6. Phẫu thuật\n  const moCcNum = mo > 0 ? Math.max(1, Math.round(mo * 0.12)) : 0;\n  const moPhNum = mo - moCcNum;\n  setText('kc-pt',       fmt(mo));\n  setText('kc-pt-cc',    fmt(moCcNum));\n  setText('kc-pt-phien', fmt(moPhNum));\n\n  renderAlerts(alerts);\n\n  // --- Biến động (màu theo hướng có lợi: thực nằm tăng = đỏ; mổ/xạ trị tăng = xanh) ---\n  const vvB = Math.round(base.vv[0]*mult), dVvB = delta(vvB, Math.round(base.vv[1]*mult));\n  const rvB = Math.round(base.rv[0]*mult), dRvB = delta(rvB, Math.round(base.rv[1]*mult));\n  const actMax = Math.max(vvB, rvB, mo, xt, 1);\n  const _bdLbl = document.getElementById('bdCmpLabel');\n  if (_bdLbl) _bdLbl.textContent = 'So với ' + cmpLbl.toLowerCase();\n  updateBD('tn', thuc, fd.cuoi, thuc,   true);   // tăng = áp lực giường → đỏ\n  updateBD('vv', vvB,  dVvB,   actMax, false);\n  updateBD('rv', rvB,  dRvB,   actMax, false);\n  updateBD('mo', mo,   dMo,    actMax, false);\n  updateBD('xt', xt,   dXt,    actMax, false);\n\n  // --- Flow panel + bed table ---\n  renderFlowBars(flow, period);\n  renderWaterfall(flow);\n  renderBedTable(khoa);\n  renderDeptComp(khoa);\n  refreshDonuts();\n  window.__clsScale = mult * khoaRatio;\n  if (typeof renderServicesComp === 'function') renderServicesComp();\n  syncNoitru();\n}\n\nfunction updateBD(key, val, d, maxVal, badUp) {\n  const numEl  = document.getElementById('bd-' + key);\n  const barEl  = document.getElementById('bd-' + key + '-bar');\n  const chgEl  = document.getElementById('bd-' + key + '-d');\n  if (numEl)  numEl.textContent  = fmt(val);\n  if (barEl)  barEl.style.width  = Math.max(2, Math.round((val / (maxVal||1)) * 100)) + '%';\n  if (chgEl) {\n    const arrow = d > 0 ? '↑' : d < 0 ? '↓' : '';\n    const good  = d === 0 ? null : (badUp ? d < 0 : d > 0);  // is the change in a good direction?\n    const cls   = good === null ? '' : (good ? 'c-up' : 'c-down');\n    chgEl.className = 'd-chg ' + cls;\n    chgEl.textContent = (arrow ? arrow + ' ' : '') + (d > 0 ? '+' : d < 0 ? '−' : '') + fmt(Math.abs(d));\n  }\n}\n\nlet _lastWfFlow = null, _wfResizeBound = false;\nfunction renderWaterfall(f) {\n  const svg = document.getElementById('wfChart');\n  if (!svg) return;\n  if (f) _lastWfFlow = f; else f = _lastWfFlow;\n  if (!_wfResizeBound) {\n    _wfResizeBound = true;\n    let _t; window.addEventListener('resize', () => { clearTimeout(_t); _t = setTimeout(() => renderWaterfall(), 120); });\n  }\n  if (!f) return;\n  const get = (arr, name) => (arr.find(([l]) => l === name) || ['', 0])[1];\n\n  // Tổng người bệnh — loại trừ chuyển khoa nội bộ (đến/đi triệt tiêu nhau)\n  // Dữ liệu điều khiển bởi cross-filter (toàn viện hoặc theo khoa được chọn)\n  const _wf = _wfData || WF_HOSPITAL;\n  const cu       = _wf.cu;\n  const vaoVien  = _wf.vao;\n  const raVien   = _wf.ra;\n  const chuyenVien = _wf.cv;\n  const tuVong   = _wf.tv;\n  const xinVe    = _wf.xv;\n  const hienCo   = cu + vaoVien - raVien - chuyenVien - tuVong - xinVe;\n\n  // steps: type total | inc | dec\n  const steps = [\n    {label:'Người bệnh cũ',    type:'total', val:cu},\n    {label:'Vào',              type:'inc',   val:vaoVien},\n    {label:'Ra',               type:'dec',   val:raVien},\n    {label:'Chuyển viện',      type:'dec',   val:chuyenVien},\n    {label:'Tử vong',          type:'dec',   val:tuVong},\n    {label:'Xin về',           type:'dec',   val:xinVe},\n    {label:'Người bệnh hiện có',type:'total', val:hienCo},\n  ];\n\n  // Running totals → determine y range\n  const yMin = 1000;\n  let run = 0, maxRun = 0;\n  const geo = steps.map(s => {\n    let lo, hi;\n    if (s.type === 'total') { lo = yMin; hi = s.val; run = s.val; }\n    else if (s.type === 'inc') { lo = run; hi = run + s.val; run = hi; }\n    else { hi = run; lo = run - s.val; run = lo; }\n    maxRun = Math.max(maxRun, hi);\n    return {lo, hi};\n  });\n\n  const W = 500, H = 340;\n  const L = 42, R = 12, T = 24, B = 58;\n  // Chữ giữ cỡ px cố định (bằng chart khoa) bất kể độ rộng: bù theo scale của viewBox\n  const cw = svg.getBoundingClientRect().width || W;\n  const sc = cw / W;\n  const fY = (10 / sc).toFixed(2), fX = (11 / sc).toFixed(2), fVal = (11.5 / sc).toFixed(2);\n  const plotH = H - T - B, plotW = W - L - R;\n  const yMax = yMin + Math.ceil((maxRun - yMin) / 300) * 300;\n  const y = v => T + plotH * (1 - (v - yMin) / (yMax - yMin));\n  const n = steps.length, slot = plotW / n, barW = Math.min(46, slot * 0.6);\n\n  const CLR = {\n    total: '#024593',\n    inc:   '#2e8b57',\n    dec:   '#9aa7b8',\n    zero:  '#e5e7eb'\n  };\n\n  let g = '';\n  // Gridlines + y labels (gốc trục = 1.000)\n  for (let v = yMin; v <= yMax + 0.5; v += 300) {\n    const yy = y(v);\n    g += `<line x1=\"${L}\" y1=\"${yy.toFixed(1)}\" x2=\"${W-R}\" y2=\"${yy.toFixed(1)}\" stroke=\"#f0f1f3\" stroke-width=\"1\"/>`;\n    g += `<text x=\"${L-7}\" y=\"${(yy+3.5).toFixed(1)}\" text-anchor=\"end\" font-size=\"${fY}\" fill=\"#5a6b82\" font-variant-numeric=\"tabular-nums\">${Math.round(v).toLocaleString('vi-VN')}<\u002Ftext>`;\n  }\n\n  steps.forEach((s, i) => {\n    const cx = L + i * slot + slot / 2;\n    const bx = cx - barW / 2;\n    const { lo, hi } = geo[i];\n    const isZero = s.type !== 'total' && s.val === 0;\n    const fill = isZero ? CLR.zero : CLR[s.type];\n    const yTop = y(hi), yBot = y(lo);\n    const h = Math.max(isZero ? 0 : 2, yBot - yTop);\n\n    // connector line joining previous bar to this one at their shared running level\n    if (i > 0) {\n      const prevCx = L + (i - 1) * slot + slot / 2;\n      const lvl = (s.type === 'inc') ? geo[i].lo : geo[i].hi; // dec & total → hi\n      const connY = y(lvl);\n      g += `<line x1=\"${(prevCx+barW/2).toFixed(1)}\" y1=\"${connY.toFixed(1)}\" x2=\"${bx.toFixed(1)}\" y2=\"${connY.toFixed(1)}\" stroke=\"#cbd5e1\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/>`;\n    }\n\n    // bar\n    if (isZero) {\n      g += `<line x1=\"${bx.toFixed(1)}\" y1=\"${yTop.toFixed(1)}\" x2=\"${(bx+barW).toFixed(1)}\" y2=\"${yTop.toFixed(1)}\" stroke=\"#cbd5e1\" stroke-width=\"2\"/>`;\n    } else {\n      g += `<rect x=\"${bx.toFixed(1)}\" y=\"${yTop.toFixed(1)}\" width=\"${barW.toFixed(1)}\" height=\"${h.toFixed(1)}\" rx=\"2\" fill=\"${fill}\"/>`;\n    }\n\n    // value label above bar\n    const lblY = (isZero ? yTop : yTop) - 7;\n    let valTxt;\n    valTxt = s.val.toLocaleString('vi-VN');\n    const lblClr = s.type === 'total' ? '#024593' : isZero ? '#5a6b82' : (s.type === 'inc' ? '#2e8b57' : '#9aa7b8');\n    g += `<text x=\"${cx.toFixed(1)}\" y=\"${lblY.toFixed(1)}\" text-anchor=\"middle\" font-size=\"${fVal}\" font-weight=\"700\" fill=\"${lblClr}\" font-variant-numeric=\"tabular-nums\">${valTxt}<\u002Ftext>`;\n\n    // x-axis label (wrap 2 lines when ≥ 2 words to fit narrow column)\n    const words = s.label.split(' ');\n    if (words.length >= 2) {\n      const mid = Math.ceil(words.length / 2);\n      g += `<text x=\"${cx.toFixed(1)}\" y=\"${(H-B+18)}\" text-anchor=\"middle\" font-size=\"${fX}\" fill=\"#5a6b82\">${words.slice(0,mid).join(' ')}<\u002Ftext>`;\n      g += `<text x=\"${cx.toFixed(1)}\" y=\"${(H-B+31)}\" text-anchor=\"middle\" font-size=\"${fX}\" fill=\"#5a6b82\">${words.slice(mid).join(' ')}<\u002Ftext>`;\n    } else {\n      g += `<text x=\"${cx.toFixed(1)}\" y=\"${(H-B+22)}\" text-anchor=\"middle\" font-size=\"${fX}\" fill=\"#5a6b82\">${s.label}<\u002Ftext>`;\n    }\n  });\n\n  svg.innerHTML = g;\n}\n\nfunction drawDonut(svgId, legId, slices) {\n  const svg = document.getElementById(svgId);\n  const leg = document.getElementById(legId);\n  if (!svg || !leg) return;\n  const total = slices.reduce((s, x) => s + (x.value||0), 0);\n  if (!total) return;\n  const cx=50, cy=50, ro=44, ri=22, rm=(ro+ri)/2;\n  let paths='', legHtml='';\n  let a = -Math.PI/2;\n  slices.forEach(s => {\n    if (!s.value) return;\n    const pct = s.value/total;\n    const a2 = a + pct*2*Math.PI;\n    const large = pct > 0.5 ? 1 : 0;\n    const x1=cx+ro*Math.cos(a),  y1=cy+ro*Math.sin(a);\n    const x2=cx+ro*Math.cos(a2), y2=cy+ro*Math.sin(a2);\n    const x3=cx+ri*Math.cos(a2), y3=cy+ri*Math.sin(a2);\n    const x4=cx+ri*Math.cos(a),  y4=cy+ri*Math.sin(a);\n    paths+=`<path d=\"M${x1.toFixed(2)} ${y1.toFixed(2)} A${ro} ${ro} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L${x3.toFixed(2)} ${y3.toFixed(2)} A${ri} ${ri} 0 ${large} 0 ${x4.toFixed(2)} ${y4.toFixed(2)} Z\" fill=\"${s.color}\" stroke=\"#fff\" stroke-width=\"1.8\"><title>${s.label}: ${s.value}<\u002Ftitle><\u002Fpath>`;\n    if (pct >= 0.07) {\n      const ma=(a+a2)/2;\n      const tx=cx+rm*Math.cos(ma), ty=cy+rm*Math.sin(ma);\n      paths+=`<text x=\"${tx.toFixed(2)}\" y=\"${ty.toFixed(2)}\" text-anchor=\"middle\" dominant-baseline=\"central\" font-size=\"8\" font-weight=\"700\" fill=\"rgba(255,255,255,0.96)\" style=\"pointer-events:none\">${s.value}<\u002Ftext>`;\n    }\n    legHtml+=`<div class=\"dl-item\"><i style=\"background:${s.color}\"><\u002Fi><span>${s.label}<\u002Fspan><b>${s.value.toLocaleString('vi-VN')} (${Math.round(pct*100)}%)<\u002Fb><\u002Fdiv>`;\n    a = a2;\n  });\n  svg.innerHTML = paths;\n  leg.innerHTML = legHtml;\n}\nfunction refreshDonuts() {\n  const numOf = id => { const e=document.getElementById(id); return e?(parseInt(e.textContent.replace(/\\./g,'').replace(/,/g,''))||0):0; };\n  drawDonut('pie-vv','leg-vv',[\n    {label:'Tia xạ',            value:numOf('kc-tnc-tx'),    color:'#2b62a8'},\n    {label:'Nội Khoa',          value:numOf('kc-tnc-noi'),   color:'#024593'},\n    {label:'Ngoại khoa',        value:numOf('kc-tnc-ngoai'), color:'#2f9e78'},\n    {label:'Chăm sóc giảm nhẹ', value:numOf('kc-tnc-csgn'),  color:'#e6a700'},\n    {label:'Y học hạt nhân',    value:numOf('kc-tnc-yhhn'),  color:'#8b5cf6'},\n  ]);\n  drawDonut('pie-pt','leg-pt',[\n    {label:'Đặc biệt', value:numOf('kc-pt-dacbiet'), color:'#024593'},\n    {label:'Loại I',   value:numOf('kc-pt-loai1'),   color:'#2b62a8'},\n    {label:'Loại II',  value:numOf('kc-pt-loai2'),   color:'#2f9e78'},\n    {label:'Loại III', value:numOf('kc-pt-loai3'),   color:'#e6a700'},\n  ]);\n  drawDonut('pie-tx','leg-tx',[\n    {label:'Nội trú',  value:numOf('kc-tx-nt'),  color:'#024593'},\n    {label:'Ngoại trú', value:numOf('kc-tx-ngt'), color:'#94a3b8'},\n  ]);\n}\n\nfunction scaleFlowFactor(flow, f){\n  const s = rows => rows.map(([lbl, v]) => [lbl, Math.round(v * f)]);\n  return { ton: flow.ton, bhyt: flow.bhyt, vv: s(flow.vv), rv: s(flow.rv) };\n}\nfunction scaleFlow(baseFlow, allBase, khoaBase) {\n  const ratio = khoaBase.tn[0] / allBase.tn[0];\n  function scale(rows) { return rows.map(([lbl, v]) => [lbl, Math.round(v * ratio)]); }\n  const vv = scale(baseFlow.vv);\n  const rv = scale(baseFlow.rv);\n  const vvSum = vv.reduce((s,[,v]) => s+v, 0);\n  const rvSum = rv.reduce((s,[,v]) => s+v, 0);\n  const ton = Math.round(baseFlow.ton * ratio);\n  return {\n    ton, bhyt: Math.round(ton * 0.9),\n    vv, rv,\n    // hienCo computed in renderFlow\n  };\n}\n\n// Display names + shade ramps for the stacked categories\nconst VV_NAME = {'Từ KKB':'Khoa khám bệnh','Từ TĐDT':'Thăm dò điều trị','Từ HĐDT':'Hội đồng điều trị','Chuyển khoa đến':'Chuyển khoa'};\nconst GREENS  = ['#1f5c3a','#256e45','#2e8b57','#3aa56a','#69bf8f'];\nconst REDS    = ['#a5171e','#c31820','#ea232b','#ef3b42','#f16a6f'];\n\n// 4-column patient-flow bar chart (compact). Shared baseline, heights ∝ total.\nfunction renderFlowBars(f, period) {\n  if (!document.getElementById('sankeySvg')) return;\n  const vvSum  = f.vv.reduce((s,[,v]) => s+v, 0);\n  const rvSum  = f.rv.reduce((s,[,v]) => s+v, 0);\n  const hienCo = f.ton + vvSum - rvSum;\n  const thucnam = hienCo - 15;\n  const pWord  = PERIOD_LBL[period] || 'ngày';\n\n  let vvSegs = f.vv.filter(([,v]) => v>0).map(([l,v]) => ({name:VV_NAME[l]||l, val:v})).sort((a,b)=>b.val-a.val);\n  vvSegs.forEach((s,i) => s.color = GREENS[i] || GREENS[GREENS.length-1]);\n  let rvSegs = f.rv.filter(([,v]) => v>0).map(([l,v]) => ({name:l, val:v})).sort((a,b)=>b.val-a.val);\n  rvSegs.forEach((s,i) => s.color = REDS[i] || REDS[REDS.length-1]);\n\n  const cols = [\n    { kind:'solid', title:'Người bệnh đầu '+pWord, total:f.ton,  color:'#024593', sub:'BHYT '+fmt(f.bhyt) },\n    { kind:'stack', title:'Vào viện',               total:vvSum,  color:'#2e8b57', segs:vvSegs },\n    { kind:'stack', title:'Ra viện',                total:rvSum,  color:'#ea232b', segs:rvSegs },\n    { kind:'solid', title:'Người bệnh cuối '+pWord, total:hienCo, color:'#024593', sub:'Thực nằm '+fmt(thucnam) }\n  ];\n\n  const VBW = 560, topPad = 24, footH = 58, maxBarH = 176;\n  const baseline = topPad + maxBarH;\n  const svgH  = baseline + footH;\n  const maxV  = Math.max(f.ton, hienCo, vvSum, rvSum);\n  const scale = maxBarH / maxV;\n  const barW  = 58;\n  const cx    = [70, 210, 350, 490];\n  const hOf   = v => Math.max(2, v*scale);\n\n  let bars = '', labels = '', foots = '';\n  bars += `<line x1=\"30\" y1=\"${baseline}\" x2=\"530\" y2=\"${baseline}\" stroke=\"#d1d5db\" stroke-width=\"1.4\"><\u002Fline>`;\n\n  cols.forEach((col, ci) => {\n    const x = cx[ci] - barW/2;\n    if (col.kind === 'solid') {\n      const h = hOf(col.total), y = baseline - h;\n      bars += `<rect class=\"pf-seg\" data-l=\"${col.title}\" data-v=\"${fmt(col.total)}\" x=\"${x}\" y=\"${y.toFixed(1)}\" width=\"${barW}\" height=\"${h.toFixed(1)}\" rx=\"2\" fill=\"${col.color}\"><\u002Frect>`;\n      labels += `<text x=\"${cx[ci]}\" y=\"${(y+22).toFixed(1)}\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\" style=\"font-variant-numeric:tabular-nums\">${fmt(col.total)}<\u002Ftext>`;\n    } else {\n      let yb = baseline;\n      col.segs.forEach(s => {\n        const h = hOf(s.val), y = yb - h;\n        bars += `<rect class=\"pf-seg\" data-flow=\"${ci===1?'vv':'rv'}\" data-l=\"${s.name}\" data-v=\"${fmt(s.val)}\" x=\"${x}\" y=\"${y.toFixed(1)}\" width=\"${barW}\" height=\"${h.toFixed(1)}\" fill=\"${s.color}\"><\u002Frect>`;\n        if (h >= 13) labels += `<text x=\"${cx[ci]}\" y=\"${(y+h/2+3.5).toFixed(1)}\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"700\" fill=\"#fff\" style=\"font-variant-numeric:tabular-nums\">${fmt(s.val)}<\u002Ftext>`;\n        yb = y;\n      });\n    }\n    foots += `<text x=\"${cx[ci]}\" y=\"${baseline+20}\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"600\" fill=\"#33415a\">${col.title}<\u002Ftext>`;\n    foots += `<text x=\"${cx[ci]}\" y=\"${baseline+39}\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"${col.color}\" style=\"font-variant-numeric:tabular-nums\">${fmt(col.total)}<\u002Ftext>`;\n    if (col.sub) foots += `<text x=\"${cx[ci]}\" y=\"${baseline+52}\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#9aa7b8\">${col.sub}<\u002Ftext>`;\n  });\n\n  const svg = document.getElementById('sankeySvg');\n  svg.setAttribute('viewBox', `0 0 ${VBW} ${Math.round(svgH)}`);\n  svg.innerHTML = bars + labels + foots;\n\n  lastFlowSegs = { vv: vvSegs, rv: rvSegs };\n  const leg = document.getElementById('flowLegend2');\n  if (leg) leg.innerHTML = '<div class=\"flow-hint\">Di chuột vào cột để xem chi tiết · Nhấn cột <b>Vào viện<\u002Fb> hoặc <b>Ra viện<\u002Fb> để mở bảng phân rã theo hình thức.<\u002Fdiv>';\n\n  const note = document.getElementById('flowPeriodNote');\n  if (note) note.textContent = `Chiều cao cột tỉ lệ với tổng số người bệnh`;\n}\n\nfunction renderBedTable(selectedKhoa) {\n  const tbody = document.getElementById('bedTbody');\n  if (!tbody) return;\n  const rows = (selectedKhoa === 'all' ? BED_DATA : BED_DATA.filter(r => r.key === selectedKhoa))\n    .map(r => { const tn = BASE[r.key].tn[0]; return { ...r, tn, pct: Math.round(tn / r.ke * 100) }; })\n    .sort((a, b) => b.pct - a.pct);\n  rows.forEach(r => {\n    const barCls = r.pct >= 95 ? 'bg-bar-r' : r.pct >= 90 ? 'bg-bar-o' : 'bg-bar-g';\n    const pctCls = r.pct >= 95 ? 'c-red'    : r.pct >= 90 ? 'c-orange'  : 'c-green';\n    const tr = document.createElement('tr');\n    tr.className = 'bed-row';\n    tr.onclick = () => openBedSidebar(r.key);\n    tr.innerHTML = `\n      <td>${r.lbl}<\u002Ftd>\n      <td>${r.ke}<\u002Ftd>\n      <td>${r.tn}<\u002Ftd>\n      <td><span class=\"prog\"><span class=\"prog-f ${barCls}\" style=\"width:${r.pct}%\"><\u002Fspan><\u002Fspan><\u002Ftd>\n      <td class=\"${pctCls}\">${r.pct}%<\u002Ftd>`;\n    tbody.appendChild(tr);\n  });\n}\n\nfunction openBedSidebar(key){\n  const meta = BED_DATA.find(r => r.key === key);\n  const tn = BASE[key].tn[0];\n  const pct = Math.round(tn / meta.ke * 100);\n  const drs = DEPT_DR[key] || ['—'];\n  const rows = (BED_PT[key] || []).map((p,i) => ({ ...p, dept:meta.lbl, doctor:'BS. ' + drs[i % drs.length] }));\n  showSidebar({\n    title: 'Công suất giường – ' + meta.lbl,\n    sub: `Giường kê ${meta.ke} · Thực nằm ${tn} · Công suất ${pct}% — danh sách giường đang có người bệnh`,\n    badge: fmt(tn) + ' người bệnh',\n    mode: 'cards',\n    rows,\n    searchKeys: ['name', 'id', 'bed', 'dx']\n  });\n}\n\nwindow.__selDate = null;\nfunction _iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}\nfunction _ddmmyyyy(iso){var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}\n/* 30 ngày gần nhất; mới nhất = hôm qua (mặc định) */\nfunction buildDateOptions(){\n  var sel=document.getElementById('fDatePreset'); if(!sel) return;\n  var today=new Date(); today.setHours(0,0,0,0);\n  var opts='';\n  for(var i=1;i<=30;i++){\n    var d=new Date(today); d.setDate(today.getDate()-i);\n    var iso=_iso(d);\n    opts+='<option value=\"'+iso+'\">'+_ddmmyyyy(iso)+'<\u002Foption>';\n  }\n  sel.innerHTML=opts;\n  window.__selDate=sel.value;   // i=1 => hôm qua\n}\n/* Hệ số biến động theo ngày (tất định) để mỗi ngày ra số khác nhau */\nfunction _dayFactor(){\n  var iso=window.__selDate; if(!iso) return 1;\n  var p=iso.split('-'), seed=(+p[2])*31+(+p[1])*97+(+p[0]);\n  var frac=((seed*9301+49297)%233280)/233280;\n  return 0.85+frac*0.30; // 0.85–1.15\n}\nfunction onDatePreset() {\n  var sel=document.getElementById('fDatePreset');\n  window.__selDate = sel.value;\n  updateDateLabel();\n  applyFilters();\n}\nfunction updateDateLabel() {\n  var el = document.getElementById('fUpdated');\n  if (!el || !window.__selDate) return;\n  el.textContent = 'Ngày báo cáo: ' + _ddmmyyyy(window.__selDate);\n}\nfunction resetFilters() {\n  document.getElementById('fKhoa').value = 'all';\n  var sel=document.getElementById('fDatePreset'); if(sel){ sel.selectedIndex=0; window.__selDate=sel.value; }\n  updateDateLabel();\n  applyFilters();\n}\n\n/* ====================================================  SIDEBAR DATA  */\nconst XN_DATA = {\n  'Huyết học': { count:870, patients:[\n    {id:'BN25-001234',name:'Nguyễn Văn An',dept:'Nội Tổng Hợp',test:'Công thức máu (CBC)',status:'done'},\n    {id:'BN25-001235',name:'Trần Thị Bình',dept:'Nội Phổi – Vú',test:'Đông máu toàn bộ',status:'done'},\n    {id:'BN25-001236',name:'Lê Thành Công',dept:'Ngoại Tổng Hợp',test:'Nhóm máu + Rh',status:'done'},\n    {id:'BN25-001237',name:'Phạm Thị Dung',dept:'Xạ trị',test:'Công thức máu (CBC)',status:'done'},\n    {id:'BN25-001238',name:'Hoàng Minh Hải',dept:'Nội Tổng Hợp',test:'HbA1c',status:'wait'},\n    {id:'BN25-001239',name:'Đỗ Thị Phương',dept:'Ngoại Đầu Cổ',test:'Công thức máu (CBC)',status:'done'},\n    {id:'BN25-001240',name:'Vũ Minh Giang',dept:'CSGN',test:'Đông máu PT, APTT',status:'wait'},\n    {id:'BN25-001243',name:'Ngô Thị Kim Liên',dept:'Xạ trị',test:'CBC + phân loại',status:'urg'},\n  ]},\n  'Hóa sinh': { count:5867, patients:[\n    {id:'BN25-001250',name:'Cao Văn Phong',dept:'Nội Tổng Hợp',test:'Glucose máu lúc đói',status:'done'},\n    {id:'BN25-001251',name:'Dương Thị Quỳnh',dept:'Nội Phổi – Vú',test:'Ure + Creatinin',status:'done'},\n    {id:'BN25-001252',name:'Trần Anh Đức',dept:'Ngoại Tổng Hợp',test:'ALT, AST, GGT',status:'done'},\n    {id:'BN25-001253',name:'Hồ Thị Sen',dept:'Xạ trị',test:'Điện giải đồ Na/K/Cl',status:'done'},\n    {id:'BN25-001254',name:'Lương Văn Tài',dept:'CSGN',test:'Lipid máu toàn bộ',status:'wait'},\n    {id:'BN25-001258',name:'Trần Văn Yên',dept:'Nội Tổng Hợp',test:'Troponin T hs',status:'urg'},\n    {id:'BN25-001263',name:'Vũ Thị Duyên',dept:'CSGN',test:'Amylase, Lip );\n  _clsTab = id;\n  renderClsDetailNew(id);\n}\n\nfunction setMainTab(id){\n  document.querySelectorAll('.main-tab').forEach(b=>b.classList.toggle('active', b.dataset.mt===id));\n  document.getElementById('mt-noitru').style.display = id==='noitru' ? '' : 'none';\n  document.getElementById('mt-khambenh').style.display = id==='khambenh' ? '' : 'none';\n}\n\nfunction switchTab(el, id) {\n  document.querySelectorAll('.cls-tab').forEach(t=>t.classList.remove('active'));\n  el.classList.add('active');\n  _clsTab = id;\n  renderClsDetail(id);\n}\n\nlet _sbCols=[], _sbRows=[], _sbKeys=[], _sbMode='table', _sbCardRows=[], _sbCfg=null, _sbSimple=false;\nfunction showSidebar(cfg){\n  _sbCfg = cfg;\n  _sbMode = cfg.mode || 'table';\n  _sbSimple = !!cfg.simple;\n  // reset to LIST view (hide detail view)\n  document.getElementById('sbBack').style.display = 'none';\n  document.getElementById('sbDetail').style.display = 'none';\n  document.getElementById('sbDetailBadge').style.display = 'none';\n  document.getElementById('sbBadgeWrap').style.display = '';\n  document.getElementById('sbTitle').textContent = cfg.title;\n  document.getElementById('sbSub').innerHTML     = cfg.sub;\n  document.getElementById('sbCount').textContent = cfg.badge;\n  _sbCols = cfg.columns || []; _sbRows = cfg.rows; _sbKeys = cfg.searchKeys || [];\n  const sw = document.getElementById('sbSearchWrap');\n  sw.style.display = _sbKeys.length ? 'block' : 'none';\n  document.getElementById('sbSearch').value = '';\n  const cards = document.getElementById('sbCards');\n  const tbl   = document.getElementById('sbTable');\n  if (_sbMode === 'cards') { cards.style.display='flex'; tbl.style.display='none'; }\n  else {\n    cards.style.display='none'; tbl.style.display='table';\n    document.getElementById('sbHead').innerHTML =\n      '<tr>' + _sbCols.map(c => `<th${c.width?` style=\"width:${c.width}\"`:''}>${c.label}<\u002Fth>`).join('') + '<\u002Ftr>';\n  }\n  renderSb(_sbRows);\n  document.getElementById('sbOv').classList.add('open');\n  document.getElementById('sbPanel').classList.add('open');\n}\nfunction renderSb(rows){ _sbMode === 'cards' ? renderCards(rows) : renderSbRows(rows); }\nfunction cellHtml(r,c,i){\n  if (c.type==='index') return `<td style=\"color:#d1d5db;font-size:var(--fs-chip)\">${i+1}<\u002Ftd>`;\n  const v = r[c.key];\n  if (c.type==='id')   return `<td><span class=\"pt-id\">${v}<\u002Fspan><\u002Ftd>`;\n  if (c.type==='name') return `<td><span class=\"pt-name\">${v}<\u002Fspan><\u002Ftd>`;\n  if (c.type==='dept') return `<td style=\"color:var(--c-label);font-size:var(--fs-axis);white-space:nowrap\">${v}<\u002Ftd>`;\n  if (c.type==='num')  return `<td style=\"text-align:right;font-weight:700;color:var(--c-title);font-variant-numeric:tabular-nums\">${fmt(v)}<\u002Ftd>`;\n  if (c.type==='badge'){ const b = typeof v==='string' ? STATUS_MAP[v] : v; return `<td><span class=\"badge ${b.cls}\">${b.text}<\u002Fspan><\u002Ftd>`; }\n  if (c.type==='bar')  return `<td><span style=\"display:flex;align-items:center;gap:8px\"><span class=\"prog\" style=\"width:84px\"><span class=\"prog-f\" style=\"width:${v}%;background:${r.color||'#024593'}\"><\u002Fspan><\u002Fspan><span style=\"font-size:var(--fs-chip);color:var(--c-label);font-weight:600\">${v}%<\u002Fspan><\u002Fspan><\u002Ftd>`;\n  return `<td style=\"color:var(--c-legend);font-size:var(--fs-axis)\">${v}<\u002Ftd>`;\n}\nfunction renderSbRows(rows){\n  const tbody = document.getElementById('sbBody');\n  const noRes = document.getElementById('sbNoResults');\n  if (!rows.length){ tbody.innerHTML=''; noRes.style.display='block'; return; }\n  noRes.style.display='none';\n  tbody.innerHTML = rows.map((r,i) => '<tr>' + _sbCols.map(c => cellHtml(r,c,i)).join('') + '<\u002Ftr>').join('');\n}\nfunction cardHtml(p, i){\n  const b = p.status || p.level || {text:'',cls:''};\n  const initial = (p.name||'?').trim().charAt(0).toUpperCase();\n  const avCls = b.cls==='b-urg' ? 'av-urg' : b.cls==='b-wait' ? 'av-wait' : 'av-ok';\n  const place = [p.dept, p.bed ? ('Giường '+p.bed) : ''].filter(Boolean).join(' · ');\n  const dx = p.dx || p.reason || '';\n  const chips = [];\n  if (p.admit) chips.push(`<span class=\"pt-chip\">Vào viện: ${p.admit}<\u002Fspan>`);\n  else if (p.time) chips.push(`<span class=\"pt-chip\">Vào lúc: ${p.time}<\u002Fspan>`);\n  if (p.bhyt===true) chips.push(`<span class=\"pt-chip pt-chip-bh\">BHYT<\u002Fspan>`);\n  else if (p.bhyt===false) chips.push(`<span class=\"pt-chip pt-chip-vp\">Viện phí<\u002Fspan>`);\n  if (!_sbSimple && p.tests && p.tests.length) chips.push(`<span class=\"pt-chip\">${p.tests.length} chỉ định XN<\u002Fspan>`);\n  const chipHtml = chips.length ? `<div class=\"pt-chips\">${chips.join('')}<\u002Fdiv>` : '';\n  return `<div class=\"pt-card\">\n      <div class=\"pt-av ${avCls}\">${initial}<\u002Fdiv>\n      <div class=\"pt-cbody\">\n        <div class=\"pt-ctop\"><span class=\"pt-cname\">${p.name}<\u002Fspan>${(!_sbSimple && b.text)?`<span class=\"badge ${b.cls}\">${b.text}<\u002Fspan>`:''}<\u002Fdiv>\n        <div class=\"pt-cmeta\"><span class=\"pt-id\">${p.id}<\u002Fspan> · ${place}<\u002Fdiv>\n        ${dx?`<div class=\"pt-cdx\">Chẩn đoán: ${dx}<\u002Fdiv>`:''}\n        ${chipHtml}\n        <div class=\"pt-cfoot\"><span class=\"pt-cdr\">Phụ trách: <b>${p.doctor||'—'}<\u002Fb><\u002Fspan>${_sbSimple?'':`<button class=\"pt-cbtn\" onclick=\"openPatientDetail(${i})\">Xem hồ sơ đầy đủ →<\u002Fbutton>`}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\nfunction renderCards(rows){\n  const wrap  = document.getElementById('sbCards');\n  const noRes = document.getElementById('sbNoResults');\n  _sbCardRows = rows;\n  if (!rows.length){ wrap.innerHTML=''; noRes.style.display='block'; return; }\n  noRes.style.display='none';\n  wrap.innerHTML = rows.map((p,i)=>cardHtml(p,i)).join('');\n}\nfunction filterTable(){\n  const q = document.getElementById('sbSearch').value.toLowerCase();\n  if (!q || !_sbKeys.length){ renderSb(_sbRows); return; }\n  renderSb(_sbRows.filter(r => _sbKeys.some(k => String(r[k]||'').toLowerCase().includes(q))));\n}\nfunction closeSidebar(){\n  document.getElementById('sbOv').classList.remove('open');\n  document.getElementById('sbPanel').classList.remove('open');\n  document.querySelectorAll('.xn-grp').forEach(el => el.classList.remove('active'));\n}\nfunction openSidebar(group){\n  const d = XN_DATA[group];\n  showSidebar({ title:'Xét nghiệm – '+group, sub:'Ngày 16/05/2025 · Nội trú',\n    badge: fmt(d.count)+' xét nghiệm', columns:XN_COLS, rows:d.patients, searchKeys:['name','id','dept'] });\n  document.querySelectorAll('.xn-grp').forEach(el => el.classList.remove('active'));\n  if (window.event && event.currentTarget) event.currentTarget.classList.add('active');\n}\nfunction openAlertSidebar(key){\n  const a = lastAlerts.find(x => x.key===key);\n  if (!a || !a.count) return;\n  const desc = a.key==='nang'   ? 'Người bệnh nặng cần theo dõi sát trong ca trực.'\n             : a.key==='capcuu' ? 'Người bệnh mới vào qua cấp cứu cần ưu tiên xử trí.'\n             : a.key==='tuvong' ? 'Trường hợp tử vong trong kỳ — hoàn tất hồ sơ và báo cáo.'\n             : 'Danh sách người bệnh liên quan.';\n  showSidebar({ title:'Giao ban – '+a.label, sub:desc, badge:fmt(a.count)+' người bệnh',\n    mode:'cards', rows:a.patients, searchKeys:['name','id','dept'] });\n}\nfunction openCbhdSidebar(key){\n  const MAP={\n    'nang-theo-doi':{label:'Người bệnh nặng theo dõi',desc:'NB nặng cần theo dõi sát trong ca trực.',pts:ALERT_PT.nang},\n    'vao-cap-cuu':  {label:'Người bệnh vào cấp cứu',  desc:'NB mới vào qua cấp cứu cần ưu tiên xử trí.',pts:ALERT_PT.capcuu},\n    'mo-cap-cuu':   {label:'Người bệnh mổ cấp cứu',   desc:'Ca phẫu thuật cấp cứu trong phiên trực.',pts:ALERT_PT.mocapcuu},\n    'tuvong':       {label:'Người bệnh tử vong',       desc:'Trường hợp tử vong trong ca — hoàn tất hồ sơ và báo cáo.',pts:ALERT_PT.tuvong},\n    'nang-xin-ve':  {label:'Người bệnh nặng xin về',  desc:'NB nặng đề nghị xin về — cần tư vấn và ghi nhận.',pts:ALERT_PT.xinve},\n    'chuyen-vien':  {label:'Người bệnh chuyển viện',  desc:'NB được chuyển viện trong ca trực.',pts:ALERT_PT.chuyenvien},\n    'mo':           {label:'Người bệnh phẫu thuật',    desc:'Danh sách NB phẫu thuật trong phiên trực.',pts:ALERT_PT.mo},\n    'noisoi':       {label:'Người bệnh nội soi',        desc:'Danh sách NB nội soi trong phiên trực.',pts:ALERT_PT.noisoi}\n  };\n  const cfg=MAP[key]; if(!cfg) return;\n  const rows=cfg.pts||[];\n  showSidebar({title:cfg.label,sub:cfg.desc,badge:rows.length>0?fmt(rows.length)+' người bệnh':'Không có người bệnh',mode:'cards',rows,searchKeys:['name','id','dept'],simple:true});\n}\nfunction openPrioritySidebar(){\n  const nang = lastAlerts.find(a => a.key==='nang') || {patients:[]};\n  const cc   = lastAlerts.find(a => a.key==='capcuu') || {patients:[]};\n  const rows = [...nang.patients, ...cc.patients];\n  if (!rows.length) return;\n  showSidebar({ title:'Người bệnh cần ưu tiên',\n    sub:'Các ca nặng theo dõi và mới vào cấp cứu — ưu tiên xử trí trong ca.',\n    badge:fmt(rows.length)+' người bệnh', mode:'cards', rows, searchKeys:['name','id','dept'] });\n}\nfunction openFlowSidebar(which){\n  const segs = lastFlowSegs[which];\n  if (!segs || !segs.length) return;\n  const total = segs.reduce((s,x) => s+x.val, 0);\n  const rows = segs.map(s => ({ src:s.name, n:s.val, pct:Math.round(s.val/total*100), color:s.color }));\n  showSidebar({ title:(which==='vv'?'Vào viện':'Ra viện')+' – phân rã theo hình thức',\n    sub:'Ngày 16/05/2025 · Tổng '+fmt(total)+' người bệnh', badge: fmt(total)+' người bệnh',\n    columns:FLOW_COLS, rows, searchKeys:[] });\n}\n\n/* ====== HỒ SƠ CHI TIẾT (hiển thị trong cùng side panel) ====== */\nfunction openPatientDetail(i){\n  const p = _sbCardRows[i];\n  if(!p) return;\n  const b = p.level || p.status || null;\n  document.getElementById('sbSearchWrap').style.display='none';\n  document.getElementById('sbCards').style.display='none';\n  document.getElementById('sbTable').style.display='none';\n  document.getElementById('sbNoResults').style.display='none';\n  document.getElementById('sbBadgeWrap').style.display='none';\n  document.getElementById('sbBack').style.display='inline-flex';\n  document.getElementById('sbTitle').textContent = p.name || '—';\n  document.getElementById('sbSub').innerHTML = `<span class=\"pt-id\">${p.id||''}<\u002Fspan> · ${p.dept||''}${p.bed?(' · Giường '+p.bed):''}`;\n  const db = document.getElementById('sbDetailBadge');\n  db.style.display = (b&&b.text)?'block':'none';\n  db.innerHTML = (b&&b.text)?`<span class=\"badge ${b.cls}\">${b.text}<\u002Fspan>`:'';\n  const dt = document.getElementById('sbDetail');\n  dt.style.display='block';\n  dt.innerHTML = detailHtml(p);\n  document.getElementById('sbOv').classList.add('open');\n  document.getElementById('sbPanel').classList.add('open');\n}\nfunction sbGoBack(){ if(_sbCfg) showSidebar(_sbCfg); }\nfunction detailHtml(p){\n  const b = p.level || p.status || null;\n  const hoso = p.hoso || ('HS' + String(p.id||'').replace(/^BN/,''));\n  const isDeath = !!(b && /Tử vong/i.test(b.text));\n  const dis = p.discharge || null;\n  const disLabel = dis ? dis : 'Đang điều trị';\n  const los = (p.los!=null) ? p.los + ' ngày' : '—';\n  const dx = p.dx || p.reason || '—';\n  const tests = p.tests || [];\n  const bhytRow = p.bhyt===true\n    ? `<span class=\"badge b-done\">BHYT<\u002Fspan><span class=\"dt-fv\" style=\"font-weight:400\">${p.bhytCode||'Có thẻ BHYT'}<\u002Fspan>`\n    : p.bhyt===false\n    ? `<span class=\"badge b-wait\">Viện phí<\u002Fspan><span class=\"dt-fv\" style=\"font-weight:400\">Không có thẻ BHYT<\u002Fspan>`\n    : `<span class=\"dt-fv\" style=\"font-weight:400;color:var(--c-muted)\">Chưa có thông tin<\u002Fspan>`;\n  const testHtml = tests.length\n    ? tests.map(t=>{ const st=STATUS_MAP[t.status]||{text:t.status||'',cls:'b-done'}; return `<div class=\"dt-test\"><span>${t.name}<\u002Fspan><span class=\"badge ${st.cls}\">${st.text}<\u002Fspan><\u002Fdiv>`; }).join('')\n    : '<div style=\"color:var(--c-muted);font-size:var(--fs-axis);padding:4px 0\">Chưa có chỉ định xét nghiệm<\u002Fdiv>';\n  return `\n    <div class=\"dt-sec\"><div class=\"dt-st\">Hồ sơ bệnh án<\u002Fdiv>\n      <div class=\"dt-grid\">\n        <div class=\"dt-f\"><span class=\"dt-fl\">Mã hồ sơ<\u002Fspan><span class=\"dt-fv\">${hoso}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\"><span class=\"dt-fl\">Mã người bệnh<\u002Fspan><span class=\"dt-fv\"><span class=\"pt-id\">${p.id||'—'}<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\"><span class=\"dt-fl\">Khoa<\u002Fspan><span class=\"dt-fv\">${p.dept||'—'}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\"><span class=\"dt-fl\">Giường<\u002Fspan><span class=\"dt-fv\">${p.bed||'—'}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\" style=\"grid-column:1/-1\"><span class=\"dt-fl\">Chẩn đoán<\u002Fspan><span class=\"dt-fv\">${dx}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\" style=\"grid-column:1/-1\"><span class=\"dt-fl\">Bác sĩ phụ trách<\u002Fspan><span class=\"dt-fv\">${p.doctor||'—'}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dt-sec\"><div class=\"dt-st\">Thời gian điều trị<\u002Fdiv>\n      <div class=\"dt-grid\">\n        <div class=\"dt-f\"><span class=\"dt-fl\">Thời gian vào viện<\u002Fspan><span class=\"dt-fv\">${p.admit||'—'}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\"><span class=\"dt-fl\">${isDeath?'Thời gian tử vong':'Thời gian ra viện'}<\u002Fspan><span class=\"dt-fv\"${(dis&&isDeath)?' style=\"color:#ea232b\"':''}>${disLabel}<\u002Fspan><\u002Fdiv>\n        <div class=\"dt-f\"><span class=\"dt-fl\">Số ngày nằm<\u002Fspan><span class=\"dt-fv\">${los}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${p.vitals ? `<div class=\"dt-sec\"><div class=\"dt-st\">Dấu hiệu sinh tồn <span style=\"font-size:10px;font-weight:400;color:var(--c-muted)\">(${p.vitals.time})<\u002Fspan><\u002Fdiv><div class=\"dt-grid\"><div class=\"dt-f\"><span class=\"dt-fl\">Mạch<\u002Fspan><span class=\"dt-fv\">${p.vitals.mach}<\u002Fspan><\u002Fdiv><div class=\"dt-f\"><span class=\"dt-fl\">Huyết áp<\u002Fspan><span class=\"dt-fv\">${p.vitals.ha}<\u002Fspan><\u002Fdiv><div class=\"dt-f\"><span class=\"dt-fl\">SpO₂<\u002Fspan><span class=\"dt-fv\">${p.vitals.spo2}<\u002Fspan><\u002Fdiv><div class=\"dt-f\"><span class=\"dt-fl\">Nhiệt độ<\u002Fspan><span class=\"dt-fv\">${p.vitals.nhiet}<\u002Fspan><\u002Fdiv><div class=\"dt-f\"><span class=\"dt-fl\">Nhịp thở<\u002Fspan><span class=\"dt-fv\">${p.vitals.nhip}<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>` : ''}\n    <div class=\"dt-sec\"><div class=\"dt-st\">Bảo hiểm y tế<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">${bhytRow}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dt-sec\"><div class=\"dt-st\">Chỉ định xét nghiệm (${tests.length})<\u002Fdiv>\n      <div>${testHtml}<\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\ndocument.addEventListener('keydown', e => { if(e.key==='Escape'){ if(document.getElementById('sbDetail').style.display==='block') sbGoBack(); else closeSidebar(); } });\n\n// Sankey hover tooltip\n(function(){\n  const wrap = document.querySelector('.sankey-wrap');\n  const tip  = document.getElementById('sankeyTip');\n  if (!wrap || !tip) return;\n  wrap.addEventListener('mousemove', e => {\n    const t = e.target.closest('[data-l]');\n    if (t) {\n      const r = wrap.getBoundingClientRect();\n      tip.style.left = (e.clientX - r.left) + 'px';\n      tip.style.top  = (e.clientY - r.top)  + 'px';\n      tip.textContent = t.dataset.l + ': ' + t.dataset.v + ' người bệnh';\n      tip.classList.add('show');\n    } else {\n      tip.classList.remove('show');\n    }\n  });\n  wrap.addEventListener('mouseleave', () => tip.classList.remove('show'));\n  wrap.addEventListener('click', e => {\n    const t = e.target.closest('[data-flow]');\n    if (t && t.dataset.flow) openFlowSidebar(t.dataset.flow);\n  });\n})();\n\n/* ============================================================\n   REUSABLE COMPARISON-TABLE COMPONENT\n   - renderCompTable(mountId, columns, rows, rowClickFnName)\n   - dùng cho: so sánh dịch vụ CLS  &  so sánh luồng theo khoa\n   ============================================================ */\nfunction compCell(row, col){\n  if (col.type==='label') return `<td><span class=\"cmp-name\">${row[col.key]}<\u002Fspan><\u002Ftd>`;\n  if (col.type==='num')   return `<td class=\"num\"><span class=\"cmp-num\">${fmt(row[col.key])}<\u002Fspan><\u002Ftd>`;\n  if (col.type==='split'){\n    const noi=row.noi, ngt=Math.max(0,row.total-row.noi);\n    const pct=row.total?Math.round(row.noi/row.total*100):0;\n    const w=row.total?(row.noi/row.total*100):0;\n    return `<td class=\"cmp-split\">\n      <div class=\"cmp-splitbar\"><i style=\"width:${w}%;background:#256e45\"><\u002Fi><i style=\"width:${100-w}%;background:#a6d8bc\"><\u002Fi><\u002Fdiv>\n      <div class=\"cmp-splitcap\"><b>${fmt(noi)}<\u002Fb> NT · <b>${fmt(ngt)}<\u002Fb> NgT (${pct}% NT)<\u002Fdiv>\n    <\u002Ftd>`;\n  }\n  if (col.type==='delta'){\n    const d=row[col.key];\n    if(!d) return `<td class=\"num\"><span style=\"color:var(--c-muted)\">—<\u002Fspan><\u002Ftd>`;\n    const cls=d>0?'c-up':'c-down', arr=d>0?'↑':'↓';\n    return `<td class=\"num\"><span class=\"cmp-delta ${cls}\">${arr} ${d>0?'+':'−'}${fmt(Math.abs(d))}<\u002Fspan><\u002Ftd>`;\n  }\n  if (col.type==='net'){\n    const d=row[col.key];\n    const cls=d>0?'c-up':d<0?'c-down':'';\n    const txt=d>0?('+'+fmt(d)):d<0?('−'+fmt(Math.abs(d))):'0';\n    return `<td class=\"num\"><span class=\"cmp-net ${cls}\">${txt}<\u002Fspan><\u002Ftd>`;\n  }\n  if (col.type==='noibar'){\n    const pct=row.total?Math.round(row.noi/row.total*100):0;\n    const w=row.total?(row.noi/row.total*100):0;\n    return `<td class=\"cmp-split\"><div class=\"cmp-splitbar\"><i style=\"width:${w}%;background:#256e45\"><\u002Fi><\u002Fdiv><div class=\"cmp-splitcap\"><b>${fmt(row.noi)}<\u002Fb> nội trú (${pct}% tổng)<\u002Fdiv><\u002Ftd>`;\n  }\n  if (col.type==='goto') return `<td class=\"num\"><span class=\"cmp-go\">›<\u002Fspan><\u002Ftd>`;\n  return `<td>${row[col.key]}<\u002Ftd>`;\n}\nfunction renderCompTable(mountId, columns, rows, rowClickFn){\n  const isNum = c => ['num','delta','net','goto'].includes(c.type);\n  const head = '<tr>' + columns.map(c=>`<th class=\"${isNum(c)?'num':''}\"${c.width?` style=\"width:${c.width}\"`:''}>${c.label}<\u002Fth>`).join('') + '<\u002Ftr>';\n  const body = rows.map(r=>`<tr class=\"${rowClickFn?'cmp-row':''}\" ${rowClickFn?`onclick=\"${rowClickFn}('${r.key}')\"`:''} style=\"${rowClickFn?'':'cursor:default'}\">${columns.map(c=>compCell(r,c)).join('')}<\u002Ftr>`).join('');\n  document.getElementById(mountId).innerHTML = `<table class=\"cmp-tbl\"><thead>${head}<\u002Fthead><tbody>${body}<\u002Ftbody><\u002Ftable>`;\n}\n\n/* ---- Instance 1: Dịch vụ cận lâm sàng ---- */\nconst CLS_SERVICES = [\n  {key:'xn',  name:'Xét nghiệm',         total:8362, noi:4108, d:124},\n  {key:'cdha',name:'Chẩn đoán hình ảnh', total:1686, noi:311,  d:18},\n  {key:'tdcn',name:'Thăm dò chức năng',  total:220,  noi:75,   d:-5},\n  {key:'yhhn',name:'Y học hạt nhân',     total:92,   noi:0,    d:3},\n  {key:'gpb', name:'Giải phẫu bệnh',     total:302,  noi:164,  d:12},\n  {key:'tm',  name:'Truyền máu',         total:16,   noi:16,   d:0}\n];\nconst SVC_COLS = [\n  {key:'name', label:'Dịch vụ', type:'label'},\n  {key:'total',label:'Tổng', type:'num', width:'70px'},\n  {key:'noi',  label:'Nội trú', type:'noibar'},\n  {key:'d',    label:'Δ hôm qua', type:'delta', width:'94px'},\n  {key:'go',   label:'', type:'goto', width:'22px'}\n];\nlet _svcSort='total';\nfunction renderServicesComp(){\n  if(!document.getElementById('clsCompTable')) return;\n  const _sc = window.__clsScale || 1;\n  let rows = CLS_SERVICES.map(s=>({...s, total:Math.round(s.total*_sc), noi:Math.round(s.noi*_sc)}));\n  if(_svcSort==='pct') rows.sort((a,b)=>(b.noi/b.total)-(a.noi/a.total));\n  else rows.sort((a,b)=>b.total-a.total);\n  renderCompTable('clsCompTable', SVC_COLS, rows, null);\n  document.getElementById('svcLegend').innerHTML =\n    '<span><i style=\"background:#256e45\"><\u002Fi>Nội trú<\u002Fspan><span style=\"margin-left:auto\">Thanh thể hiện tỉ lệ nội trú trên tổng số chỉ định<\u002Fspan>';\n  document.getElementById('srtTotal').classList.toggle('active', _svcSort==='total');\n  document.getElementById('srtPct').classList.toggle('active', _svcSort==='pct');\n}\nfunction setSvcSort(s){ _svcSort=s; renderServicesComp(); }\n\n/* ---- Instance 2: Luồng theo khoa (tái sử dụng cùng component) ---- */\nconst DEPT_FLOW = [\n  {key:'txyc',   name:'Tia xạ YC',                          vao:6,  ra:5,  bhyt:4},\n  {key:'tx',     name:'Tia xạ',                             vao:9,  ra:8,  bhyt:8},\n  {key:'npv',    name:'Nội phổi - vú',                       vao:9,  ra:8,  bhyt:8},\n  {key:'nth',    name:'Nội tổng hợp',                        vao:12, ra:10, bhyt:11},\n  {key:'csgn',   name:'Chăm sóc giảm nhẹ',                    vao:2,  ra:2,  bhyt:2},\n  {key:'gmhs',   name:'Gây Mê - Hồi Sức',                    vao:4,  ra:3,  bhyt:3},\n  {key:'yhhn',   name:'Y Học Hạt Nhân',                      vao:3,  ra:2,  bhyt:3},\n  {key:'nthyc',  name:'Khoa Nội Tổng hợp theo yêu cầu',      vao:5,  ra:4,  bhyt:2},\n  {key:'nthtyc', name:'Nội Tiêu hóa theo yêu cầu',          vao:4,  ra:4,  bhyt:2},\n  {key:'nvptyc', name:'Nội vú phụ khoa đầu cổ theo yêu cầu', vao:3,  ra:3,  bhyt:1},\n  {key:'nbnngay',name:'Nội Tổng Hợp Điều Trị Ban Ngày TYC',  vao:7,  ra:7,  bhyt:2}\n];\nconst DEPT_COLS = [\n  {key:'name', label:'Khoa', type:'label'},\n  {key:'vao',  label:'Tổng số lượt vào', type:'num', width:'96px'},\n  {key:'ra',   label:'Tổng số lượt ra', type:'num', width:'96px'},\n  {key:'go',   label:'', type:'goto', width:'20px'}\n];\nfunction renderDeptComp(){\n  const rows = DEPT_FLOW.slice().sort((a,b)=>b.vao-a.vao);\n  renderCompTable('flowCompTable', DEPT_COLS, rows, 'openDeptSidebar');\n}\nconst DEPTPT_COLS = [\n  {label:'#', type:'index', width:'30px'},\n  {label:'Mã HSBA', key:'hoso', type:'id', width:'120px'},\n  {label:'Họ và tên', key:'name', type:'name'},\n  {label:'Chẩn đoán', key:'dx', type:'text'},\n  {label:'BHYT', key:'ins', type:'badge', width:'74px'}\n];\nfunction makeDeptPatients(key, count, bhytCount){\n  const arr=[]; const seed = key.length*11 + 3;\n  for(let i=0;i<count;i++){\n    const ins = i < bhytCount;\n    arr.push({\n      hoso:'HSBA-25-'+(20000+((seed*17+i*73)%79999)),\n      name:NAME_POOL[(i*4+seed)%NAME_POOL.length],\n      dx:DX_POOL[(i*2+seed)%DX_POOL.length],\n      ins: ins?{text:'BHYT',cls:'b-done'}:{text:'Viện phí',cls:'b-wait'}\n    });\n  }\n  return arr;\n}\nfunction openDeptSidebar(key){\n  const d = DEPT_FLOW.find(x=>x.key===key);\n  if(!d) return;\n  const n = Math.min(12, Math.max(d.vao,5));\n  showSidebar({\n    title:'Luồng người bệnh – '+d.name,\n    sub:`Ngày 16/05/2025 · Lượt vào ${fmt(d.vao)} · Lượt ra ${fmt(d.ra)} · BHYT ${fmt(d.bhyt)}`,\n    badge: fmt(d.vao)+' lượt vào',\n    columns: DEPTPT_COLS,\n    rows: makeDeptPatients(key, n, Math.min(n, d.bhyt)),\n    searchKeys:['name','hoso']\n  });\n}\n\n/* ---- View toggle Bảng / Thẻ cho khối Cận lâm sàng ---- */\nfunction clsSetView(v){\n  const bang = v==='bang';\n  document.getElementById('clsBang').style.display = bang?'block':'none';\n  document.getElementById('clsThe').style.display  = bang?'none':'block';\n  document.getElementById('clsTabs').style.display = bang?'none':'flex';\n  document.getElementById('vtBang').classList.toggle('active', bang);\n  document.getElementById('vtThe').classList.toggle('active', !bang);\n  if(!bang) renderClsDetail(_clsTab);\n}\n\n/* ---- Danh sách người bệnh của một dịch vụ (mở cùng side panel) ---- */\nconst NAME_POOL = ['Nguyễn Văn An','Trần Thị Bình','Lê Hoàng Cường','Phạm Thị Dung','Vũ Minh Đức','Đỗ Thị Hà','Hoàng Văn Giang','Bùi Thị Hoa','Ngô Đức Khánh','Lý Thị Lan','Đặng Văn Minh','Cao Thị Nga'];\nconst DEPT_POOL = ['Nội Tổng Hợp','Nội Phổi – Vú','Ngoại Tổng Hợp','Ngoại Đầu Cổ','Xạ trị','CSGN'];\nconst SVC_TESTS = {\n  xn:['Công thức máu (CBC)','Sinh hóa máu','Đông máu PT/APTT','Điện giải đồ'],\n  cdha:['X-quang ngực','CT scan ổ bụng','Cộng hưởng từ (MRI)','Siêu âm Doppler'],\n  tdcn:['Điện tim (ECG)','Đo chức năng hô hấp','Điện não đồ (EEG)','Holter điện tim'],\n  yhhn:['Xạ hình xương','PET/CT','Xạ hình tuyến giáp','Đo độ tập trung iod'],\n  gpb:['Sinh thiết tức thì','Tế bào học','Mô bệnh học','Hóa mô miễn dịch'],\n  tm:['Truyền khối hồng cầu','Truyền tiểu cầu','Truyền huyết tương','Định nhóm máu']\n};\nconst STATUS_CYCLE = ['done','done','wait','done','urg','wait'];\nfunction makeServicePatients(key, count){\n  const tests = SVC_TESTS[key]||['Chỉ định'];\n  const arr=[];\n  for(let i=0;i<count;i++){\n    const nm = NAME_POOL[(i*3+1)%NAME_POOL.length];\n    const st = STATUS_CYCLE[i%STATUS_CYCLE.length];\n    const ins = (i%4!==0);\n    arr.push({\n      id:'BN25-00'+(4100+i*7+key.length),\n      name:nm, dept:DEPT_POOL[i%DEPT_POOL.length],\n      dx:tests[i%tests.length], status:st,\n      doctor:'BS. '+NAME_POOL[(i*5+2)%NAME_POOL.length],\n      hoso:'HS25-0'+(7000+i*13),\n      admit:'1'+(3+i%4)+'/05/2025 0'+(7+i%3)+':'+(i%6)+'5',\n      discharge:null, los:(1+i%9), bhyt:ins,\n      bhytCode:ins?('DN4 79 00'+(11223344+i*7)):'',\n      tests:tests.slice(0,2+i%3).map((t,j)=>({name:t,status:STATUS_CYCLE[(i+j)%STATUS_CYCLE.length]}))\n    });\n  }\n  return arr;\n}\nfunction openServiceSidebar(key){\n  const svc = CLS_SERVICES.find(s=>s.key===key);\n  if(!svc) return;\n  const ngt = Math.max(0, svc.total-svc.noi);\n  const n = Math.min(6, svc.total);\n  showSidebar({\n    title: svc.name,\n    sub: `Ngày 16/05/2025 · Nội trú ${fmt(svc.noi)} / Tổng ${fmt(svc.total)}`,\n    badge: fmt(svc.total)+' chỉ định',\n    mode:'cards',\n    rows: makeServicePatients(key, n),\n    searchKeys:['name','id','dept']\n  });\n}\n\n/* ---- Lát cắt chi tiết cận lâm sàng theo từng dịch vụ (Thẻ) ---- */\nlet _clsTab='xn';\nconst CLS_DETAIL = {\n  xn:{ name:'Xét nghiệm', groups:[\n    {name:'Huyết học',count:870},{name:'Hóa sinh',count:5867},{name:'Vi sinh',count:161},\n    {name:'HIV',count:142},{name:'HCV',count:98},{name:'HBsAg',count:176},\n    {name:'Protein dịch',count:54},{name:'Huyết đồ',count:805},{name:'Tủy đồ',count:23},\n    {name:'Miễn dịch',count:1103},{name:'Xét nghiệm Khác',count:361},{name:'Xét nghiệm HPV',count:1}\n  ]},\n  cdha:{ name:'Chẩn đoán hình ảnh', groups:[\n    {name:'Số lần chụp XQuang',count:980},\n    {name:'Siêu âm',count:520,subs:[{name:'Siêu âm đầu dò',count:60},{name:'Siêu âm tim',count:110},{name:'Siêu âm doppler',count:95},{name:'Siêu âm thường',count:240},{name:'Khác',count:15}]},\n    {name:'Chụp mạch',count:28},{name:'Can thiệp mạch',count:19},\n    {name:'CT-Scanner',count:286,subs:[{name:'CT 128 dãy',count:150},{name:'CT 64 dãy',count:96},{name:'CT 8 dãy',count:40}]},\n    {name:'Cộng hưởng từ',count:142,subs:[{name:'CHT nhà A',count:88},{name:'CHT Nhà F',count:54}]}\n  ]},\n  tdcn:{ name:'Thăm dò chức năng', groups:[\n    {name:'Điện tim',count:96},{name:'Điện não',count:24},\n    {name:'Nội soi',count:100,subs:[{name:'Nội soi TMH',count:18},{name:'Nội soi Tiêu hóa',count:42},{name:'Nội soi CTC',count:12},{name:'Nội soi Bàng quang',count:9},{name:'Nội soi Phế quản',count:19}]}\n  ]},\n  yhhn:{ name:'Y học hạt nhân', groups:[\n    {name:'Xạ hình',count:38},{name:'Chụp PET/CT',count:21},{name:'Đo độ tập trung I131',count:18},{name:'Đo mật độ xương',count:15}\n  ]},\n  gpb:{ name:'Giải phẫu bệnh', groups:[\n    {name:'Tế bào',count:88},{name:'Giải phẫu bệnh',count:164},{name:'Hóa mô miễn dịch',count:38},{name:'Xét nghiệm Gen',count:12}\n  ]},\n  tm:{ name:'Truyền máu', groups:[\n    {name:'Lượt truyền máu',count:16}\n  ]}\n};\nconst CLSG_COLS = [\n  {label:'#', type:'index', width:'30px'},\n  {label:'Mã HSBA', key:'hoso', type:'id', width:'124px'},\n  {label:'Họ và tên', key:'name', type:'name'},\n  {label:'Chẩn đoán', key:'dx', type:'text'}\n];\nconst DX_POOL = ['Ung thư vú','Ung thư phổi','Ung thư đại trực tràng','Ung thư gan','Ung thư dạ dày','U lympho không Hodgkin','Ung thư vòm họng','Ung thư cổ tử cung','Ung thư tuyến giáp','Bạch cầu cấp dòng tủy','Ung thư buồng trứng','Ung thư tiền liệt tuyến'];\nfunction makeClsPatients(svcKey, groupName, count){\n  const arr=[];\n  const seed = groupName.length*7 + svcKey.length*13;\n  for(let i=0;i<count;i++){\n    arr.push({\n      hoso:'HSBA-25-'+ (10000 + ((seed*31 + i*97)%89999)),\n      name:NAME_POOL[(i*3+seed)%NAME_POOL.length],\n      dept:DEPT_POOL[(i+seed)%DEPT_POOL.length],\n      dx:DX_POOL[(i+seed)%DX_POOL.length]\n    });\n  }\n  return arr;\n}\nfunction openClsGroupSidebar(svcKey, groupName, count){\n  const svc = CLS_DETAIL[svcKey];\n  const n = Math.min(12, count);\n  showSidebar({\n    title: svc.name + ' – ' + groupName,\n    sub: 'Ngày 16/05/2025 · '+fmt(count)+' lượt chỉ định',\n    badge: fmt(count)+' người bệnh',\n    columns: CLSG_COLS,\n    rows: makeClsPatients(svcKey, groupName, n),\n    searchKeys:['name','hoso']\n  });\n}\n/* New render function - minimal card style without bars */\nfunction renderClsDetailNew(key){\n  const svc = CLS_DETAIL[key];\n  if(!svc) return;\n  const headEl = document.getElementById('clsDetailHeadNew');\n  const gridEl = document.getElementById('clsDetailNew');\n  if(!headEl || !gridEl) return;\n  headEl.innerHTML = `${svc.name}`;\n  \n  // Calculate total for each group\n  const totals = {};\n  svc.groups.forEach(g => {\n    totals[g.name] = g.count + (g.subs ? g.subs.reduce((s,sub)=>s+sub.count,0) : 0);\n  });\n  \n  gridEl.innerHTML = svc.groups.map(g=>{\n    const total = g.count;\n    return `<div class=\"clsd-card-new\">\n      <div class=\"clsd-scorecard-row\">\n        <div class=\"clsd-scorecard-total\">\n          <div class=\"clsd-sc-num\">${fmt(total)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"clsd-scorecard-info\" onclick=\"openClsGroupSidebar('${key}', '${g.name.replace(/'/g,\"\\\\\\'\")}', ${total})\">\n          <span class=\"clsd-card-new-name\">${g.name}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction renderClsDetail(key){\n  const svc = CLS_DETAIL[key];\n  if(!svc) return;\n  const headEl = document.getElementById('clsDetailHead');\n  const gridEl = document.getElementById('clsDetail');\n  if(!headEl || !gridEl) return;\n  headEl.innerHTML =\n    `Chi tiết ${svc.name} theo nhóm<span style=\"color:var(--c-muted);font-weight:400;margin-left:6px\">— Nhấn vào nhóm để xem danh sách người bệnh (tên · mã hồ sơ · chẩn đoán)<\u002Fspan>`;\n  const max = Math.max(...svc.groups.map(g=>g.count), 1);\n  const esc = s => s.replace(/'/g,\"\\\\'\");\n  gridEl.innerHTML = svc.groups.map(g=>{\n    const w = Math.max(4, Math.round(g.count/max*100));\n    if(!g.subs){\n      return `<div class=\"clsd-card\">\n        <div class=\"clsd-top\"><span class=\"clsd-nm\">${g.name}<\u002Fspan><\u002Fdiv>\n        <div class=\"clsd-bar\"><i style=\"width:${w}%\"><\u002Fi><\u002Fdiv>\n        <div class=\"clsd-cnt\">${fmt(g.count)}<\u002Fdiv>\n      <\u002Fdiv>`;\n    }\n    const smax = Math.max(...g.subs.map(s=>s.count),1);\n    const subs = g.subs.map(s=>{\n      const sw=Math.max(5,Math.round(s.count/smax*100));\n      return `<div class=\"clsd-sub\" style=\"cursor:default\"><span class=\"clsd-subnm\">${s.name}<\u002Fspan><span class=\"clsd-subbar\"><i style=\"width:${sw}%\"><\u002Fi><\u002Fspan><span class=\"clsd-subcnt\">${fmt(s.count)}<\u002Fspan><\u002Fdiv>`;\n    }).join('');\n    return `<div class=\"clsd-card clsd-haschild\">\n      <div class=\"clsd-top\"><span class=\"clsd-nm\">${g.name}<\u002Fspan><span class=\"clsd-cnt2\">${fmt(g.count)}<\u002Fspan><\u002Fdiv>\n      <div class=\"clsd-subs\">${subs}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ====================================================\n   const p1Tot = p1.reduce((s,g)=>s+g.val,0);\n  const kk = document.getElementById('khamKetHopContent');\n  if (kk) kk.innerHTML =\n    `<div class=\"cc-head\"><span class=\"cc-name\"><\u002Fspan><span class=\"cc-sp\"><\u002Fspan><span class=\"cc-qty cc-th\">Số lượng<\u002Fspan><\u002Fdiv>`\n    + p1.map(g => {\n      const w = Math.round(g.val/p1Max*100);\n      return `<div class=\"cc-row\">\n      <span class=\"cc-name\">${g.name}<\u002Fspan>\n      <div class=\"cc-track\"><i style=\"width:${w}%\"><\u002Fi><\u002Fdiv>\n      <span class=\"cc-qty\">${fmt(g.val)}<\u002Fspan>\n    <\u002Fdiv>`;\n    }).join('')\n    + `<div class=\"cc-row cc-total\">\n      <span class=\"cc-name\">Tổng cộng<\u002Fspan>\n      <span class=\"cc-sp\"><\u002Fspan>\n      <span class=\"cc-qty\">${fmt(p1Tot)}<\u002Fspan>\n    <\u002Fdiv>`;\n\n  // Pane 2: ngoại trú — convert to bar chart\n  const p2 = KHAM_DATA.pane2;\n  const p2Max = Math.max(...p2.map(g=>g.val));\n  const p2Tot = p2.reduce((s,g)=>s+g.val,0);\n  const nt = document.getElementById('khamNgoaiTruContent');\n  if (nt) nt.innerHTML = p2.map(g => {\n    const pct = Math.round(g.val/p2Tot*100);\n    const w = Math.round(g.val/p2Max*100);\n    return `<div class=\"hbar-row\">\n      <span class=\"hbar-label\">${g.name}<\u002Fspan>\n      <div class=\"hbar-track\"><div class=\"hbar-fill\" style=\"width:${w}%\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"hbar-val\">${fmt(g.val)}<\u002Fspan>\n      <span class=\"hbar-pct\">${pct}%<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // Pane 3: vào viện — column chart\n  const p3 = KHAM_DATA.pane3;\n  const p3Max = Math.max(...p3.map(g=>g.val));\n  const chartH = 110;\n  const vv = document.getElementById('khamVaoVienChart');\n  if (vv) vv.innerHTML = `\n    <div style=\"overflow-x:auto\">\n      <div style=\"min-width:${p3.length*32}px\">\n        <div style=\"display:flex;align-items:flex-end;gap:3px;height:${chartH}px;border-bottom:1px solid #e5e7eb;padding:4px 0 0\">\n          $
