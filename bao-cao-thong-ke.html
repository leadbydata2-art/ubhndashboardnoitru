  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7982c1c2-4223-49f3-9a6b-2b33c80a564e\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"5f9f3e3b-eb04-49b3-a55e-1e195fb17e92\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"dc5b57bb-739b-455b-a22a-61283e2b8d48\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"04f5da87-261f-4af2-9972-d1172b389bc4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"dcf6a746-a182-42b8-899e-a0aa3f648627\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   type-scale.css — HỆ TYPOGRAPHY DÙNG CHUNG (nguồn chân lý duy nhất)\n   Font mặc định: Inter (400/500/600/700/800)\n   Mọi số liệu: font-variant-numeric: tabular-nums\n   ------------------------------------------------------------\n   Mọi dashboard <link> file này rồi dùng biến --fs-* / --fw-* / --c-*.\n   Các tên biến cũ (từ các bản migrate trước) được giữ làm alias để\n   không phá vỡ file đang tham chiếu.\n   ============================================================ */\n\n:root{\n  /* ═══ FONT FAMILY ═══ */\n  --font-sans: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif;\n\n  /* ═══ FONT WEIGHTS ═══ */\n  --fw-regular: 400;\n  --fw-medium: 500;\n  --fw-semibold: 600;\n  --fw-bold: 700;\n  --fw-extrabold: 800;\n  /* alias cũ */\n  --fw-reg: 400; --fw-med: 500; --fw-semi: 600; --fw-title: 700;\n  --fw-dashboard-title: 700; --fw-card-title: 700; --fw-kpi-name: 600;\n  --fw-kpi-value: 700; --fw-flow-num: 700; --fw-delta: 700;\n\n  /* ═══ TEXT COLORS (theo vai trò) ═══ */\n  --c-title:  #1f2937;   /* tiêu đề trang / panel / số lớn */\n  --c-label:  #5a6b82;   /* nhãn field / scorecard / KPI */\n  --c-legend: #33415a;   /* nhãn dòng / legend / body */\n  --c-muted:  #9aa7b8;   /* đơn vị / ghi chú / header bảng / trục / phụ đề */\n  --c-up:     #1d9d57;   /* delta tăng */\n  --c-down:   #d24545;   /* delta giảm */\n  --c-primary:#024593;   /* nhấn primary */\n  /* alias cũ */\n  --c-num:    #1f2937;   --c-number: #1f2937;\n  --c-body:   #33415a;\n  --c-faint:  #9aa7b8;\n  --c-delta-up:   #1d9d57;\n  --c-delta-down: #d24545;\n\n  /* ═══ FONT SIZES (type-scale) ═══ */\n  --fs-page-title:   34px;   /* tiêu đề trang có thanh logo */\n  --fs-page-title-sm:20px;   /* tiêu đề trang bản thường */\n  --fs-card-title:   17.5px; /* tiêu đề thẻ / chart */\n  --fs-card-sub:     14.5px; /* phụ đề thẻ */\n  --fs-kpi-label:    15px;   /* tiêu đề KPI */\n  --fs-kpi-value:    34px;   /* số KPI lớn */\n  --fs-kpi-unit:     16px;   /* đơn vị KPI */\n  --fs-metric-sec:   20px;   /* số chỉ số phụ */\n  --fs-delta:        13.5px; /* delta tăng/giảm */\n  --fs-legend:       13.5px; /* legend */\n  --fs-field-label:  15px;   /* nhãn field / scorecard */\n  --fs-axis:         12px;   /* trục / đơn vị / header bảng */\n  --fs-table:        12.5px; /* bảng / danh sách */\n  --fs-chip:         11px;   /* chip / dot legend */\n\n  /* alias cũ → ánh xạ về scale trên */\n  --fs-page-title-logo:  34px;\n  --fs-dash-title:       20px;\n  --fs-dashboard-title:  20px;\n  --fs-kpi-title:        15px;\n  --fs-kpi-name:         15px;\n  --fs-flow-num:         20px;\n  --fs-body:             14.5px;\n  --fs-chip-num:         20px;\n  --fs-chip-lbl:         13px;\n  --fs-caption:          12px;\n  --fs-icd:              12.5px;\n  --fs-svg:              12px;\n  --fs-svg-axis:         12px;\n}\n\n/* Nền tảng chung: font family + số liệu tabular */\nbody{ font-family: var(--font-sans); }\n\n[class*=\"num\"],\n.kpi-value,.kpi-num,.metric-val,.metric-num,.stat-num,\n.kc-value,.kc-pv,.kpi-dnum,.flow-big,.a-num,.act-n,.act-fv,\n.delta,.sc-num,.card-num,\n.mtx td,.btbl td,.btbl th,\n[data-numeric]{\n  font-variant-numeric: tabular-nums;\n}\n\n/* ═══ HELPER CLASSES (dán thẳng lên phần tử) ═══ */\n.t-page-title { font-size:var(--fs-page-title);  font-weight:var(--fw-bold);     color:var(--c-title); letter-spacing:-.01em; }\n.t-dash-title,\n.t-dashboard-title { font-size:var(--fs-page-title-sm); font-weight:var(--fw-bold); color:var(--c-title); letter-spacing:-.01em; }\n.t-card-title { font-size:var(--fs-card-title);  font-weight:var(--fw-bold);     color:var(--c-title); }\n.t-card-sub   { font-size:var(--fs-card-sub);    font-weight:var(--fw-regular);  color:var(--c-muted); }\n.t-kpi-value  { font-size:var(--fs-kpi-value);   font-weight:var(--fw-bold);     color:var(--c-title);\n                line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.01em; }\n.t-kpi-unit   { font-size:var(--fs-kpi-unit);    font-weight:var(--fw-semibold); color:var(--c-muted); }\n.t-kpi-title,\n.t-kpi-name   { font-size:var(--fs-kpi-label);   font-weight:var(--fw-semibold); color:var(--c-label); }\n.t-metric-sec,\n.t-flow-num   { font-size:var(--fs-metric-sec);  font-weight:var(--fw-bold);     color:var(--c-title);\n                font-variant-numeric:tabular-nums; }\n.t-delta      { font-size:var(--fs-delta);       font-weight:var(--fw-bold); display:inline-flex; align-items:center; gap:2px; }\n.t-delta.up,   .t-up   { color:var(--c-up);   }\n.t-delta.down, .t-down { color:var(--c-down); }\n.t-legend     { font-size:var(--fs-legend);      font-weight:var(--fw-semibold); color:var(--c-legend); }\n.t-field-label{ font-size:var(--fs-field-label); font-weight:var(--fw-semibold); color:var(--c-label); text-transform:none; }\n.t-axis,\n.t-caption    { font-size:var(--fs-axis);        color:var(--c-muted); }\n.t-body       { font-size:var(--fs-card-sub);    font-weight:var(--fw-semibold); color:var(--c-legend); }\n.t-table      { font-size:var(--fs-table);       color:var(--c-legend); font-variant-numeric:tabular-nums; }\n.t-icd        { font-size:var(--fs-icd);         color:var(--c-title); font-variant-numeric:tabular-nums; }\n.t-chip       { font-size:var(--fs-chip);        font-weight:var(--fw-semibold); color:var(--c-muted); }\n.t-num        { font-variant-numeric:tabular-nums; }\n\n/* Cỡ chữ mặc định trong biểu đồ SVG */\nsvg text       { font-size:var(--fs-svg); }\nsvg .axis text { font-size:var(--fs-svg-axis); }\n<\u002Fstyle>\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n:root{\n  --blue:#024593;--blue-h:#013A7E;--blue-lt:#EAF1FE;\n  --teal:#024593;--tbar:rgba(2,69,147,.22);--tedge:#024593;\n  --bg:#F1F5F9;--surf:#fff;\n  --bdr:#CBD5E1;--bdr-lt:#E2E8F0;\n  --tx:#1f2937;--tx2:#5a6b82;--tx3:#9aa7b8;\n  --th-bg:#F1F5F9;--tr-alt:#F8FAFC;--tr-hover:#DBEAFE;\n  --r:2px;\n  --pg:44px;\n}\n/* Khung gốc 1920 (16:9); scale theo chiều rộng viewport, giữ tỷ lệ, cuộn dọc phần dư */\nhtml{width:100%;background:#e5e8ee;overflow-x:hidden;overflow-y:auto}\nbody{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:13.5px;line-height:1.35;display:block;margin:0;overflow:hidden}\nbutton{cursor:pointer;border:none;background:none;font:inherit}\n\n/* ── LAYOUT ── */\n#app{display:flex;flex-direction:column;width:1920px;min-width:1920px;height:1080px;flex:none;overflow:hidden;padding:0;background:var(--bg);transform-origin:top left}\n#app::-webkit-scrollbar{width:9px;height:9px}\n#app::-webkit-scrollbar-thumb{background:#cdd6e3;border-radius:6px}\n#app::-webkit-scrollbar-track{background:transparent}\n\n/* ── HEADER ── */\n.hdr{display:flex;align-items:center;justify-content:space-between;background:#eaf1fe;border-bottom:1px solid #cdddf7;padding:16px 24px;flex-shrink:0;gap:28px}\n.hdr-l{display:flex;align-items:center;gap:18px;min-width:0;flex-shrink:0}\n.logo{height:66px;width:auto;display:block;object-fit:contain;flex:none;margin:0;mix-blend-mode:normal;filter:none}\n.hdr-brand-divider{width:1px;align-self:stretch;background:var(--bdr);margin:4px 0;flex:none}\n.hdr-div{display:none}\n.page-title{font-size:var(--fs-page-title-logo);font-weight:var(--fw-title);color:var(--c-title);white-space:nowrap;letter-spacing:-.01em;line-height:1.12;margin:0;font-family:inherit}\n.hdr-hosp{display:none}\n.hdr-r{display:flex;align-items:flex-end;gap:16px;flex-shrink:0;background:transparent;padding:0}\n.flt-lead{display:flex;align-items:center;gap:6px;color:var(--c-label);font-size:15px;font-weight:600;white-space:nowrap;padding-bottom:6px}\n.flt-lead svg{flex-shrink:0}\n.flt-time{font-size:13px;font-weight:600;color:var(--c-muted);white-space:nowrap;font-variant-numeric:tabular-nums;padding-left:2px;align-self:center}\n.fc{display:flex;flex-direction:column;gap:4px;min-width:170px}\n.fc label{font-size:15px;font-weight:600;color:var(--c-label);letter-spacing:0;line-height:1.2;white-space:nowrap;text-transform:none}\n.fc-w{position:relative}\n.fc-w::after{content:'';position:absolute;right:7px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-top:4px solid var(--tx3);pointer-events:none}\n.fsel{height:30px;border:1px solid var(--bdr);border-radius:6px;padding:0 28px 0 12px;color:var(--tx);background:var(--surf);font-size:15px;font-family:inherit;outline:none;appearance:none;cursor:pointer;min-width:170px;width:100%}\n.fsel:focus,.fsel:hover{border-color:var(--blue)}\n.fdate{height:26px;border:1px solid var(--bdr);border-radius:var(--r);padding:0 6px;color:var(--tx);background:var(--surf);font-size:12px;font-family:inherit;outline:none;width:114px}\n.fdate:focus,.fdate:hover{border-color:var(--blue)}\n.btn-pri{height:26px;padding:0 13px;background:var(--blue);color:#fff;border-radius:var(--r);font-weight:600;font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;align-self:flex-end}\n.btn-pri:hover{background:var(--blue-h)}\n.btn-sec{height:26px;padding:0 10px;background:var(--surf);color:var(--tx2);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;align-self:flex-end}\n.btn-sec:hover{border-color:var(--blue);color:var(--blue)}\n\n/* ── Bộ lọc kiểu hộp header (đồng bộ với Tổng quan điều trị đặc thù) ── */\n.ss-filterbar-boxed{display:flex;align-items:flex-end;gap:14px;flex-wrap:nowrap}\n.ss-filterbar-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#5a6b82;white-space:nowrap;padding-bottom:8px}\n.ss-filter{display:flex;flex-direction:column;gap:4px;min-width:0}\n.ss-filter-name{font-size:11px;font-weight:600;color:#5a6b82}\n.ss-filter-box{height:36px;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #d4d9e2;border-radius:8px;background:#fff;padding:0 12px;box-sizing:border-box}\n.ss-filter-box-caret{color:#8e8e8e;flex:none}\n.ss-filter-box-select{position:relative;padding-right:10px;cursor:pointer}\n.ss-filter-box-native{appearance:none;-webkit-appearance:none;-moz-appearance:none;border:none;background:transparent;outline:none;cursor:pointer;flex:1;min-width:0;font-family:inherit;font-size:13px;color:#1f2a3a;padding:0;margin:0;height:100%;text-overflow:ellipsis}\n.ss-filter-box-select:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(2,69,147,.15)}\n.ss-filter-box-date{cursor:pointer;color:#1f2a3a;font-size:13px}\n.ss-filter-box-date::-webkit-calendar-picker-indicator{opacity:.55;cursor:pointer}\n.ss-filter-daterange{animation:fltFade .16s ease}\n@keyframes fltFade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}\n\n/* ── DIM ROW ── */\n.dim-row-outer{overflow-x:hidden;flex-shrink:0;background:var(--surf);border:1px solid var(--bdr);border-bottom:2px solid var(--bdr);margin:12px var(--pg) 0;border-radius:var(--r)}\n.dim-row{padding:9px 0;display:flex;align-items:flex-end;gap:0;flex-wrap:nowrap;position:relative;z-index:50;width:max-content}\n.dim-item{display:flex;flex-direction:column;gap:5px;flex:0 0 auto;padding:0 8px;border-right:1px solid var(--bdr-lt);overflow:visible}\n.dim-item:last-child{border-right:none}\n.dim-item > label{font-size:11px;font-weight:700;color:var(--tx3);line-height:1;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase}\n\n/* ── SEARCHABLE DROPDOWN ── */\n.sdd{position:relative}\n.sdd-trigger{width:100%;height:32px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);display:flex;align-items:center;padding:0 22px 0 9px;cursor:pointer;overflow:hidden;position:relative;transition:border-color .12s,background .12s}\n.sdd-trigger::after{content:'';position:absolute;right:7px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--tx3);pointer-events:none}\n.sdd.open .sdd-trigger::after{border-top:none;border-bottom:5px solid var(--blue)}\n.sdd-trigger:hover{border-color:var(--blue);background:#f4f9ff}\n.sdd.open .sdd-trigger{border-color:var(--blue);background:#e8f2ff;box-shadow:0 0 0 2px rgba(30,90,168,.13)}\n.sdd-val{flex:1;font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:32px}\n.sdd-panel{position:fixed;min-width:200px;width:max-content;max-width:360px;background:var(--surf);border:1.5px solid var(--blue);border-radius:4px;box-shadow:0 8px 28px rgba(0,0,0,.18),0 2px 8px rgba(30,90,168,.10);z-index:9999;display:none}\n.sdd.open .sdd-panel{display:block}\n.sdd-search{padding:6px 6px 5px;border-bottom:1px solid var(--bdr-lt);position:relative}\n.sdd-search input{width:100%;height:26px;border:1px solid var(--bdr);border-radius:2px;padding:0 24px 0 8px;font-size:12px;font-family:inherit;color:var(--tx);outline:none;background:#fafcff}\n.sdd-search input:focus{border-color:var(--blue);background:#fff}\n.sdd-search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3);cursor:pointer;line-height:1;display:none;padding:1px 3px;border-radius:2px}\n.sdd-search-clear:hover{color:var(--tx);background:var(--bdr-lt)}\n.sdd-search-clear.vis{display:block}\n.sdd-list{max-height:220px;overflow-y:auto;padding:3px 0}\n.sdd-list::-webkit-scrollbar{width:5px}\n.sdd-list::-webkit-scrollbar-track{background:transparent}\n.sdd-list::-webkit-scrollbar-thumb{background:#b0c0d0;border-radius:3px}\n.sdd-opt{padding:5px 10px 5px 28px;font-size:12.5px;color:var(--tx);cursor:pointer;white-space:nowrap;position:relative;transition:background .07s}\n.sdd-opt::before{content:'';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--blue);font-weight:700;line-height:1}\n.sdd-opt:hover{background:var(--blue-lt);color:var(--blue)}\n.sdd-opt.sel{color:var(--blue);font-weight:600;background:#edf5ff}\n.sdd-opt.sel::before{content:'✓'}\n.sdd-empty{padding:10px 12px;font-size:11.5px;color:var(--tx3);font-style:italic;text-align:center}\n\n/* ── TABLE SECTION ── */\n.tbl-sec{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px var(--pg) var(--pg);gap:8px;min-height:0}\n.tbl-toolbar{display:flex;align-items:center;justify-content:flex-end;gap:3px;flex-shrink:0}\n.btn-tb{height:24px;padding:0 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--tx2);font-size:11.5px;display:flex;align-items:center;gap:3px;cursor:pointer;font-family:inherit;white-space:nowrap}\n.btn-tb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}\n.btn-tb.teal{border-color:var(--blue);color:var(--blue)}\n.btn-tb.teal:hover{background:var(--blue-lt)}\n.tbl-card{flex:1;overflow:hidden;background:var(--surf);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);display:flex;flex-direction:column;min-height:0}\n.tbl-wrap{flex:1;overflow:auto;min-height:0}\n.tbl-wrap::-webkit-scrollbar{width:8px;height:8px}\n.tbl-wrap::-webkit-scrollbar-track{background:#dce4ec}\n.tbl-wrap::-webkit-scrollbar-thumb{background:#9aafc0;border-radius:2px}\n.tbl-wrap::-webkit-scrollbar-thumb:hover{background:#7a95ae}\n.tbl-wrap::-webkit-scrollbar-corner{background:#dce4ec}\n\n/* ── MATRIX TABLE ── */\n.mtx{border-collapse:separate;border-spacing:0;table-layout:fixed;width:auto}\n\n.mtx thead th{position:sticky;top:0;z-index:10;background:var(--th-bg);border-bottom:2px solid var(--bdr);border-right:1px solid var(--bdr);white-space:nowrap;padding:0;user-select:none}\n.mtx thead th:first-child{z-index:20;left:0}\n.mtx thead th:last-child{border-right:none}\n\n.th-in{display:flex;align-items:center;padding:0 10px;height:50px;cursor:pointer;position:relative;overflow:hidden;gap:4px}\n.th-in:hover{background:#d0dcea}\n.th-txt{flex:1;min-width:0;overflow:hidden}\n.th-main{display:block;font-size:14px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}\n.th-sub{display:block;font-size:11.5px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-top:2px}\n.th-sort{flex-shrink:0;font-size:8.5px;color:var(--tx3);opacity:.7}\n.th-sort.on{color:var(--blue);opacity:1;font-weight:700}\n.th-rsz{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent;z-index:1}\n.th-rsz:hover{background:rgba(30,90,168,.35)}\n\n/* tbody */\n.mtx tbody tr{transition:background .07s}\n.mtx tbody tr.g-odd{background:#fff}\n.mtx tbody tr.g-even{background:var(--tr-alt)}\n.mtx tbody tr:hover{background:var(--tr-hover) !important}\n.mtx tbody tr.rg{background:#e6eef8 !important}\n.mtx tbody tr.rg:hover{background:#c8d9ee !important}\n\n.mtx td{padding:0;border-bottom:1px solid var(--bdr-lt);border-right:1px solid #c0ccd8;white-space:nowrap;vertical-align:top}\n.mtx td:last-child{border-right:none}\n/* group boundary line */\n.mtx tbody tr.grp-end > td{border-bottom:1px solid var(--bdr)}\n.mtx tbody td:first-child{position:sticky;left:0;z-index:5}\n.mtx tbody tr.g-odd td:first-child{background:#fff}\n.mtx tbody tr.g-even td:first-child{background:var(--tr-alt)}\n.mtx tbody tr:hover td:first-child{background:var(--tr-hover) !important}\n.mtx tbody tr.rg td:first-child{background:#e6eef8 !important}\n.mtx tbody tr.rg:hover td:first-child{background:#c8d9ee !important}\n\n/* cells */\n.tc{display:flex;align-items:center;padding:0 12px;min-height:40px;font-size:13.5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}\n.tc.c1{gap:5px;font-weight:600}\n.tc.c2{color:var(--tx2)}\n.tc.muted{color:var(--tx3);font-style:italic;font-size:11px}\n.tc.khoa{font-size:13px;color:var(--tx2)}\n.grp-lbl{cursor:pointer;color:var(--tx);font-weight:700;display:flex;align-items:center;gap:5px}\n.grp-lbl::before{content:'';font-size:10px;color:var(--tx3);flex-shrink:0;line-height:1;transition:transform .1s}\n.grp-lbl.coll::before{transform:rotate(-90deg)}\n.grp-lbl:hover{color:var(--blue)}\n\n/* metric cells — pill track + gradient bar */\n.tm{display:flex;align-items:center;min-height:42px;overflow:hidden;padding:0 14px;gap:13px}\n.tm-track{flex:1;position:relative;height:11px;min-width:0;background:#eef2f7;border-radius:6px;overflow:hidden}\n.tm-bar{position:absolute;left:0;top:0;bottom:0;min-width:9px;background:linear-gradient(90deg,#1b60a8 0%,#2f7bcf 100%);border-radius:6px;pointer-events:none;transition:filter .12s}\n.tm-val{flex-shrink:0;min-width:48px;text-align:right;font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--c-legend);letter-spacing:.1px}\n.tm-val.z{color:var(--tx3);font-weight:400}\n\n/* ── CONTEXT MENU ── */\n.ctx{position:fixed;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 3px 10px rgba(0,0,0,.14);z-index:9999;min-width:158px;overflow:hidden;display:none}\n.ctx.on{display:block}\n.ctx-it{padding:5px 12px;font-size:12px;color:var(--tx);cursor:pointer;display:flex;align-items:center;gap:7px;line-height:1.4}\n.ctx-it:hover{background:var(--blue-lt);color:var(--blue)}\n.ctx-sep{height:1px;background:var(--bdr-lt);margin:2px 0}\n\n/* ── METRIC TOOLTIP ── */\n.met-tip{position:fixed;z-index:9998;background:rgba(18,30,50,.97);color:#e2eeff;border-radius:6px;padding:11px 14px;font-size:11.5px;line-height:1.5;pointer-events:none;box-shadow:0 6px 22px rgba(0,0,0,.35);max-width:280px;min-width:170px;display:none;border:1px solid rgba(255,255,255,.09)}\n.met-tip.on{display:block}\n.met-tip-badge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.6px;color:#5ab0e8;text-transform:uppercase;margin-bottom:3px}\n.met-tip-val{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.6px;font-variant-numeric:tabular-nums;margin-bottom:2px;line-height:1}\n.met-tip-name{font-size:11px;color:#7ab8e8;margin-bottom:8px}\n.met-tip-sep{height:1px;background:rgba(255,255,255,.1);margin:7px 0 5px}\n.met-tip-dim{display:flex;justify-content:space-between;gap:14px;padding:2px 0}\n.met-tip-dim .dk{color:#7a9ec0;font-size:10.5px;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.met-tip-dim .dv{color:#d0e8ff;font-size:10.5px;text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}\n/* highlight bar hover */\n.tm:hover .tm-bar{filter:brightness(.9)}\n.tm:hover .tm-val{color:#12579f;font-weight:700}\n@media print{.hdr-r,.dim-row-outer,.tbl-toolbar,.met-tip{display:none}.tbl-wrap{overflow:visible;height:auto}#app,body{height:auto;overflow:auto}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\">\n\n  <!-- HEADER -->\n  <header class=\"hdr\">\n    <div class=\"hdr-l\">\n      <img src=\"78547068-5440-4105-9fac-59cb8b27e973\" alt=\"Bệnh viện Ung Bướu Hà Nội\" class=\"logo\">\n      <div class=\"hdr-brand-divider\"><\u002Fdiv>\n      <h1 class=\"page-title\">Báo cáo thống kê<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"hdr-r\">\n      <div class=\"ss-filterbar-boxed\">\n        <div class=\"ss-filterbar-label\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"4\" y1=\"6\" x2=\"20\" y2=\"6\"><\u002Fline><line x1=\"7\" y1=\"12\" x2=\"17\" y2=\"12\"><\u002Fline><line x1=\"10\" y1=\"18\" x2=\"14\" y2=\"18\"><\u002Fline><\u002Fsvg>\n          <span>Bộ lọc<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ss-filter\">\n          <span class=\"ss-filter-name\">Khoa<\u002Fspan>\n          <div class=\"ss-filter-box ss-filter-box-select\" style=\"width:230px\">\n            <select class=\"ss-filter-box-native\" id=\"fKhoa\">\n              <option>Tất cả<\u002Foption>\n              <option>K. GMHS<\u002Foption>\n              <option>K. NGOẠI TỔNG HỢP<\u002Foption>\n              <option>K. NGOẠI ĐẦU CỔ<\u002Foption>\n              <option>K. NGOẠI VÚ - PHỤ KHOA<\u002Foption>\n              <option>K. NỘI PHỔI - VÚ<\u002Foption>\n              <option>K. NỘI TỔNG HỢP<\u002Foption>\n              <option>K. XẠ TRỊ<\u002Foption>\n              <option>K. CSGN<\u002Foption>\n              <option>K. YHHN<\u002Foption>\n              <option>K. NGOẠI TYC<\u002Foption>\n              <option>K. NỘI TỔNG HỢP TYC<\u002Foption>\n              <option>K. NỘI TIÊU HÓA TYC<\u002Foption>\n              <option>K. NỘI VÚ, PHỤ KHOA, ĐẦU CỔ TYC<\u002Foption>\n              <option>K. NỘI TỔNG HỢP ĐTBN TYC<\u002Foption>\n              <option>K. XẠ TRỊ TYC<\u002Foption>\n            <\u002Fselect>\n            <svg class=\"ss-filter-box-caret\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 4.5 6 8l3.5-3.5\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ss-filter\">\n          <span class=\"ss-filter-name\">Thời gian<\u002Fspan>\n          <div class=\"ss-filter-box ss-filter-box-select\" style=\"width:150px\">\n            <select class=\"ss-filter-box-native\" id=\"fTime\">\n              <option value=\"yesterday\">Hôm qua<\u002Foption>\n              <option value=\"this_month\" selected=\"\">Tháng này<\u002Foption>\n              <option value=\"last_month\">Tháng trước<\u002Foption>\n              <option value=\"custom\">Tùy chọn<\u002Foption>\n            <\u002Fselect>\n            <svg class=\"ss-filter-box-caret\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 4.5 6 8l3.5-3.5\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ss-filter ss-filter-daterange\" id=\"flt-from-item\" style=\"display:none\">\n          <span class=\"ss-filter-name\">Từ ngày<\u002Fspan>\n          <div class=\"ss-filter-box\" style=\"width:150px\">\n            <input type=\"date\" id=\"flt-time-from\" class=\"ss-filter-box-native ss-filter-box-date\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ss-filter ss-filter-daterange\" id=\"flt-to-item\" style=\"display:none\">\n          <span class=\"ss-filter-name\">Đến ngày<\u002Fspan>\n          <div class=\"ss-filter-box\" style=\"width:150px\">\n            <input type=\"date\" id=\"flt-time-to\" class=\"ss-filter-box-native ss-filter-box-date\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- DIM ROW -->\n  <div class=\"dim-row-outer\" id=\"dimRowOuter\"><div class=\"dim-row\" id=\"dimRow\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- TABLE SECTION -->\n  <div class=\"tbl-sec\">\n\n    <div class=\"tbl-card\">\n      <div class=\"tbl-wrap\" id=\"tblWrap\">\n        <table class=\"mtx\" id=\"mtx\">\n          <colgroup id=\"mtxCols\"><\u002Fcolgroup>\n          <thead id=\"mtxHead\" style=\"display:none\"><\u002Fthead>\n          <tbody id=\"mtxBody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TOOLTIP -->\n<div class=\"met-tip\" id=\"metTip\"><\u002Fdiv>\n\n<!-- CONTEXT MENU -->\n<div class=\"ctx\" id=\"ctx\">\n  <div class=\"ctx-it\" onclick=\"ctxCmd('asc')\">↑ Sắp xếp tăng dần<\u002Fdiv>\n  <div class=\"ctx-it\" onclick=\"ctxCmd('desc')\">↓ Sắp xếp giảm dần<\u002Fdiv>\n  <div class=\"ctx-sep\"><\u002Fdiv>\n  <div class=\"ctx-it\" onclick=\"ctxCmd('hide')\">✕ Ẩn cột<\u002Fdiv>\n  <div class=\"ctx-it\" onclick=\"ctxCmd('pin')\">📌 Ghim cột<\u002Fdiv>\n  <div class=\"ctx-sep\"><\u002Fdiv>\n  <div class=\"ctx-it\" onclick=\"ctxCmd('fit')\">↔ Tự động căn cột<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ── DATA ── */\nconst NONE='Không';\nconst COL_OPTS=['Khoa','Đối tượng người bệnh','Hình thức điều trị','Hình thức vào viện','Hình thức ra viện','Kết quả điều trị','Phương thức điều trị','Phân loại phẫu thuật','Phân loại thủ thuật','Nhóm CLS',NONE];\nconst MET_OPTS=['Số người bệnh nội trú','Số người bệnh thực nằm','Số lượt vào viện','Số người bệnh vào viện','Số lượt ra viện','Số người bệnh ra viện','Số lượt cận lâm sàng','Số ca phẫu thuật','Số ca thủ thuật','Số lượt điều trị đặc hiệu','Số lượt xạ trị',NONE];\nconst MET_FULL=MET_OPTS.slice();\n\nconst DIM_VALS={\n  'Khoa':['K. GMHS','K. NGOẠI TỔNG HỢP','K. NGOẠI ĐẦU CỔ','K. NGOẠI VÚ - PHỤ KHOA','K. NỘI PHỔI - VÚ','K. NỘI TỔNG HỢP','K. XẠ TRỊ','K. CSGN','K. YHHN','K. NGOẠI TYC','K. NỘI TỔNG HỢP TYC','K. NỘI TIÊU HÓA TYC','K. NỘI VÚ, PHỤ KHOA, ĐẦU CỔ TYC','K. NỘI TỔNG HỢP ĐTBN TYC','K. XẠ TRỊ TYC'],\n  'Đối tượng người bệnh':['Đúng tuyến','Trái tuyến','Yêu cầu'],\n  'Hình thức điều trị':['Người bệnh nội trú','Ngoại trú','Ban ngày'],\n  'Hình thức vào viện':['Khoa khám bệnh','Cấp cứu','TDĐT','HĐĐT'],\n  'Hình thức ra viện':['Hết đợt','Chuyển khoa','Chuyển viện','Tử vong','Xin về','Tạm dừng'],\n  'Kết quả điều trị':['Khỏi','Đỡ','Không đổi','Nặng hơn','Tử vong'],\n  'Phương thức điều trị':['Điều trị đặc hiệu','Xạ trị','Phẫu thuật','Thủ thuật'],\n  'Phân loại phẫu thuật':['Loại I','Loại II','Loại III','Đặc biệt'],\n  'Phân loại thủ thuật':['Loại I','Loại II','Loại III','Đặc biệt'],\n  'Nhóm CLS':['Xét nghiệm','CĐHA','TDCN','GPB','Y học hạt nhân','Truyền máu'],\n};\nconst MET_MAX={\n  'Số người bệnh nội trú':1500,'Số người bệnh thực nằm':1400,\n  'Số lượt vào viện':600,'Số người bệnh vào viện':550,\n  'Số lượt ra viện':600,'Số người bệnh ra viện':550,\n  'Số lượt cận lâm sàng':3000,'Số ca phẫu thuật':150,\n  'Số ca thủ thuật':180,'Số lượt điều trị đặc hiệu':250,'Số lượt xạ trị':120,\n};\n\nfunction hsh(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return h>>>0;}\nfunction pv(key,mx){return mx>0?hsh(key)%mx:0;}\n\nfunction actCols(){const a=[];S.cols.forEach((c,i)=>{if(c)a.push({i,name:c,blank:c===NONE});});return a;}\nfunction actMets(){const a=[];S.mets.forEach((m,i)=>{if(m)a.push({i,name:m,blank:m===NONE});});return a;}\n/* Sinh bộ chỉ số nhất quán về nghiệp vụ cho từng dòng (deterministic theo key)\n   Quan hệ logic: số lượt ≥ số người; nội trú ≥ số người vào/ra viện; CLS ≫ số người;\n   phẫu thuật/thủ thuật/điều trị đặc hiệu/xạ trị là tập con nhỏ. */\nfunction metricsFor(key){\n  const r=(salt,a,b)=>a+(hsh(key+'#'+S.time.preset+salt)%10000)/10000*(b-a);\n  const nguoiVao=Math.round(r('nv',80,520));\n  const luotVao=Math.round(nguoiVao*r('lv',1.06,1.22));\n  const nguoiRa=Math.round(nguoiVao*r('nr',0.88,0.99));\n  const luotRa=Math.round(nguoiRa*r('lr',1.05,1.18));\n  const noiTru=Math.round(nguoiVao*r('nt',1.25,1.6));\n  const thucNam=Math.round(noiTru*r('tn',0.9,0.98));\n  const cls=Math.round(noiTru*r('cl',3,6.5));\n  const pt=Math.round(noiTru*r('pt',0.06,0.24));\n  const tt=Math.round(noiTru*r('tt',0.1,0.32));\n  const dh=Math.round(noiTru*r('dh',0.12,0.4));\n  const xt=Math.round(noiTru*r('xt',0.05,0.22));\n  return {\n    'Số người bệnh nội trú':noiTru,\n    'Số người bệnh thực nằm':thucNam,\n    'Số lượt vào viện':luotVao,\n    'Số người bệnh vào viện':nguoiVao,\n    'Số lượt ra viện':luotRa,\n    'Số người bệnh ra viện':nguoiRa,\n    'Số lượt cận lâm sàng':cls,\n    'Số ca phẫu thuật':pt,\n    'Số ca thủ thuật':tt,\n    'Số lượt điều trị đặc hiệu':dh,\n    'Số lượt xạ trị':xt,\n  };\n}\nfunction generateData(){\n  const AC=actCols(), AM=actMets();\n  const hasKhoaCol=AC.some(c=>c.name==='Khoa');\n  const sc=globalScale(hasKhoaCol);\n  const vals=AC.map(c=>{\n    if(c.blank)return[''];\n    let arr=DIM_VALS[c.name]||['—'];\n    if(c.name==='Khoa'&&S.khoa!=='Tất cả')arr=[S.khoa];\n    return arr;\n  });\n  const leaves=[];\n  (function rec(d,combo){\n    if(d===AC.length){\n      const key=combo.join('|')||'∑';\n      const mv=metricsFor(key);\n      leaves.push({vals:combo.slice(), m:AM.map(mm=>mm.blank?null:Math.round((mv[mm.name]??0)*sc))});\n      return;\n    }\n    for(const v of vals[d]){combo.push(v);rec(d+1,combo);combo.pop();}\n  })(0,[]);\n  return {AC,AM,leaves};\n}\n\n/* ── STATE ── */\nconst S={\n  cols:['Đối tượng người bệnh','Hình thức điều trị','Hình thức vào viện','Kết quả điều trị'],\n  mets:['Số người bệnh nội trú','Số lượt vào viện','Số lượt ra viện','Số ca phẫu thuật'],\n  exp:new Set(),\n  sortK:null,sortD:'asc',ctxK:null,\n  khoa:'Tất cả', time:{preset:'this_month',from:null,to:null},\n  cw:{c0:180,c1:160,c2:150,c3:230,m0:158,m1:162,m2:164,m3:146}\n};\n/* Hệ số quy mô theo bộ lọc thời gian + khoa (để dữ liệu đổi thật) */\nfunction timeScale(){\n  var t=S.time;\n  if(t.preset==='yesterday')return 1/30;\n  if(t.preset==='last_month')return 0.94;\n  if(t.preset==='custom'&&t.from&&t.to){var d=(new Date(t.to)-new Date(t.from))/86400000+1;return Math.max(.02,Math.min(1.3,d/30));}\n  return 1;\n}\nvar KHOA_SHARE=[.14,.12,.09,.08,.09,.10,.07,.05,.04,.05,.04,.03,.03,.03,.02];\nfunction khoaShare(k){var i=(DIM_VALS['Khoa']||[]).indexOf(k);return i<0?0.06:(KHOA_SHARE[i]||0.05);}\nfunction globalScale(hasKhoaCol){var s=timeScale();if(S.khoa!=='Tất cả'&&!hasKhoaCol)s*=khoaShare(S.khoa);return s;}\nconst MAXM=[0,0,0,0]; // legacy; dynamic now\nfunction fmt(n){return n===0?'0':n.toLocaleString('vi-VN');}\n\n/* ── DIM ROW ── */\nfunction buildDimRow(){\n  const row=document.getElementById('dimRow');\n  row.innerHTML='';\n  const defs=[\n    {lbl:'Cột 1',opts:COL_OPTS,k:'c0',get:()=>S.cols[0],set:v=>{S.cols[0]=v;}},\n    {lbl:'Cột 2',opts:COL_OPTS,k:'c1',get:()=>S.cols[1],set:v=>{S.cols[1]=v;}},\n    {lbl:'Cột 3',opts:COL_OPTS,k:'c2',get:()=>S.cols[2],set:v=>{S.cols[2]=v;}},\n    {lbl:'Cột 4',opts:COL_OPTS,k:'c3',get:()=>S.cols[3],set:v=>{S.cols[3]=v;}},\n    {lbl:'Chỉ số 1',opts:MET_OPTS,k:'m0',get:()=>S.mets[0],set:v=>{S.mets[0]=v;}},\n    {lbl:'Chỉ số 2',opts:MET_OPTS,k:'m1',get:()=>S.mets[1],set:v=>{S.mets[1]=v;}},\n    {lbl:'Chỉ số 3',opts:MET_OPTS,k:'m2',get:()=>S.mets[2],set:v=>{S.mets[2]=v;}},\n    {lbl:'Chỉ số 4',opts:MET_OPTS,k:'m3',get:()=>S.mets[3],set:v=>{S.mets[3]=v;}},\n  ];\n  defs.forEach(d=>{\n    const w=S.cw[d.k];\n    const item=document.createElement('div');\n    item.className='dim-item';\n    item.dataset.k=d.k;\n    item.style.width=w+'px';item.style.flex='0 0 '+w+'px';\n    const lbl=document.createElement('label');lbl.textContent=d.lbl;\n    item.appendChild(lbl);\n    item.appendChild(mkSdd(d.opts,d.get(),v=>{d.set(v);renderTable();}));\n    row.appendChild(item);\n  });\n}\n\n/* ── SEARCHABLE DROPDOWN ── */\nfunction mkSdd(opts,initVal,onChange){\n  let cur=initVal;\n  const wrap=document.createElement('div');wrap.className='sdd';\n  wrap.innerHTML=`<div class=\"sdd-trigger\" title=\"${cur}\"><span class=\"sdd-val\">${cur}<\u002Fspan><\u002Fdiv><div class=\"sdd-panel\"><div class=\"sdd-search\"><input type=\"text\" placeholder=\"Tìm kiếm...\"><span class=\"sdd-search-clear\">×<\u002Fspan><\u002Fdiv><div class=\"sdd-list\"><\u002Fdiv><\u002Fdiv>`;\n  const trigger=wrap.querySelector('.sdd-trigger');\n  const panel=wrap.querySelector('.sdd-panel');\n  const inp=wrap.querySelector('.sdd-search input');\n  const clearBtn=wrap.querySelector('.sdd-search-clear');\n  const list=wrap.querySelector('.sdd-list');\n  const valEl=wrap.querySelector('.sdd-val');\n  function renderList(q=''){\n    const f=q?opts.filter(o=>o.toLowerCase().includes(q.toLowerCase())):opts;\n    if(!f.length){list.innerHTML='<div class=\"sdd-empty\">Không có kết quả<\u002Fdiv>';return;}\n    list.innerHTML=f.map(o=>`<div class=\"sdd-opt${o===cur?' sel':''}\" data-v=\"${o}\">${o}<\u002Fdiv>`).join('');\n    list.querySelectorAll('.sdd-opt').forEach(el=>el.addEventListener('click',e=>{\n      e.stopPropagation();cur=el.dataset.v;valEl.textContent=cur;trigger.title=cur;wrap.classList.remove('open');onChange(cur);\n    }));\n    const selEl=list.querySelector('.sdd-opt.sel');\n    if(selEl)selEl.scrollIntoView({block:'nearest'});\n  }\n  function positionPanel(){\n    const rect=trigger.getBoundingClientRect();\n    const estH=Math.min(290,opts.length*32+52);\n    const spaceBelow=window.innerHeight-rect.bottom;\n    panel.style.left=rect.left+'px';\n    panel.style.minWidth=rect.width+'px';\n    if(spaceBelow<estH+8&&rect.top>spaceBelow){\n      panel.style.top='auto';\n      panel.style.bottom=(window.innerHeight-rect.top+3)+'px';\n    } else {\n      panel.style.top=(rect.bottom+3)+'px';\n      panel.style.bottom='auto';\n    }\n  }\n  trigger.addEventListener('click',e=>{\n    e.stopPropagation();const was=wrap.classList.contains('open');closeAllSdd();\n    if(!was){wrap.classList.add('open');inp.value='';clearBtn.classList.remove('vis');renderList();requestAnimationFrame(()=>{positionPanel();inp.focus();});}\n  });\n  inp.addEventListener('input',()=>{renderList(inp.value);clearBtn.classList.toggle('vis',inp.value.length>0);});\n  inp.addEventListener('click',e=>e.stopPropagation());\n  clearBtn.addEventListener('click',e=>{e.stopPropagation();inp.value='';clearBtn.classList.remove('vis');renderList();inp.focus();});\n  renderList();return wrap;\n}\nfunction closeAllSdd(){document.querySelectorAll('.sdd.open').forEach(s=>s.classList.remove('open'));}\n\n/* ── RENDER HEAD ── */\nfunction renderHead(){\n  const thead=document.getElementById('mtxHead');\n  const AC=actCols(), AM=actMets();\n  let h='<tr>';\n  AC.forEach(c=>{\n    const k='c'+c.i;const w=S.cw[k];const si=S.sortK===k;\n    h+=`<th style=\"width:${w}px;min-width:${w}px\" data-k=\"${k}\"><div class=\"th-in\" onclick=\"doSort('${k}')\"><div class=\"th-txt\"><span class=\"th-main\">${c.blank?'':c.name}<\u002Fspan><\u002Fdiv><span class=\"th-sort${si?' on':''}\">${si?(S.sortD==='asc'?'▲':'▼'):'⇅'}<\u002Fspan><div class=\"th-rsz\" onmousedown=\"rsStart(event,'${k}')\"><\u002Fdiv><\u002Fdiv><\u002Fth>`;\n  });\n  AM.forEach(m=>{\n    const k='m'+m.i;const w=S.cw[k];const si=S.sortK===k;\n    const idx=MET_OPTS.indexOf(m.name);const full=m.blank?'':(idx>=0?MET_FULL[idx]:m.name);\n    h+=`<th style=\"width:${w}px;min-width:${w}px\" data-k=\"${k}\"><div class=\"th-in\" onclick=\"doSort('${k}')\"><div class=\"th-txt\"><span class=\"th-main\">Chỉ số ${m.i+1}<\u002Fspan><span class=\"th-sub\">${full}<\u002Fspan><\u002Fdiv><span class=\"th-sort${si?' on':''}\">${si?(S.sortD==='asc'?'▲':'▼'):'⇅'}<\u002Fspan><div class=\"th-rsz\" onmousedown=\"rsStart(event,'${k}')\"><\u002Fdiv><\u002Fdiv><\u002Fth>`;\n  });\n  h+='<\u002Ftr>';thead.innerHTML=h;\n  thead.querySelectorAll('th').forEach(th=>th.addEventListener('contextmenu',e=>{e.preventDefault();S.ctxK=th.dataset.k;showCtx(e.clientX,e.clientY);}));\n}\n\n/* ── RENDER BODY ── */\nfunction esc(s){return String(s).replace(/&/g,'&amp;').replace(/\"/g,'&quot;').replace(/<\u002Fg,'&lt;');}\nfunction renderBody(){\n  const tbody=document.getElementById('mtxBody');\n  const {AC,AM,leaves}=generateData();\n  window.__AM=AM;\n  const nc=AC.length, nm=AM.length;\n  // dynamic max per active metric\n  const dynMax=AM.map((mm,i)=>{if(mm.blank)return 0;let mx=0;leaves.forEach(l=>{if(l.m[i]>mx)mx=l.m[i];});return mx;});\n  const cellClass=j=>{\n    if(nc===1)return 'c1';\n    if(j===0)return 'c1';\n    if(AC[j].name==='Khoa')return 'khoa';\n    if(j===nc-1)return '';\n    return 'c2';\n  };\n  // no dimensions → single total row\n  if(nc===0){\n    const tot=AM.map((mm,i)=>mm.blank?null:leaves.reduce((s,l)=>s+l.m[i],0));\n    tbody.innerHTML=`<tr class=\"rg grp-end\">${tot.map((v,i)=>mtCell(v,i,dynMax)).join('')}<\u002Ftr>`;\n    return;\n  }\n  // partition leaves into groups by first dim value (contiguous)\n  const groups=[];\n  leaves.forEach(l=>{\n    const key=l.vals[0];\n    if(!groups.length||groups[groups.length-1].key!==key)groups.push({key,items:[]});\n    groups[groups.length-1].items.push(l);\n  });\n  const canExpand=nc>=2;\n  groups.forEach(g=>{const id='g_'+hsh(g.key+AC[0].name);g.id=id;if(!S.exp.has(id))S.exp.add(id);});\n  let rows='';let gi=0;\n  for(const g of groups){\n    const par=gi%2===0?'g-odd':'g-even';gi++;\n    const exp=S.exp.has(g.id);\n    if(canExpand && !exp){\n      const tot=AM.map((mm,i)=>mm.blank?null:g.items.reduce((s,l)=>s+l.m[i],0));\n      let tds=`<td><div class=\"tc c1\"><span class=\"grp-lbl coll\" onclick=\"xpnd('${g.id}')\">${esc(g.key)}<\u002Fspan><\u002Fdiv><\u002Ftd>`;\n      for(let j=1;j<nc;j++)tds+='<td><\u002Ftd>';\n      tds+=tot.map((v,i)=>mtCell(v,i,dynMax)).join('');\n      rows+=`<tr class=\"rg grp-end\" data-vals=\"${esc(g.key)}\">${tds}<\u002Ftr>`;\n      continue;\n    }\n    const gl=g.items;\n    for(let i=0;i<gl.length;i++){\n      const lastRow=(i===gl.length-1);\n      const cls=par+(lastRow?' grp-end':'');\n      let tds='';\n      for(let j=0;j<nc;j++){\n        // is this the start of a rowspan run for column j?\n        let start=(i===0);\n        if(!start){for(let k=0;k<=j;k++){if(gl[i].vals[k]!==gl[i-1].vals[k]){start=true;break;}}}\n        if(!start)continue;\n        let span=1;\n        while(i+span<gl.length){let same=true;for(let k=0;k<=j;k++){if(gl[i+span].vals[k]!==gl[i].vals[k]){same=false;break;}}if(!same)break;span++;}\n        const cc=cellClass(j);\n        if(j===0&&canExpand){\n          tds+=`<td rowspan=\"${span}\"><div class=\"tc c1\"><span class=\"grp-lbl\" onclick=\"xpnd('${g.id}')\">${esc(gl[i].vals[0])}<\u002Fspan><\u002Fdiv><\u002Ftd>`;\n        }else{\n          tds+=`<td rowspan=\"${span}\"><div class=\"tc ${cc}\">${esc(gl[i].vals[j])}<\u002Fdiv><\u002Ftd>`;\n        }\n      }\n      tds+=gl[i].m.map((v,mi)=>mtCell(v,mi,dynMax)).join('');\n      rows+=`<tr class=\"${cls}\" data-vals=\"${esc(gl[i].vals.join('¦'))}\">${tds}<\u002Ftr>`;\n    }\n  }\n  tbody.innerHTML=rows;\n}\n\nfunction mtCell(val,idx,dynMax){\n  if(val===null||val===undefined)return `<td data-mi=\"${idx}\" class=\"blank-m\"><\u002Ftd>`;\n  const mx=dynMax?dynMax[idx]:MAXM[idx];\n  const pct=(mx>0&&val>0)?Math.min(100,(val/mx)*100):0;\n  const z=val===0;\n  return `<td data-mi=\"${idx}\" data-val=\"${val}\"><div class=\"tm\"><div class=\"tm-track\">${pct>0?`<div class=\"tm-bar\" style=\"width:${pct.toFixed(1)}%\"><\u002Fdiv>`:''}<\u002Fdiv><span class=\"tm-val${z?' z':''}\">${fmt(val)}<\u002Fspan><\u002Fdiv><\u002Ftd>`;\n}\n\n/* đọc offsetWidth thực tế của từng TD sau render → gán cho dim-item tương ứng */\nfunction syncDimRow(){\n  const firstRow=document.querySelector('#mtxBody tr');\n  if(!firstRow)return;\n  const tds=[...firstRow.querySelectorAll('td')];\n  const keys=[...actCols().map(c=>'c'+c.i),...actMets().map(m=>'m'+m.i)];\n  let tw=0;\n  tds.forEach((td,i)=>{\n    const w=td.offsetWidth;tw+=w;\n    const di=document.querySelector(`.dim-item[data-k=\"${keys[i]}\"]`);\n    if(di){di.style.width=w+'px';di.style.flex='0 0 '+w+'px';}\n  });\n  const dr=document.getElementById('dimRow');\n  if(dr)dr.style.width=tw+'px';\n}\nfunction renderCols(){\n  const cg=document.getElementById('mtxCols');\n  cg.innerHTML='';\n  const keys=[...actCols().map(c=>'c'+c.i),...actMets().map(m=>'m'+m.i)];\n  const total=keys.reduce((s,k)=>s+S.cw[k],0);\n  keys.forEach(k=>{\n    const col=document.createElement('col');\n    col.style.width=((S.cw[k]/total)*100).toFixed(4)+'%';\n    cg.appendChild(col);\n  });\n  document.querySelector('.mtx').style.width='100%';\n}\nfunction renderTable(){renderHead();renderCols();renderBody();scheduleSync();}\n/* retry sync until the first row reports real (non-zero) widths, so it settles on first paint without needing a resize */\nfunction scheduleSync(tries){\n  tries=tries||0;\n  requestAnimationFrame(()=>{\n    const fr=document.querySelector('#mtxBody tr td');\n    if(fr&&fr.offsetWidth>0){syncDimRow();}\n    else if(tries<30){scheduleSync(tries+1);}\n  });\n}\n\n/* ── EXPAND/COLLAPSE ── */\nfunction xpnd(id){if(S.exp.has(id))S.exp.delete(id);else S.exp.add(id);renderBody();}\n\n/* ── SORT ── */\nfunction doSort(k){if(S.sortK===k)S.sortD=S.sortD==='asc'?'desc':'asc';else{S.sortK=k;S.sortD='asc';}renderTable();}\n\n/* ── RESIZE ── */\nlet rs=null;\nfunction rsStart(e,k){e.stopPropagation();e.preventDefault();rs={k,x0:e.clientX,w0:S.cw[k]};document.addEventListener('mousemove',rsMove);document.addEventListener('mouseup',rsEnd);}\nfunction rsMove(e){if(!rs)return;const nw=Math.max(80,rs.w0+(e.clientX-rs.x0));S.cw[rs.k]=nw;renderCols();renderBody();syncDimRow();}\nfunction rsEnd(){rs=null;document.removeEventListener('mousemove',rsMove);document.removeEventListener('mouseup',rsEnd);}\n\n/* ── CONTEXT MENU ── */\nfunction showCtx(x,y){const m=document.getElementById('ctx');m.style.left=x+'px';m.style.top=y+'px';m.classList.add('on');}\nfunction hideCtx(){document.getElementById('ctx').classList.remove('on');}\nfunction ctxCmd(cmd){\n  if(cmd==='asc'||cmd==='desc'){if(S.ctxK){S.sortK=S.ctxK;S.sortD=cmd;renderTable();}}\n  else if(cmd==='fit'){Object.keys(S.cw).forEach(k=>S.cw[k]=k.startsWith('m')?160:155);renderTable();}\n  hideCtx();\n}\n\n/* ── FILTER ── */\nfunction applyFilter(){\n  const btn=document.getElementById('btnView');\n  btn.textContent='⟳ Đang tải...';btn.disabled=true;\n  setTimeout(()=>{btn.innerHTML='<svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"6.5\" cy=\"6.5\" r=\"4.5\" stroke=\"white\" stroke-width=\"1.5\"/><line x1=\"10.2\" y1=\"10.2\" x2=\"14\" y2=\"14\" stroke=\"white\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg> Xem báo cáo';btn.disabled=false;renderTable();},650);}\nfunction resetFilter(){var t=document.getElementById('fTime');if(t)t.value='Tháng này';var k=document.getElementById('fKhoa');if(k)k.selectedIndex=0;}\n/* timestamp hiển thị giờ cập nhật (HH:MM DD/MM) */\n\n/* ── EXPORT ── */\nfunction genCSV(){const {AC,AM,leaves}=generateData();let c=[...AC.map(a=>a.name),...AM.map(m=>m.name)].join(',')+'\\n';leaves.forEach(l=>{c+=[...l.vals,...l.m].join(',')+'\\n';});return c;}\nfunction dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}\nfunction doCSV(){dl(new Blob(['\\uFEFF'+genCSV()],{type:'text/csv;charset=utf-8'}),'bao-cao-thong-ke.csv');}\nfunction doExcel(){dl(new Blob(['\\uFEFF'+genCSV()],{type:'application/vnd.ms-excel;charset=utf-8'}),'bao-cao-thong-ke.xls');}\nfunction doPDF(){window.print();}\nfunction doRefresh(){const b=document.getElementById('btnRefresh');b.style.opacity='.4';setTimeout(()=>{b.style.opacity='1';renderTable();},800);}\n\n/* ── CLOSE ── */\ndocument.addEventListener('click',()=>{closeAllSdd();hideCtx();});\n\n/* ── TOOLTIP ── */\n(function(){\n  const tip=document.getElementById('metTip');\n  function positionTip(e){\n    const x=e.clientX+16,y=e.clientY-14;\n    const tw=tip.offsetWidth,th=tip.offsetHeight;\n    tip.style.left=Math.min(x,window.innerWidth-tw-10)+'px';\n    tip.style.top=Math.max(8,Math.min(y,window.innerHeight-th-10))+'px';\n  }\n  function showTip(e,mi,val,vals){\n    const AM=window.__AM||[];const mo=AM[mi]||{i:mi,name:''};\n    const mfull=(()=>{const i=MET_OPTS.indexOf(mo.name);return i>=0?MET_FULL[i]:mo.name;})();\n    let h=`<div class=\"met-tip-badge\">Chỉ số ${mo.i+1}<\u002Fdiv>`;\n    h+=`<div class=\"met-tip-val\">${fmt(val)}<\u002Fdiv>`;\n    h+=`<div class=\"met-tip-name\">${mfull}<\u002Fdiv>`;\n    h+=`<div class=\"met-tip-sep\"><\u002Fdiv>`;\n    const AC=actCols();\n    AC.forEach((c,j)=>{\n      const v=vals[j];\n      if(v)h+=`<div class=\"met-tip-dim\"><span class=\"dk\">${c.name}<\u002Fspan><span class=\"dv\">${v}<\u002Fspan><\u002Fdiv>`;\n    });\n    tip.innerHTML=h;\n    tip.classList.add('on');\n    positionTip(e);\n  }\n  function hideTip(){tip.classList.remove('on');}\n  const wrap=document.getElementById('tblWrap');\n  wrap.addEventListener('mouseover',e=>{\n    const td=e.target.closest('td[data-mi]');\n    if(!td){hideTip();return;}\n    const tr=td.closest('tr');\n    showTip(e,parseInt(td.dataset.mi),parseInt(td.dataset.val)||0,\n      (tr?.dataset.vals||'').split('¦'));\n  });\n  wrap.addEventListener('mousemove',e=>{if(e.target.closest('td[data-mi]'))positionTip(e);});\n  wrap.addEventListener('mouseleave',hideTip);\n  /* ── SCROLL SYNC dim-row ↔ table ── */\n  wrap.addEventListener('scroll',()=>{\n    const o=document.getElementById('dimRowOuter');\n    if(o)o.scrollLeft=wrap.scrollLeft;\n  });\n  /* re-sync khi thay đổi kích thước cửa sổ */\n  window.addEventListener('resize',()=>{renderCols();syncDimRow();});\n})();\n\n/* ── INIT ── */\nbuildDimRow();renderTable();\n/* ── WIRE FILTERS: Khoa + Thời gian (4 mốc) → đổi dữ liệu bảng ── */\n(function wireFilters(){\n  function toISO(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}\n  function presetRange(p){var now=new Date();now.setHours(0,0,0,0);var Y=now.getFullYear(),M=now.getMonth();\n    if(p==='yesterday'){var y=new Date(Y,M,now.getDate()-1);return[toISO(y),toISO(y)];}\n    if(p==='last_month')return[toISO(new Date(Y,M-1,1)),toISO(new Date(Y,M,0))];\n    return[toISO(new Date(Y,M,1)),toISO(new Date(Y,M+1,0))];}\n  var fk=document.getElementById('fKhoa');\n  if(fk){fk.value='Tất cả';fk.addEventListener('change',function(){S.khoa=this.value;renderTable();});}\n  var ft=document.getElementById('fTime');\n  var fromItem=document.getElementById('flt-from-item'),toItem=document.getElementById('flt-to-item');\n  var fromI=document.getElementById('flt-time-from'),toI=document.getElementById('flt-time-to');\n  function showRange(on){if(fromItem)fromItem.style.display=on?'':'none';if(toItem)toItem.style.display=on?'':'none';}\n  function applyTime(){\n    if(!ft)return;var p=ft.value;\n    if(p==='custom'){\n      showRange(true);\n      if(fromI&&!fromI.value)fromI.value=presetRange('this_month')[0];\n      if(toI&&!toI.value)toI.value=presetRange('this_month')[1];\n      var f=fromI?fromI.value:'',t=toI?toI.value:'';\n      if(f&&t&&f>t){var tmp=f;f=t;t=tmp;fromI.value=f;toI.value=t;}\n      S.time={preset:'custom',from:f||null,to:t||null};\n    }else{showRange(false);S.time={preset:p,from:null,to:null};}\n    renderTable();\n  }\n  if(ft){ft.value='this_month';ft.addEventListener('change',applyTime);}\n  if(fromI)fromI.addEventListener('change',function(){if(ft&&ft.value!=='custom')ft.value='custom';applyTime();});\n  if(toI)toI.addEventListener('change',function(){if(ft&&ft.value!=='custom')ft.value='custom';applyTime();});\n})();\n/* ── FIT: fullscreen responsive ── */\nfunction fitApp(){var a=document.getElementById('app');if(!a)return;var cw=(document.documentElement.clientWidth||window.innerWidth);if(!cw)return;var base=cw*(window.devicePixelRatio||1)/(window.__zd0||(window.__zd0=window.devicePixelRatio||1));var s=base/1920;if(!s||s<=0)return;\n  /* Dùng zoom thay cho transform:scale để chữ & bảng được vẽ lại đúng độ nét (transform sẽ raster hóa rồi phóng → mờ). */\n  a.style.transform='none';a.style.zoom=s;document.documentElement.style.height='';document.body.style.height='';}\nwindow.addEventListener('resize',fitApp);window.addEventListener('load',fitApp);fitApp();\nvar __fitN=0,__fitIv=setInterval(function(){fitApp();if(++__fitN>20)clearInterval(__fitIv);},150);\n<\u002Fscript>\n<script src=\"e7ea5e02-c961-4a55-8333-dca0e13e28d3\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
